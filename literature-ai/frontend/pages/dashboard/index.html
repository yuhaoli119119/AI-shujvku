<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总览 - Literature AI</title>
    <link rel="stylesheet" href="../../shared/fonts.css">
    <link rel="stylesheet" href="../../shared/tokens.css">
    <link rel="stylesheet" href="../../shared/components.css">
    <link rel="stylesheet" href="../../shared/topnav.css">
    <script src="../../shared/topnav.js"></script>
    <script>ThemeManager.init();</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background: var(--color-bg);
            min-height: 100vh;
        }
        .shell {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px 32px;
        }
        .welcome-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .welcome-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-primary), var(--color-success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome-header p {
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-top: 6px;
        }
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-elevated);
            border-color: var(--color-primary);
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--color-primary);
        }
        .stat-card.success::before { background: var(--color-success); }
        .stat-card.warning::before { background: var(--color-warning); }
        .stat-card.danger::before { background: var(--color-danger); }
        
        .stat-label {
            font-size: 13px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .stat-val {
            font-size: 36px;
            font-weight: 800;
            margin-top: 8px;
            color: var(--color-text);
        }
        .stat-desc {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 6px;
        }

        /* Two-Column Section */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }
        @media (max-width: 1024px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }
        
        .main-col, .side-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 24px;
        }
        .panel-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Table styles */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: left;
        }
        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--color-border);
        }
        th {
            font-weight: 700;
            color: var(--color-text-secondary);
            background: var(--color-surface-alt);
        }
        tr:hover td {
            background: var(--color-surface-alt);
        }

        /* Quick Action buttons */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1.5px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            gap: 8px;
            text-decoration: none;
            text-align: center;
        }
        .action-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-bg);
            color: var(--color-primary);
            transform: translateY(-2px);
        }
        .action-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
        }
        .empty-state p { margin-top: 8px; font-size: 14px; }

        .badge-type {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            min-width: 44px;
        }
        .badge-type.A { background: var(--color-primary-bg); color: var(--color-primary); }
        .badge-type.B { background: var(--color-success-bg); color: var(--color-success); }
        .badge-type.C { background: var(--color-warning-bg); color: var(--color-warning); }
        .badge-type.R { background: var(--color-danger-bg); color: var(--color-danger); }
        .badge-type.Unknown { background: var(--color-surface-alt); color: var(--color-text-secondary); }
        #recentTable th:nth-child(4),
        #recentTable td:nth-child(4) {
            width: 92px;
            min-width: 92px;
            white-space: nowrap;
            text-align: center;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--color-primary);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            box-shadow: var(--shadow-elevated);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div id="topnav-mount"></div>
    <div class="shell">
        <div class="welcome-header">
            <div>
                <h1 id="welcomeTitle">科研文献大盘</h1>
                <p id="welcomeDesc">正在同步本地文献库...</p>
            </div>
            <div>
                <select id="librarySelect" class="library-select btn" onchange="switchLibrary(this.value)" style="height:44px; padding:0 12px; font-weight:normal;">
                    <option value="">加载中...</option>
                </select>
            </div>
        </div>

        <!-- 4 Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">文献总数</div>
                <div id="statTotal" class="stat-val">-</div>
                <div id="statTotalDesc" class="stat-desc">在库的所有文献</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">已成功解析</div>
                <div id="statParsed" class="stat-val">-</div>
                <div id="statParsedDesc" class="stat-desc">包含 PDF 正文/结构化段落</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">仅保留元数据</div>
                <div id="statMetaOnly" class="stat-val">-</div>
                <div id="statMetaOnlyDesc" class="stat-desc">无本地 PDF（通过DOI/检索导入）</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">已提取科研要素</div>
                <div id="statExtractions" class="stat-val">-</div>
                <div id="statExtractionsDesc" class="stat-desc">DFT 能量与机理 Claim 数量</div>
            </div>
        </div>

        <div class="dashboard-layout">
            <!-- Left Side: Recent Papers -->
            <div class="main-col">
                <div class="panel-card">
                    <div class="panel-title">
                        <span>最近入库文献</span>
                        <a href="../literature_library/index.html" style="color:var(--color-primary); font-size:13px; text-decoration:none;">进入文献库 →</a>
                    </div>
                    <div class="table-container">
                        <table id="recentTable">
                            <thead>
                                <tr>
                                    <th>文献标题</th>
                                    <th>年份</th>
                                    <th>期刊 / 来源</th>
                                    <th>类型</th>
                                    <th>入库时间</th>
                                </tr>
                            </thead>
                            <tbody id="recentList">
                                <tr>
                                    <td colspan="5" class="empty-state">正在同步文献库...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Side: Quick Actions & Types -->
            <div class="side-col">
                <div class="panel-card">
                    <div class="panel-title">快速入口</div>
                    <div class="action-grid">
                        <a href="../ingestion/index.html" class="action-btn">
                            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                            上传 & 下载
                        </a>
                        <a href="../literature_library/index.html?tab=ai-search" class="action-btn">
                            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                            AI 自动搜文
                        </a>
                        <a href="../ai_writer/index.html" class="action-btn">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            AI 写作 studio
                        </a>
                        <a href="../settings/index.html" class="action-btn">
                            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            系统配置
                        </a>
                    </div>
                </div>

                <div class="panel-card">
                    <div class="panel-title">文献类别占比</div>
                    <div id="typeCountsBox" style="display:flex; flex-direction:column; gap:12px;">
                        <!-- Dynamically filled -->
                        <div class="empty-state" style="padding:10px 0;">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = "/api/papers";
        const LIB_API = "/api/libraries";

        function paperTypeLabel(value) {
            const raw = String(value || '').trim();
            if (!raw) return '未知类型';
            const key = raw.toLowerCase();
            if (key === 'unknown' || key === 'null' || key === 'none') return '未知类型';
            if (/^[abc]\d?$/i.test(raw)) return raw.toUpperCase() + '类';
            if (/^r\d?$/i.test(raw) || key === 'review') return '综述';
            if (key === 'research') return '研究论文';
            return raw;
        }

        function paperTypeBadgeClass(value) {
            const raw = String(value || '').trim().toUpperCase();
            return /^[ABCR]/.test(raw) ? raw.charAt(0) : 'Unknown';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function fetchJSON(url, options) {
            options = options || {};
            options.headers = options.headers || {};
            const token = sessionStorage.getItem("litai-settings-token");
            if (token) {
                options.headers["X-Settings-Token"] = token;
            }
            const resp = await fetch(url, options);
            if (resp.status === 403) {
                showToast("无权访问该接口。请先在[设置]中配置管理员 Token。");
                throw new Error("403 Forbidden");
            }
            const text = await resp.text();
            let data = null;
            try { data = text ? JSON.parse(text) : null; } catch (_) {}
            if (!resp.ok) {
                const detail = data && data.detail ? data.detail : ("HTTP " + resp.status);
                throw new Error(detail);
            }
            return data;
        }

        async function loadLibraries() {
            try {
                const libs = await fetchJSON(LIB_API);
                const active = libs.find(l => l.is_active);
                
                const select = document.getElementById('librarySelect');
                select.innerHTML = libs.map(l => 
                    `<option value="${l.name}" ${l.is_active ? 'selected' : ''}>${l.name}${l.is_active ? ' (当前)' : ''}</option>`
                ).join('');

                if (active) {
                    document.getElementById('welcomeDesc').textContent = `当前文献库：${active.name} (${active.root_path})`;
                    await loadDashboardData(active.name);
                }
            } catch (e) {
                showToast("加载库列表失败：" + e.message);
            }
        }

        async function switchLibrary(name) {
            if (!name) return;
            try {
                await fetchJSON(`${LIB_API}/${encodeURIComponent(name)}/activate`, { method: "POST" });
                showToast("切换文献库成功：" + name);
                await loadLibraries();
            } catch (e) {
                showToast("切换文献库失败：" + e.message);
            }
        }

        async function loadDashboardData(libName) {
            try {
                // Fetch papers list for computation
                const papers = await fetchJSON(`${API_BASE}?limit=200&library_name=${encodeURIComponent(libName)}`);
                
                // 1. Total papers
                const total = papers.length;
                document.getElementById('statTotal').textContent = total;

                // 2. Parsed (has pdf_path or sections count)
                const parsedCount = papers.filter(p => p.pdf_path && (!p.oa_status || p.oa_status !== 'metadata_only')).length;
                document.getElementById('statParsed').textContent = parsedCount;

                // 3. Metadata Only
                const metaCount = papers.filter(p => p.oa_status === 'metadata_only' || !p.pdf_path).length;
                document.getElementById('statMetaOnly').textContent = metaCount;

                // 4. Extractions (Sum of dft_results and mechanism claims in lists)
                let dftCount = 0;
                let claimCount = 0;
                let wcCount = 0;
                papers.forEach(p => {
                    if (p.counts) {
                        dftCount += (p.counts.dft_results || 0);
                        claimCount += (p.counts.mechanism_claims || 0);
                        wcCount += (p.counts.writing_cards || 0);
                    }
                });
                document.getElementById('statExtractions').textContent = dftCount + claimCount;
                document.getElementById('statExtractionsDesc').textContent = `包含 ${dftCount} 个 DFT 能量，${claimCount} 个机理 Claim`;

                // 5. Build recent papers list
                const recentList = document.getElementById('recentList');
                if (papers.length === 0) {
                    recentList.innerHTML = `<tr><td colspan="5" class="empty-state">当前文献库为空。去入库中心导入一些 PDF 吧！</td></tr>`;
                } else {
                    const sorted = [...papers].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)).slice(0, 7);
                    recentList.innerHTML = sorted.map(p => {
                        const typeLabel = paperTypeLabel(p.paper_type);
                        const typeCls = paperTypeBadgeClass(p.paper_type);
                        const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString() : '-';
                        return `
                            <tr>
                                <td style="font-weight: 600;">
                                    <a href="../literature_library/index.html?paper_id=${p.id}" style="color: var(--color-text); text-decoration: none; hover: text-decoration: underline;">
                                        ${p.title || '无标题文献'}
                                    </a>
                                </td>
                                <td>${p.year || '-'}</td>
                                <td>${p.journal || '-'}</td>
                                <td><span class="badge-type ${typeCls}">${typeLabel}</span></td>
                                <td style="color: var(--color-text-muted); font-size:13px;">${dateStr}</td>
                            </tr>
                        `;
                    }).join('');
                }

                // 6. Literature categories counts
                const types = { A: 0, B: 0, C: 0, R: 0, Unknown: 0 };
                papers.forEach(p => {
                    const t = p.paper_type || 'Unknown';
                    if (types[t] !== undefined) types[t]++;
                    else types.Unknown++;
                });

                const totalTypes = total || 1;
                const typeCountsBox = document.getElementById('typeCountsBox');
                typeCountsBox.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        ${Object.entries(types).map(([k, v]) => {
                            const pct = ((v / totalTypes) * 100).toFixed(0);
                            const kLabel = k === 'A' ? 'A类（计算）' : k === 'B' ? 'B类（计算+实验）' : k === 'C' ? 'C类（实验）' : k === 'R' ? '综述' : '未知类型';
                            return `
                                <div>
                                    <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">
                                        <span style="font-weight:600;">${kLabel}</span>
                                        <span style="color:var(--color-text-secondary);">${v} 篇 (${pct}%)</span>
                                    </div>
                                    <div style="width:100%; height:6px; background:var(--color-surface-alt); border-radius:3px; overflow:hidden;">
                                        <div style="width:${pct}%; height:100%; background:var(--color-primary); border-radius:3px;"></div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

            } catch (e) {
                showToast("同步大盘数据失败：" + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            TopNav.init({ currentPage: 'dashboard', mountId: 'topnav-mount' });
            loadLibraries();
        });
    </script>
</body>
</html>
