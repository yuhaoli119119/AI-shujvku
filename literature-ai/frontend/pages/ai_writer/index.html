<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 写作 - Literature AI</title>
  <link rel="stylesheet" href="../../shared/fonts.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/topnav.css">
  <script src="../../shared/topnav.js"></script>
  <script>ThemeManager.init();</script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body); color: var(--color-text); background: var(--color-bg); }
    .shell { max-width: 1600px; margin: 0 auto; padding: 32px 24px 32px; }
    .page-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 22px; }
    .page-head h1 { margin: 0 0 6px; font-size: 26px; }
    .page-head p { margin: 0; color: var(--color-text-secondary); font-size: 14px; }
    .layout-shell { display: flex; flex-direction: column; gap: 12px; }
    .layout-toolbar { display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
    .panel-toggle { min-width: 148px; }
    .panel-toggle.is-collapsed { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-bg); }
    .layout { display: flex; align-items: stretch; gap: 12px; min-width: 0; }
    .panel-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-card); }
    .side-panel { flex: 0 0 var(--panel-width, 320px); width: var(--panel-width, 320px); min-width: 220px; display: flex; flex-direction: column; min-height: 680px; overflow: hidden; }
    .left-panel { --panel-width: 310px; }
    .right-panel { --panel-width: 360px; }
    .main-panel { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
    .panel-title { font-weight: 800; font-size: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .panel-title-actions { display: flex; align-items: center; gap: 8px; }
    .panel-collapse-btn { border: 1px solid var(--color-border); border-radius: 999px; background: var(--color-surface-alt); color: var(--color-text-secondary); font: inherit; font-size: 12px; font-weight: 700; padding: 6px 10px; cursor: pointer; }
    .panel-collapse-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .paper-checklist { display: flex; flex-direction: column; gap: 10px; max-height: 560px; overflow: auto; flex: 1; min-height: 0; }
    .checklist-item { display: grid; grid-template-columns: 20px 1fr; gap: 8px; padding: 10px; border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-surface-alt); cursor: pointer; }
    .checklist-item-title { font-size: 13px; font-weight: 700; line-height: 1.45; }
    .stepper { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
    .step { border: 1px solid var(--color-border); background: var(--color-surface-alt); border-radius: var(--radius); padding: 10px; font-size: 12px; color: var(--color-text-secondary); }
    .step.active { border-color: var(--color-primary); color: var(--color-primary); font-weight: 800; background: var(--color-primary-bg); }
    .form-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
    label { display: block; font-size: 12px; color: var(--color-text-secondary); font-weight: 700; margin-bottom: 6px; }
    input, textarea, select { width: 100%; border: 1px solid var(--color-border-strong); border-radius: var(--radius); background: var(--color-surface); color: var(--color-text); font: inherit; padding: 10px; }
    textarea { min-height: 94px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid var(--color-border); margin: 16px 0; padding-bottom: 6px; overflow-x: auto; scrollbar-width: thin; }
    .tab-btn { border: 0; background: transparent; color: var(--color-text-secondary); padding: 8px 10px; font-weight: 800; cursor: pointer; }
    .tab-btn.active { color: var(--color-primary); border-bottom: 2px solid var(--color-primary); }
    .tab-pane { min-height: 180px; white-space: pre-wrap; line-height: 1.75; font-size: 14px; overflow-wrap: anywhere; }
    .evidence-card, .audit-card { border: 1px solid var(--color-border); border-radius: var(--radius); padding: 12px; margin-bottom: 10px; background: var(--color-surface-alt); }
    .evidence-card button { text-align: left; width: 100%; border: 0; background: transparent; color: var(--color-text); font-weight: 800; cursor: pointer; padding: 0; }
    .muted { color: var(--color-text-secondary); font-size: 12px; }
    .warning { color: var(--color-warning); font-weight: 800; }
    .mono { font-family: var(--font-mono); font-size: 12px; white-space: pre-wrap; background: var(--color-surface-alt); border-radius: var(--radius); padding: 12px; overflow: auto; }
    .empty-state { color: var(--color-text-secondary); text-align: center; padding: 30px 12px; }
    .resize-handle { flex: 0 0 10px; width: 10px; align-self: stretch; position: relative; border-radius: 999px; border: 1px solid var(--color-border); background: linear-gradient(180deg, var(--color-surface-alt) 0%, var(--color-surface) 100%); cursor: col-resize; opacity: 0.72; touch-action: none; }
    .resize-handle::before { content: ""; position: absolute; inset: 50% 2px auto 2px; transform: translateY(-50%); height: 84px; border-radius: 999px; background: repeating-linear-gradient(180deg, var(--color-text-secondary), var(--color-text-secondary) 6px, transparent 6px, transparent 12px); opacity: 0.25; }
    .resize-handle:hover { opacity: 1; }
    .layout.left-collapsed .left-panel,
    .layout.left-collapsed .left-handle,
    .layout.right-collapsed .right-panel,
    .layout.right-collapsed .right-handle { display: none; }
    body.resizing-panels,
    body.resizing-panels * { cursor: col-resize !important; user-select: none !important; }
    .toast, .progress-box { position: fixed; right: 24px; z-index: 3000; color: #fff; border-radius: var(--radius); box-shadow: var(--shadow-elevated); display: none; padding: 12px 18px; font-size: 14px; }
    .toast { top: 24px; background: var(--color-primary); }
    .progress-box { top: 78px; background: var(--color-success); }
    @media (max-width: 1120px) {
      .shell { padding-inline: 16px; }
      .page-head { flex-direction: column; align-items: stretch; }
      .layout-toolbar { justify-content: flex-start; }
      .layout { flex-direction: column; }
      .side-panel, .main-panel { width: 100%; min-width: 0; min-height: auto; flex-basis: auto; }
      .resize-handle { display: none; }
      .stepper { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .stepper { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .actions .btn, .page-head .btn, .layout-toolbar .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="topnav-mount"></div>
  <main class="shell">
    <header class="page-head">
      <div>
        <h1>AI 写作</h1>
        <p>基于证据优先的写作流程，用于生成提纲、引言、DFT 结果与讨论内容。</p>
      </div>
      <button class="btn green" onclick="copyMarkdownText()">复制 Markdown</button>
    </header>

    <section class="layout-shell">
      <div class="layout-toolbar" aria-label="AI 写作布局控制">
        <button class="btn ghost panel-toggle" type="button" id="toggleLeftPanelBtn" onclick="toggleWriterPanel('left')">隐藏已选文献</button>
        <button class="btn ghost panel-toggle" type="button" id="toggleRightPanelBtn" onclick="toggleWriterPanel('right')">隐藏证据面板</button>
      </div>

      <section class="layout" id="writerLayout">
      <aside class="panel-card side-panel left-panel" id="selectedPapersPanel">
        <div class="panel-title">
          <span>已选文献</span>
          <span class="panel-title-actions">
            <span id="selectedCount">0</span>
            <button class="panel-collapse-btn" type="button" id="leftPanelActionBtn" onclick="toggleWriterPanel('left')">隐藏</button>
          </span>
        </div>
        <div id="paperChecklist" class="paper-checklist">
          <div class="empty-state">正在加载文献...</div>
        </div>
      </aside>

      <div class="resize-handle left-handle" role="separator" aria-orientation="vertical" aria-label="调整已选文献面板宽度" onpointerdown="startPanelResize('left', event)"></div>

      <section class="panel-card main-panel">
        <div class="stepper" id="stepper">
          <div class="step active">1 主题</div>
          <div class="step">2 检索证据</div>
          <div class="step">3 整理证据</div>
          <div class="step">4 生成草稿</div>
          <div class="step">5 引文核查</div>
        </div>

        <div class="form-grid">
          <div>
            <label for="writingTopic">主题 / 研究论点</label>
            <input id="writingTopic" placeholder="锂硫电池 CeO2 催化机理分析">
          </div>
          <div>
            <label for="writingLimit">证据条数</label>
            <input id="writingLimit" type="number" value="5" min="1" max="20">
          </div>
        </div>
        <div style="margin-top:12px;">
          <label for="userNotes">备注</label>
          <textarea id="userNotes" placeholder="重点关注 DFT 描述符、催化机理，以及有明确证据支撑的论断。"></textarea>
        </div>
        <div class="actions">
          <button class="btn ghost" onclick="retrieveEvidence()">搜索证据</button>
          <button class="btn primary" onclick="generateAcademicDraft()">生成草稿</button>
          <button class="btn ghost" onclick="runCitationAudit()">运行引文核查</button>
        </div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchWriteTab('outline', event)">提纲</button>
          <button class="tab-btn" onclick="switchWriteTab('intro', event)">引言</button>
          <button class="tab-btn" onclick="switchWriteTab('dft', event)">DFT 结果</button>
          <button class="tab-btn" onclick="switchWriteTab('discussion', event)">讨论</button>
          <button class="tab-btn" onclick="switchWriteTab('storyline', event)">叙事线</button>
          <button class="tab-btn" onclick="switchWriteTab('audit', event)">引文核查</button>
        </div>
        <div id="tab-outline" class="tab-pane"><div class="empty-state">草稿输出将在此显示。</div></div>
        <div id="tab-intro" class="tab-pane" style="display:none;"></div>
        <div id="tab-dft" class="tab-pane" style="display:none;"></div>
        <div id="tab-discussion" class="tab-pane" style="display:none;"></div>
        <div id="tab-storyline" class="tab-pane" style="display:none;"></div>
        <div id="tab-audit" class="tab-pane" style="display:none;"></div>
      </section>

      <div class="resize-handle right-handle" role="separator" aria-orientation="vertical" aria-label="调整证据面板宽度" onpointerdown="startPanelResize('right', event)"></div>

      <aside class="panel-card side-panel right-panel" id="evidenceSidePanel">
        <div class="panel-title">
          <span>证据面板</span>
          <button class="panel-collapse-btn" type="button" id="rightPanelActionBtn" onclick="toggleWriterPanel('right')">隐藏</button>
        </div>
        <div id="evidencePanel"><div class="empty-state">暂未选择证据。</div></div>
        <div class="panel-title" style="margin-top:18px;">当前选中证据</div>
        <div id="evidenceDetail" class="mono">点击论断或证据项，可查看 paper_id、chunk_id、页码/片段、置信度与 evidence_text 原始内容。</div>
      </aside>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <div id="progressBox" class="progress-box"></div>

  <script>
    const API_BASE = "/api/papers";
    const WRITER_API = "/api/writer";
    const WRITER_LAYOUT_STORAGE_KEY = "litai-ai-writer-layout-v1";
    const state = {
      papers: [],
      selectedIds: [],
      retrieved: [],
      generatedData: null,
      activeTab: "outline",
      layout: {
        leftWidth: 310,
        rightWidth: 360,
        leftCollapsed: false,
        rightCollapsed: false,
        resizing: null
      }
    };

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 2600);
    }

    function showProgress(msg) {
      const box = document.getElementById("progressBox");
      box.textContent = msg;
      box.style.display = "block";
    }

    function hideProgress() {
      document.getElementById("progressBox").style.display = "none";
    }

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function persistWriterLayout() {
      try {
        localStorage.setItem(WRITER_LAYOUT_STORAGE_KEY, JSON.stringify({
          leftWidth: state.layout.leftWidth,
          rightWidth: state.layout.rightWidth,
          leftCollapsed: state.layout.leftCollapsed,
          rightCollapsed: state.layout.rightCollapsed
        }));
      } catch (_) {}
    }

    function restoreWriterLayout() {
      try {
        const raw = localStorage.getItem(WRITER_LAYOUT_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        state.layout.leftWidth = clamp(Number(parsed.leftWidth) || state.layout.leftWidth, 220, 520);
        state.layout.rightWidth = clamp(Number(parsed.rightWidth) || state.layout.rightWidth, 260, 620);
        state.layout.leftCollapsed = Boolean(parsed.leftCollapsed);
        state.layout.rightCollapsed = Boolean(parsed.rightCollapsed);
      } catch (_) {}
    }

    function updateLayoutButtons() {
      const leftCollapsed = state.layout.leftCollapsed;
      const rightCollapsed = state.layout.rightCollapsed;
      const leftLabel = leftCollapsed ? "显示已选文献" : "隐藏已选文献";
      const rightLabel = rightCollapsed ? "显示证据面板" : "隐藏证据面板";

      const leftToggle = document.getElementById("toggleLeftPanelBtn");
      const rightToggle = document.getElementById("toggleRightPanelBtn");
      const leftAction = document.getElementById("leftPanelActionBtn");
      const rightAction = document.getElementById("rightPanelActionBtn");

      if (leftToggle) {
        leftToggle.textContent = leftLabel;
        leftToggle.classList.toggle("is-collapsed", leftCollapsed);
        leftToggle.setAttribute("aria-pressed", String(leftCollapsed));
      }
      if (rightToggle) {
        rightToggle.textContent = rightLabel;
        rightToggle.classList.toggle("is-collapsed", rightCollapsed);
        rightToggle.setAttribute("aria-pressed", String(rightCollapsed));
      }
      if (leftAction) leftAction.textContent = leftCollapsed ? "恢复" : "隐藏";
      if (rightAction) rightAction.textContent = rightCollapsed ? "恢复" : "隐藏";
    }

    function applyWriterLayout() {
      const layout = document.getElementById("writerLayout");
      const leftPanel = document.getElementById("selectedPapersPanel");
      const rightPanel = document.getElementById("evidenceSidePanel");
      if (!layout || !leftPanel || !rightPanel) return;

      leftPanel.style.setProperty("--panel-width", `${state.layout.leftWidth}px`);
      rightPanel.style.setProperty("--panel-width", `${state.layout.rightWidth}px`);
      layout.classList.toggle("left-collapsed", state.layout.leftCollapsed);
      layout.classList.toggle("right-collapsed", state.layout.rightCollapsed);
      updateLayoutButtons();
    }

    function toggleWriterPanel(side) {
      const key = side === "left" ? "leftCollapsed" : "rightCollapsed";
      state.layout[key] = !state.layout[key];
      applyWriterLayout();
      persistWriterLayout();
    }

    function startPanelResize(side, event) {
      if (window.matchMedia("(max-width: 1120px)").matches) return;
      if ((side === "left" && state.layout.leftCollapsed) || (side === "right" && state.layout.rightCollapsed)) return;

      const panel = document.getElementById(side === "left" ? "selectedPapersPanel" : "evidenceSidePanel");
      if (!panel) return;

      state.layout.resizing = {
        side,
        startX: event.clientX,
        startWidth: panel.getBoundingClientRect().width
      };
      document.body.classList.add("resizing-panels");
      event.preventDefault();
    }

    function handlePanelResize(event) {
      if (!state.layout.resizing) return;

      const { side, startX, startWidth } = state.layout.resizing;
      const delta = event.clientX - startX;
      if (side === "left") {
        state.layout.leftWidth = clamp(Math.round(startWidth + delta), 220, 520);
      } else {
        state.layout.rightWidth = clamp(Math.round(startWidth - delta), 260, 620);
      }
      applyWriterLayout();
    }

    function stopPanelResize() {
      if (!state.layout.resizing) return;
      state.layout.resizing = null;
      document.body.classList.remove("resizing-panels");
      persistWriterLayout();
    }

    function formatValidationStatus(status) {
      const labels = {
        supported: "已支持",
        confirmed: "已确认",
        safe_verified: "安全核验",
        unverified: "未核验",
        unsupported: "未支持",
        needs_review: "待复核"
      };
      return labels[status] || String(status || "未知状态");
    }

    async function fetchJSON(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      const token = sessionStorage.getItem("litai-settings-token");
      if (token) options.headers["X-Settings-Token"] = token;
      const resp = await fetch(url, options);
      const text = await resp.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!resp.ok) throw new Error(data && data.detail ? data.detail : "HTTP " + resp.status);
      return data;
    }

    function setStep(index) {
      document.querySelectorAll(".step").forEach((step, i) => step.classList.toggle("active", i <= index));
    }

    async function loadPapersChecklist() {
      try {
        const papers = await fetchJSON(`${API_BASE}?limit=200`);
        state.papers = papers || [];
        const box = document.getElementById("paperChecklist");
        if (!state.papers.length) {
          box.innerHTML = '<div class="empty-state">文献库中暂无文献。</div>';
          return;
        }
        box.innerHTML = state.papers.map(p => `
          <label class="checklist-item" id="chk-item-${esc(p.id)}">
            <input type="checkbox" value="${esc(p.id)}" onchange="toggleSelectPaper('${esc(p.id)}')">
            <span class="checklist-item-title">${esc(p.title || "未命名文献")}</span>
          </label>
        `).join("");
      } catch (error) {
        showToast("加载文献失败：" + error.message);
      }
    }

    function toggleSelectPaper(id) {
      const index = state.selectedIds.indexOf(id);
      if (index === -1) state.selectedIds.push(id);
      else state.selectedIds.splice(index, 1);
      document.getElementById("selectedCount").textContent = state.selectedIds.length;
      const card = document.getElementById("chk-item-" + id);
      if (card) card.style.borderColor = state.selectedIds.includes(id) ? "var(--color-primary)" : "var(--color-border)";
    }

    async function retrieveEvidence() {
      const topic = document.getElementById("writingTopic").value.trim();
      if (!topic) return showToast("请先输入主题。");
      if (!state.selectedIds.length) return showToast("请至少选择一篇文献。");
      setStep(1);
      showProgress("正在检索混合证据...");
      try {
        const data = await fetchJSON("/api/retrieval/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: topic,
            paper_ids: state.selectedIds,
            mode: state.selectedIds.length === 1 ? "full_context" : "focused",
            limit: Number(document.getElementById("writingLimit").value || 5),
            limit_per_type: Number(document.getElementById("writingLimit").value || 5),
            rerank: true
          })
        });
        state.retrieved = data.items || [];
        setStep(2);
        renderEvidencePack();
      } catch (error) {
        showToast("证据检索失败：" + error.message);
      } finally {
        hideProgress();
      }
    }

    function renderEvidencePack() {
      const panel = document.getElementById("evidencePanel");
      if (!state.retrieved.length) {
        panel.innerHTML = '<div class="empty-state warning">未找到证据。草稿中的论断不得视为已被证据支持。</div>';
        return;
      }
      panel.innerHTML = state.retrieved.map((item, idx) => `
        <div class="evidence-card">
          <button onclick="showEvidenceDetail(${idx})">${esc(item.section_title || item.source || "证据片段")} · 得分 ${Number(item.score || 0).toFixed(2)}</button>
          <div class="muted">paper_id ${esc(item.paper_id)} · chunk_id ${esc(item.chunk_id || "-")}</div>
          <div class="muted">${esc((item.text || "").slice(0, 160))}</div>
        </div>
      `).join("");
    }

    function showEvidenceDetail(index) {
      const item = state.retrieved[index];
      document.getElementById("evidenceDetail").textContent = JSON.stringify(item.evidence || item, null, 2);
    }

    async function generateAcademicDraft() {
      const topic = document.getElementById("writingTopic").value.trim();
      if (!topic) return showToast("请先输入主题。");
      if (!state.selectedIds.length) return showToast("请至少选择一篇文献。");
      if (!state.retrieved.length) await retrieveEvidence();
      setStep(3);
      showProgress("正在生成基于证据的草稿...");
      try {
        const data = await fetchJSON(`${WRITER_API}/draft`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            topic,
            paper_ids: state.selectedIds,
            user_notes: document.getElementById("userNotes").value.trim() || null,
            sections: ["outline", "introduction", "dft_results", "discussion", "figure_storyline"],
            limit_per_type: Number(document.getElementById("writingLimit").value || 5)
          })
        });
        state.generatedData = data;
        setStep(4);
        renderDraftOutput();
        renderAudit(data.citation_audit);
      } catch (error) {
        showToast("草稿生成失败：" + error.message);
      } finally {
        hideProgress();
      }
    }

    async function runCitationAudit() {
      const draft = state.generatedData;
      if (!draft) return showToast("请先生成草稿，再进行引文核查。");
      const text = [draft.introduction, draft.dft_results, draft.discussion].filter(Boolean).join("\n");
      showProgress("正在根据证据核查论断...");
      try {
        const data = await fetchJSON("/api/evidence/audit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, paper_ids: state.selectedIds, min_confidence: 0.1 })
        });
        state.generatedData.citation_audit = data;
        renderAudit(data);
        setStep(4);
        switchWriteTab("audit");
      } catch (error) {
        showToast("引文核查失败：" + error.message);
      } finally {
        hideProgress();
      }
    }

    function switchWriteTab(tab, event) {
      state.activeTab = tab;
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".tab-pane").forEach(pane => pane.style.display = "none");
      if (event && event.target) event.target.classList.add("active");
      else document.querySelector(`.tab-btn[onclick*="'${tab}'"]`)?.classList.add("active");
      document.getElementById("tab-" + tab).style.display = "block";
    }

    function renderDraftOutput() {
      const draft = state.generatedData || {};
      document.getElementById("tab-outline").textContent = (draft.outline || []).join("\n") || "暂无提纲。";
      document.getElementById("tab-intro").textContent = draft.introduction || "暂无引言。";
      document.getElementById("tab-dft").textContent = draft.dft_results || "暂无 DFT 结果摘要。";
      document.getElementById("tab-discussion").textContent = draft.discussion || "暂无讨论内容。";
      document.getElementById("tab-storyline").textContent = (draft.figure_storyline || []).join("\n") || "暂无叙事线。";

      const claims = draft.evidence_claims || [];
      if (claims.length) {
        document.getElementById("evidencePanel").innerHTML = claims.map((claim, idx) => `
          <div class="evidence-card">
            <button onclick="showClaimEvidence(${idx})">${esc(formatValidationStatus(claim.validation_status))} · ${esc((claim.claim_text || "").slice(0, 120))}</button>
            <div class="muted">${claim.evidence && claim.evidence.length ? "已关联证据" : "未关联证据"}</div>
          </div>
        `).join("");
      }
    }

    function showClaimEvidence(index) {
      const claim = (state.generatedData && state.generatedData.evidence_claims || [])[index];
      document.getElementById("evidenceDetail").textContent = JSON.stringify(claim || {}, null, 2);
    }

    function renderAudit(audit) {
      const box = document.getElementById("tab-audit");
      if (!audit) {
        box.innerHTML = '<div class="empty-state">尚未运行引文核查。</div>';
        return;
      }
      setStep(4);
      const claims = audit.claims || [];
      box.innerHTML = `
        <div class="audit-card ${audit.ok ? "" : "warning"}">
          引文核查：已支持 ${audit.supported_claims || 0}/${audit.total_claims || 0} 条论断。
        </div>
        ${claims.map(item => `
          <div class="audit-card">
            <strong>${esc(formatValidationStatus(item.status))}</strong>
            <div>${esc(item.claim_text)}</div>
            ${item.warning ? `<div class="warning">${esc(item.warning)}</div>` : ""}
          </div>
        `).join("")}
      `;
    }

    function copyMarkdownText() {
      const draft = state.generatedData;
      if (!draft) return showToast("请先生成草稿。");
      const md = `# ${document.getElementById("writingTopic").value}\n\n## Outline\n${(draft.outline || []).join("\n")}\n\n## Introduction\n${draft.introduction || ""}\n\n## DFT Results\n${draft.dft_results || ""}\n\n## Discussion\n${draft.discussion || ""}`;
      navigator.clipboard.writeText(md).then(() => showToast("Markdown 已复制。"));
    }

    document.addEventListener("DOMContentLoaded", () => {
      TopNav.init({ currentPage: "ai-writer", mountId: "topnav-mount" });
      restoreWriterLayout();
      applyWriterLayout();
      window.addEventListener("pointermove", handlePanelResize);
      window.addEventListener("pointerup", stopPanelResize);
      window.addEventListener("pointercancel", stopPanelResize);
      loadPapersChecklist();
    });
  </script>
</body>
</html>
