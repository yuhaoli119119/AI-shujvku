<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>论文详情 - Literature AI</title>
  <link rel="stylesheet" href="../../shared/fonts.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/topnav.css">
  <script src="../../shared/topnav.js"></script>
  <script>ThemeManager.init();</script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body); color: var(--color-text); background: var(--color-bg); }
    .shell { max-width: 1360px; margin: 0 auto; padding: 20px 24px 36px; }
    .paper-header { border-bottom: 1px solid var(--color-border); padding-bottom: 18px; margin-bottom: 18px; }
    .paper-title { margin: 0; font-size: 26px; line-height: 1.35; }
    .paper-meta { margin-top: 8px; color: var(--color-text-secondary); font-size: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 18px; align-items: start; }
    .panel-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-card); margin-bottom: 18px; }
    .panel-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; border-left: 4px solid var(--color-primary); padding-left: 10px; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .mini-card { border: 1px solid var(--color-border); background: var(--color-surface-alt); border-radius: var(--radius); padding: 14px; }
    .mini-card .k { font-size: 12px; color: var(--color-text-secondary); }
    .mini-card .v { font-size: 22px; font-weight: 800; margin-top: 4px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid var(--color-border); margin-bottom: 16px; }
    .tab-btn { border: 0; background: transparent; padding: 10px 12px; color: var(--color-text-secondary); font-weight: 800; cursor: pointer; }
    .tab-btn.active { color: var(--color-primary); border-bottom: 2px solid var(--color-primary); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .prewrap { white-space: pre-wrap; line-height: 1.75; font-size: 14px; }
    .mono { white-space: pre-wrap; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; background: var(--color-surface-alt); border-radius: var(--radius); padding: 14px; overflow: auto; }
    .section-item, .evidence-card, .structured-card { border: 1px solid var(--color-border); border-radius: var(--radius); background: var(--color-surface-alt); padding: 12px; margin-bottom: 10px; }
    .section-title { font-weight: 800; margin-bottom: 8px; }
    .evidence-card button { width: 100%; border: 0; background: transparent; color: var(--color-text); text-align: left; cursor: pointer; font-weight: 800; padding: 0; }
    .muted { color: var(--color-text-secondary); font-size: 12px; }
    .warning { color: var(--color-warning); font-weight: 800; }
    .empty-state { text-align: center; color: var(--color-text-secondary); padding: 40px 12px; }
    .tag { display: inline-flex; align-items: center; border-radius: var(--radius-pill); background: var(--color-primary-bg); color: var(--color-primary); padding: 4px 9px; font-size: 12px; font-weight: 800; margin-right: 6px; margin-top: 10px; }
    .toast { position: fixed; top: 24px; right: 24px; display: none; background: var(--color-primary); color: #fff; padding: 12px 18px; border-radius: var(--radius); box-shadow: var(--shadow-elevated); z-index: 2000; }
    .structured-card-title { font-weight: 800; margin-bottom: 10px; }
    .kv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .kv-item { border: 1px solid var(--color-border); background: var(--color-surface); border-radius: var(--radius); padding: 10px; }
    .kv-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .kv-value { font-size: 14px; color: var(--color-text); line-height: 1.6; word-break: break-word; }
    .raw-data-toggle { margin-top: 12px; border-top: 1px dashed var(--color-border-strong); padding-top: 12px; }
    .raw-data-toggle summary { cursor: pointer; font-weight: 700; color: var(--color-primary); }
    .raw-data-title { margin: 10px 0 6px; font-size: 12px; color: var(--color-text-secondary); }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="topnav-mount"></div>
  <main class="shell">
    <div id="fallbackState" class="panel-card empty-state" style="display:none;">
      <h3>未选择文献</h3>
      <p id="fallbackMsg">请先从文献库选择一篇文献查看详情。</p>
      <div style="margin-top:16px;"><a href="../literature_library/index.html" class="btn primary">返回文献库</a></div>
    </div>

    <div id="paperContent" style="display:none;">
      <header class="paper-header">
        <h1 id="paperTitle" class="paper-title"></h1>
        <div class="paper-meta">
          <span id="paperYear"></span><span>|</span><span id="paperJournal"></span><span>|</span><span id="paperDoi"></span>
        </div>
        <div id="paperBadges"></div>
      </header>

      <div class="cards-grid">
        <div class="mini-card"><div class="k">章节</div><div class="v" id="cntSections">0</div></div>
        <div class="mini-card"><div class="k">图表</div><div class="v" id="cntFigures">0</div></div>
        <div class="mini-card"><div class="k">DFT 结果</div><div class="v" id="cntDFT">0</div></div>
        <div class="mini-card"><div class="k">论断</div><div class="v" id="cntMechanism">0</div></div>
      </div>

      <section class="layout">
        <div>
          <div class="tabs">
            <button class="tab-btn active" onclick="switchDetailTab('summary', event)">概览</button>
            <button class="tab-btn" onclick="switchDetailTab('sections', event)">章节</button>
            <button class="tab-btn" onclick="switchDetailTab('figures', event)">图表</button>
            <button class="tab-btn" onclick="switchDetailTab('dft', event)">DFT 与性能</button>
            <button class="tab-btn" onclick="switchDetailTab('cards', event)">机理与写作</button>
          </div>

          <div id="tab-summary" class="tab-pane active">
            <div class="panel-card"><div class="panel-title">摘要</div><div id="paperAbstract" class="prewrap"></div></div>
            <div class="panel-card"><div class="panel-title">综合分析</div><div id="comprehensiveJSON" class="mono">{}</div></div>
          </div>
          <div id="tab-sections" class="tab-pane"><div class="panel-card"><div class="panel-title">解析章节</div><div id="sectionsList"></div></div></div>
          <div id="tab-figures" class="tab-pane"><div class="panel-card"><div class="panel-title">图表内容</div><div id="figuresList"></div><div id="tablesList" style="margin-top:12px;"></div></div></div>
          <div id="tab-dft" class="tab-pane">
            <div class="panel-card"><div class="panel-title">DFT 设置</div><div id="dftSettings"></div></div>
            <div class="panel-card"><div class="panel-title">DFT 结果</div><div id="dftResults"></div></div>
            <div class="panel-card"><div class="panel-title">电化学性能</div><div id="electrochemicalPerformance"></div></div>
          </div>
          <div id="tab-cards" class="tab-pane">
            <div class="panel-card"><div class="panel-title">机理论断</div><div id="mechanismClaims"></div></div>
            <div class="panel-card"><div class="panel-title">写作卡片</div><div id="writingCards"></div></div>
          </div>
        </div>

        <aside class="panel-card">
          <div class="panel-title">证据面板</div>
          <div id="evidencePanel"><div class="empty-state">正在加载证据...</div></div>
          <div class="panel-title" style="margin-top:18px;">证据详情</div>
          <div id="evidenceDetail" class="mono">点击论断后，可查看来源论文、chunk、页码/片段、置信度与原始 evidence 文本。</div>
        </aside>
      </section>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    const API_BASE = "/api/papers";
    const state = { paperId: null, paper: null, claims: [] };

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 2600);
    }

    async function fetchJSON(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      const token = sessionStorage.getItem("litai-settings-token");
      if (token) options.headers["X-Settings-Token"] = token;
      const resp = await fetch(url, options);
      const text = await resp.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!resp.ok) throw new Error(data && data.detail ? data.detail : "HTTP " + resp.status);
      return data;
    }

    function parseParams() {
      const params = new URLSearchParams(window.location.search);
      state.paperId = params.get("id") || params.get("paper_id");
      return Boolean(state.paperId);
    }

    function showFallback(msg) {
      document.getElementById("fallbackState").style.display = "block";
      document.getElementById("fallbackMsg").textContent = msg;
      document.getElementById("paperContent").style.display = "none";
    }

    function showPaperContent() {
      document.getElementById("fallbackState").style.display = "none";
      document.getElementById("paperContent").style.display = "block";
    }

    function formatValidationStatus(status) {
      const labels = {
        supported: "已支持",
        confirmed: "已确认",
        safe_verified: "安全核验",
        pending: "待处理",
        needs_review: "待复核",
        unsupported: "未支持"
      };
      return labels[status] || String(status || "未知状态");
    }

    function formatFieldLabel(key) {
      const labels = {
        code: "计算方法",
        functional: "泛函",
        basis: "基组",
        basis_set: "基组",
        kpoints: "k 点设置",
        k_points: "k 点设置",
        energy_cutoff: "截断能",
        cutoff_energy: "截断能",
        convergence: "收敛设置",
        convergence_settings: "收敛设置",
        spin: "自旋设置",
        spin_polarization: "自旋设置",
        vacuum: "真空层",
        smearing: "展宽设置",
        solver: "求解器",
        model: "模型",
        supercell: "超胞",
        property: "性质",
        metric: "指标",
        value: "数值",
        unit: "单位",
        name: "名称",
        summary: "摘要",
        title: "标题",
        claim: "论断",
        caption: "说明",
        markdown_content: "表格内容"
      };
      if (labels[key]) return labels[key];
      return String(key || "")
        .replace(/_/g, " ")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function formatValue(value) {
      if (value == null || value === "") return "-";
      if (Array.isArray(value)) return value.length ? value.map(formatValue).join("、") : "-";
      if (typeof value === "object") return JSON.stringify(value, null, 2);
      return String(value);
    }

    function renderStructuredCollection(items, emptyText) {
      if (!items || !items.length) {
        return `<div class="empty-state">${esc(emptyText)}</div>`;
      }
      return items.map((item, index) => {
        const entries = Object.entries(item || {});
        const grid = entries.length
          ? entries.map(([key, value]) => `
              <div class="kv-item">
                <div class="kv-label">${esc(formatFieldLabel(key))}</div>
                <div class="kv-value">${esc(formatValue(value))}</div>
              </div>
            `).join("")
          : '<div class="empty-state">暂无可展示字段。</div>';
        return `
          <div class="structured-card">
            <div class="structured-card-title">记录 ${index + 1}</div>
            <div class="kv-grid">${grid}</div>
            <details class="raw-data-toggle">
              <summary>查看原始 JSON</summary>
              <div class="raw-data-title">原始数据</div>
              <div class="mono">${esc(JSON.stringify(item || {}, null, 2))}</div>
            </details>
          </div>
        `;
      }).join("");
    }

    async function loadPaperData() {
      if (!state.paperId) {
        showFallback("请先从文献库选择一篇文献查看详情。");
        return;
      }
      try {
        state.paper = await fetchJSON(`${API_BASE}/${state.paperId}`);
        renderPaperDetails();
        await loadEvidenceClaims();
      } catch (error) {
        showFallback("论文详情加载失败：" + error.message);
      }
    }

    async function loadEvidenceClaims() {
      try {
        state.claims = await fetchJSON(`/api/evidence/claims?paper_id=${encodeURIComponent(state.paperId)}&include_derived=true&limit=80`);
        renderEvidencePanel();
      } catch (error) {
        document.getElementById("evidencePanel").innerHTML = `<div class="empty-state warning">证据加载失败：${esc(error.message)}</div>`;
      }
    }

    function renderPaperDetails() {
      const paper = state.paper;
      showPaperContent();

      document.getElementById("paperTitle").textContent = paper.title || "未命名文献";
      document.getElementById("paperYear").textContent = paper.year || "-";
      document.getElementById("paperJournal").textContent = paper.journal || "-";
      document.getElementById("paperDoi").textContent = paper.doi ? "DOI: " + paper.doi : "暂无 DOI";
      document.getElementById("paperBadges").innerHTML = `
        <span class="tag">${esc(paper.paper_type || "未知类型")}</span>
        <span class="tag">${paper.pdf_path ? "已关联 PDF" : "仅元数据"}</span>
      `;

      document.getElementById("cntSections").textContent = paper.counts?.sections || (paper.sections || []).length || 0;
      document.getElementById("cntFigures").textContent = ((paper.figures || []).length + (paper.tables || []).length);
      document.getElementById("cntDFT").textContent = paper.counts?.dft_results || (paper.dft_results_items || []).length || 0;
      document.getElementById("cntMechanism").textContent = paper.counts?.mechanism_claims || (paper.mechanism_claims_items || []).length || 0;

      document.getElementById("paperAbstract").textContent = paper.abstract || "暂无摘要。";
      document.getElementById("comprehensiveJSON").textContent = JSON.stringify(paper.comprehensive_analysis || {}, null, 2);

      document.getElementById("sectionsList").innerHTML = (paper.sections || []).length
        ? (paper.sections || []).map((section, index) => `
            <div class="section-item">
              <div class="section-title">${index + 1}. ${esc(section.section_title || section.section_type || "未命名章节")}</div>
              <div class="prewrap">${esc(section.text || "")}</div>
              <div class="muted">页码：${esc(section.page_start || "-")} - ${esc(section.page_end || "-")}</div>
            </div>
          `).join("")
        : '<div class="empty-state">暂无解析章节。</div>';

      document.getElementById("figuresList").innerHTML = (paper.figures || []).length
        ? (paper.figures || []).map((figure, index) => `
            <div class="section-item">
              <div class="section-title">图 ${index + 1}</div>
              <div class="prewrap">${esc(figure.caption || figure.figure_role || "暂无说明")}</div>
              <div class="muted">页码：${esc(figure.page || "-")}</div>
            </div>
          `).join("")
        : '<div class="empty-state">暂无已提取图片。</div>';

      document.getElementById("tablesList").innerHTML = (paper.tables || []).length
        ? (paper.tables || []).map((table, index) => `
            <div class="section-item">
              <div class="section-title">表 ${index + 1}</div>
              <div class="muted">${esc(table.caption || "暂无说明")}</div>
              <div class="mono">${esc(table.markdown_content || "")}</div>
            </div>
          `).join("")
        : "";

      document.getElementById("dftSettings").innerHTML = renderStructuredCollection(paper.dft_settings_items || [], "暂无 DFT 设置数据。");
      document.getElementById("dftResults").innerHTML = renderStructuredCollection(paper.dft_results_items || [], "暂无 DFT 结果数据。");
      document.getElementById("electrochemicalPerformance").innerHTML = renderStructuredCollection(paper.electrochemical_performance_items || [], "暂无电化学性能数据。");
      document.getElementById("mechanismClaims").innerHTML = renderStructuredCollection(paper.mechanism_claims_items || [], "暂无机理论断。");
      document.getElementById("writingCards").innerHTML = renderStructuredCollection(paper.writing_cards_items || [], "暂无写作卡片。");
    }

    function renderEvidencePanel() {
      const panel = document.getElementById("evidencePanel");
      if (!state.claims.length) {
        panel.innerHTML = '<div class="empty-state warning">暂无证据支撑的论断。</div>';
        return;
      }
      panel.innerHTML = state.claims.map((claim, idx) => {
        const evidence = (claim.evidence || [])[0] || {};
        return `
          <div class="evidence-card">
            <button onclick="showClaim(${idx})">${esc(formatValidationStatus(claim.validation_status))} · ${esc((claim.claim_text || "").slice(0, 110))}</button>
            <div class="muted">paper_id ${esc(evidence.paper_id || "-")} · chunk_id ${esc(evidence.chunk_id || "-")} · 置信度 ${esc(claim.confidence == null ? "-" : Number(claim.confidence).toFixed(2))}</div>
          </div>
        `;
      }).join("");
    }

    function showClaim(index) {
      const claim = state.claims[index];
      document.getElementById("evidenceDetail").textContent = JSON.stringify(claim, null, 2);
    }

    function switchDetailTab(tab, event) {
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".tab-pane").forEach(pane => pane.classList.remove("active"));
      if (event && event.target) event.target.classList.add("active");
      document.getElementById("tab-" + tab).classList.add("active");
    }

    document.addEventListener("DOMContentLoaded", () => {
      TopNav.init({ currentPage: "paper-detail", mountId: "topnav-mount" });
      if (parseParams()) {
        loadPaperData();
      } else {
        showFallback("请先从文献库选择一篇文献查看详情。");
      }
    });
  </script>
</body>
</html>
