<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核中心 - Literature AI</title>
  <link rel="stylesheet" href="../../shared/fonts.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/topnav.css">
  <script src="../../shared/topnav.js?v=20260606-ui3"></script>
  <script>ThemeManager.init();</script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-body);
    }
    .shell {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 14px 18px 28px;
    }
    .review-topline {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
    }
    .page-actions {
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      margin-bottom: 0;
      flex: 1 1 auto;
      min-width: 0;
    }
    .stat {
      height: 40px;
      padding: 0 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      display: grid;
      grid-template-columns: 1.5fr auto 1fr;
      align-items: center;
    }
    .stat-label {
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 800;
      grid-column: 1;
      text-align: left;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      grid-column: 2;
      text-align: center;
    }
    .page-actions .btn {
      min-width: 96px;
      height: 40px;
      padding: 0 14px;
      white-space: nowrap;
    }
    .btn-tinted {
      background: var(--color-primary-bg);
      color: var(--color-primary);
      border-color: transparent;
      font-weight: 800;
    }
    .btn-tinted:hover {
      background: var(--color-primary-light);
    }
    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      box-shadow: var(--shadow-card);
      padding: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 14px;
      border-bottom: 1px solid var(--color-border);
      background: transparent;
    }
    .panel-title {
      font-weight: 900;
      display: none;
    }
    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filterbar select,
    .filterbar input {
      height: 28px;
      min-width: 120px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--color-text-secondary);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
      transition: all 0.2s;
    }
    .filterbar input {
      min-width: 180px;
    }
    .filterbar select:hover,
    .filterbar input:hover {
      background: var(--color-surface-alt);
      color: var(--color-text);
    }
    .filterbar select:focus,
    .filterbar input:focus {
      border-color: var(--color-primary-light);
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary-bg);
    }
    .table-wrap {
      width: 100%;
    }
    table {
      width: 100%;
      min-width: 980px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      font-weight: 900;
      white-space: nowrap;
      position: sticky;
      top: var(--nav-height);
      z-index: 10;
    }
    .col-divider {
      border-right: 1px solid var(--color-border);
    }
    .paper-title {
      max-width: 520px;
      font-weight: 900;
      line-height: 1.45;
    }
    .paper-meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
      font-size: 12px;
    }
    .paper-doi-inline {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .muted {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .mono {
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .chip.ok {
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .chip.warn {
      background: var(--color-warning-bg);
      color: var(--color-warning);
    }
    .chip.bad {
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .actions {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .action-note {
      width: 100%;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.45;
    }
    .empty,
    .error {
      margin: 14px;
      padding: 18px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
    }
    .error {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }
    .toast {
      position: fixed;
      top: calc(var(--nav-height) + 16px);
      right: 22px;
      z-index: 120;
      display: none;
      max-width: min(420px, calc(100vw - 44px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--color-primary);
      color: #fff;
      box-shadow: var(--shadow-elevated);
      font-size: 13px;
      line-height: 1.45;
    }
    @media (max-width: 820px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }
      .review-topline,
      .panel-head {
        display: block;
      }
      .page-actions {
        justify-content: flex-start;
        margin-top: 8px;
      }
      .page-actions .btn {
        height: 34px;
      }
      .toolbar,
      .filterbar {
        justify-content: flex-start;
        margin-top: 12px;
      }
      .filterbar select,
      .filterbar input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="topnav-mount"></div>
  <main class="shell">
    <div class="review-topline">
      <section class="stats" id="stats"></section>
      <div class="page-actions toolbar">
        <button class="btn btn-ghost" type="button" onclick="loadReviewCenter()">刷新</button>
        <button class="btn btn-tinted" type="button" onclick="prepareLibrary()">重建当前库材料</button>
      </div>
    </div>

    <section class="panel">
      <div class="panel-head">
        <div class="muted mono" id="queueMeta" style="font-size: 12px; font-weight: 700; letter-spacing: 0.5px;">正在读取当前库...</div>
        <div class="filterbar">
          <select id="statusFilter" onchange="renderRows()">
            <option value="">全部流程状态</option>
            <option value="group:needs_action">🚨 需要我处理</option>
            <option value="group:needs_attention">⚠️ 需要关注</option>
            <option value="group:ai_processing">⚙️ AI 正在处理</option>
            <option value="group:approved">✅ 已审核通过</option>
            <option value="group:deprecated">🗑️ 废弃旧状态</option>
          </select>
          <select id="qualityFilter" onchange="renderRows()">
            <option value="">全部 PDF 质量</option>
            <option value="A_text_readable">A 文本可读</option>
            <option value="B_text_partial">B 部分可读</option>
            <option value="C_scan_clear">C 扫描清晰</option>
            <option value="D_scan_unclear">D 扫描不清</option>
            <option value="Broken">Broken</option>
          </select>
          <input id="searchBox" type="search" placeholder="搜索标题 / 期刊 / 年份" oninput="renderRows()">
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 40px; text-align: center;">#</th>
              <th class="col-divider" style="width: 60px; text-align: center;">年份</th>
              <th class="col-divider" style="text-align: center;">文献标题</th>
              <th class="col-divider" style="width: 300px; text-align: center;">流程与质量</th>
              <th class="col-divider" style="width: 230px; text-align: center;">DFT 审计</th>
              <th style="width: 280px; text-align: center;">操作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6"><div class="empty">正在加载...</div></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const state = { rows: [], metadata: {} };

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
      });
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function toCount(value) {
      const count = Number(value || 0);
      return Number.isFinite(count) ? count : 0;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        toast.style.display = "none";
      }, 2800);
    }

    async function fetchJSON(url, options) {
      const response = await fetch(url, options || {});
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = null;
      }
      if (!response.ok) {
        throw new Error((data && data.detail) || "HTTP " + response.status);
      }
      return data;
    }

    function workflowClass(status, needsHuman) {
      if (["Human_Confirmed", "ML_Ready", "Citation_Ready", "Human_Complete", "DB_Ready"].includes(status)) return "ok";
      if (["Needs_Human_Confirmation", "Gemini_Flagged", "Evidence_Insufficient", "Rejected", "Suspected_Missing", "Unparsed"].includes(status)) return "bad";
      if (needsHuman || ["Codex_Candidate", "Initial_Parsed", "AI_Rescanned", "Gemini_Verified", "Gemini_Revised"].includes(status)) return "warn";
      return "warn";
    }

    function qualityClass(status) {
      if (status === "A_text_readable") return "ok";
      if (status === "B_text_partial" || status === "C_scan_clear") return "warn";
      if (!status) return "";
      return "bad";
    }

    function workflowMeta(status) {
      const mapping = {
        Imported: { label: "已导入", tip: "文献已进入当前库，但还没完成后续准备。" },
        Quality_Checked: { label: "已检质量", tip: "已经做过 PDF 质量判断。" },
        Parsed_Material_Ready: { label: "材料已就绪", tip: "标准工作目录、证据和图表材料已准备好。" },
        Unparsed: { label: "未解析", tip: "尚未完成 DFT/材料数据解析。" },
        Initial_Parsed: { label: "初步解析", tip: "已有候选，但还需要完整性审计和证据核对。" },
        Suspected_Missing: { label: "疑似漏提", tip: "检测到 DFT 线索多于已解析候选，建议 AI 重扫全文。" },
        AI_Rescanned: { label: "AI 已重扫", tip: "AI 已按协议重新扫描过全文，需要继续合并和审核。" },
        Human_Complete: { label: "人工确认完整", tip: "人工已确认当前候选覆盖完整。" },
        DB_Ready: { label: "可入库", tip: "已达到正式数据库入库条件。" },
        Codex_Candidate: { label: "系统候选（旧）", tip: "旧状态：系统规则候选，只能作为审核线索。" },
        Gemini_Verified: { label: "AI 已核验", tip: "AI 已通过证据核验，但还不等于最终正式确认。" },
        Gemini_Revised: { label: "AI 已修订", tip: "AI 认为候选内容需要调整后再确认。" },
        Gemini_Flagged: { label: "AI 标红", tip: "AI 发现明显疑点，建议优先人工复核。" },
        Evidence_Insufficient: { label: "证据不足", tip: "当前材料不足以支持可靠判断。" },
        Needs_Human_Confirmation: { label: "待人工确认", tip: "系统已把这篇文献留给你做最后拍板。" },
        Human_Confirmed: { label: "已人工确认", tip: "这篇文献的当前候选内容已经过人工确认。" },
        ML_Ready: { label: "可进机器学习", tip: "确认后的结构化数据已达到机器学习使用条件。" },
        Citation_Ready: { label: "可用于引用", tip: "元数据和审核状态已足够支持写作引用。" },
        Rejected: { label: "已拒绝", tip: "当前候选内容被判定不应进入正式库。" }
      };
      return mapping[status] || { label: status || "未知状态", tip: "这是系统内部状态码，后续可以继续细化说明。" };
    }

    function qualityMeta(status) {
      const mapping = {
        A_text_readable: { label: "A 可直接读", tip: "PDF 自带可读文字层，复制、检索和定位都比较可靠。" },
        B_text_partial: { label: "B 部分可读", tip: "只有部分页面或部分区域文字可直接读取，后续要谨慎核对。" },
        C_scan_clear: { label: "C 扫描清晰", tip: "是扫描版，但页面清晰，适合 OCR 辅助处理。" },
        D_scan_unclear: { label: "D 扫描不清", tip: "扫描质量较差，自动解析很容易出错。" },
        Broken: { label: "文件异常", tip: "PDF 本身存在损坏或无法稳定读取的问题。" }
      };
      return mapping[status] || { label: status || "未知", tip: "尚未获得明确的 PDF 质量判断。" };
    }

    function qualityReasonLabel(reason) {
      if (reason && String(reason).startsWith("pdf_open_failed:")) {
        return "PDF 打开失败：" + String(reason).split(":").slice(1).join(":");
      }
      const mapping = {
        native_text_is_readable: "自带文字层，可直接检索",
        native_text_is_partial: "只有部分文字层可读",
        scan_or_image_pdf_requires_ocr: "扫描版或图片型 PDF，需要 OCR 辅读",
        too_little_text_or_image_signal: "文字层和图像信号都不足，可靠性低",
        pdf_has_no_pages: "PDF 没有可读取页面",
        pdf_file_missing: "PDF 文件缺失",
        missing_pdf_reference: "文献没有 PDF 路径记录",
        file_broken_or_unreadable: "文件异常或无法读取"
      };
      return mapping[reason] || reason || "未提供原因说明";
    }

    function formatBibMeta(year, journal) {
      const yearText = year ? esc(year) : '<span title="这篇文献当前没有写入出版年份，通常是导入元数据时没提取到。">年份待补</span>';
      const journalText = journal ? esc(journal) : '<span title="这篇文献当前没有写入期刊名，通常是导入元数据时没提取到。">期刊待补</span>';
      return yearText + " | " + journalText;
    }

    function getInspectTarget(row) {
      const figureCount = toCount(row.figure_count);
      const tableCount = toCount(row.table_count);
      const evidenceCount = toCount(row.evidence_count);
      if (row.has_dft_candidates) {
        return { tab: "dft", label: "检查 DFT", note: "跳到 DFT 数据页，优先核对候选字段和证据。" };
      }
      if (figureCount > 0 || tableCount > 0) {
        return { tab: "figures", label: "检查图表", note: "当前无 DFT 候选，先核对图表、图注和裁剪结果。" };
      }
      if (evidenceCount > 0) {
        return { tab: "sections", label: "检查正文", note: "当前只有正文证据定位，跳到正文节选继续检查。" };
      }
      return { tab: "summary", label: "查看摘要", note: "这篇文献暂时没有更多候选材料，先看摘要和基础信息。" };
    }

    function renderStats() {
      const qualityCounts = state.metadata.quality_counts || {};
      const rows = state.rows || [];
      const items = [
        ["队列文献", rows.length],
        ["待人工确认", rows.filter(function (row) { return row.needs_human_confirmation; }).length],
        ["A/B 可读", Number(qualityCounts.A_text_readable || 0) + Number(qualityCounts.B_text_partial || 0)],
        ["有 DFT 候选", rows.filter(function (row) { return row.has_dft_candidates; }).length],
        ["疑似漏提", rows.reduce(function (sum, row) { return sum + Number(row.suspected_missing_dft_count || 0); }, 0)],
        ["图片可疑", rows.reduce(function (sum, row) { return sum + Number(row.unreliable_figure_count || 0); }, 0)]
      ];
      document.getElementById("stats").innerHTML = items.map(function (item) {
        return '<div class="stat"><div class="stat-label">' + esc(item[0]) + '</div><div class="stat-value">' + esc(item[1]) + '</div></div>';
      }).join("");
    }

    const STATUS_GROUPS = {
      "group:needs_action": ["Needs_Human_Confirmation", "Evidence_Insufficient", "Gemini_Flagged"],
      "group:needs_attention": ["Suspected_Missing", "Rejected"],
      "group:ai_processing": ["Imported", "Quality_Checked", "Unparsed", "Initial_Parsed", "AI_Rescanned"],
      "group:approved": ["Human_Complete", "DB_Ready", "Human_Confirmed", "ML_Ready", "Citation_Ready", "Gemini_Verified", "Gemini_Revised"],
      "group:deprecated": ["Codex_Candidate"]
    };

    function filteredRows() {
      const status = getValue("statusFilter");
      const quality = getValue("qualityFilter");
      const q = getValue("searchBox").toLowerCase();
      return state.rows.filter(function (row) {
        if (status) {
          if (status === "Needs_Human_Confirmation" && !row.needs_human_confirmation) return false;
          if (STATUS_GROUPS[status]) {
            if (!STATUS_GROUPS[status].includes(row.workflow_status)) return false;
          } else if (status !== "Needs_Human_Confirmation") {
            if (row.workflow_status !== status) return false;
          }
        }
        if (quality && row.pdf_quality_status !== quality) return false;
        if (!q) return true;
        const haystack = [row.title, row.journal, row.year, row.workflow_status, row.pdf_quality_status].join(" ").toLowerCase();
        return haystack.includes(q);
      });
    }

    function renderRows() {
      renderStats();
      const rows = filteredRows();
      document.getElementById("queueMeta").textContent = "显示 " + rows.length + " / " + state.rows.length + " 篇";
      const tbody = document.getElementById("rows");
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty">暂无匹配文献</div></td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(function (row, idx) {
        const inspectTarget = getInspectTarget(row);
        const detailUrl = "../literature_library/index.html?paper_id=" + encodeURIComponent(row.paper_id) + "&tab=" + encodeURIComponent(inspectTarget.tab);
        const evidence = toCount(row.evidence_count);
        const figureCount = toCount(row.figure_count);
        const tableCount = toCount(row.table_count);
        const workspace = row.workspace_path || "-";
        const workflow = workflowMeta(row.workflow_status);
        const quality = qualityMeta(row.pdf_quality_status);
        const dftAudit = row.dft_audit || {};
        const dftStatus = row.dft_completeness_label || dftAudit.status_label || "未解析";
        const suspectedMissing = toCount(row.suspected_missing_dft_count || dftAudit.suspected_missing_count);
        const candidateStatusCounts = row.dft_candidate_status_counts || {};
        const candidateSummary = Object.keys(candidateStatusCounts).length
          ? Object.keys(candidateStatusCounts).map(function (key) { return key + ":" + candidateStatusCounts[key]; }).join("；")
          : "无候选";
        const figureStatusCounts = row.figure_crop_status_counts || {};
        const figureSummary = Object.keys(figureStatusCounts).length
          ? Object.keys(figureStatusCounts).map(function (key) { return key + ":" + figureStatusCounts[key]; }).join("；")
          : "无图片裁剪";
        const qualityReasonText = qualityReasonLabel(row.quality_reason);
        const dftChip = row.has_dft_candidates
          ? '<span class="chip warn" title="待审 DFT 候选：系统规则/AI 候选必须经过证据审核才能入库。">待审 DFT 候选</span>'
          : '<span class="chip" title="无 DFT 候选：当前轮次未抽出可核对的 DFT 字段。">无 DFT 候选</span>';
        const dftAuditChipClass = suspectedMissing > 0 ? "bad" : (row.dft_completeness_status === "DB_Ready" ? "ok" : "warn");
        const wfChip = '<span class="chip ' + workflowClass(row.workflow_status, row.needs_human_confirmation) + '" title="' + esc(workflow.tip + " 原始状态码: " + (row.workflow_status || "Imported")) + '">' + esc(workflow.label) + '</span>';
        const qlChip = '<span class="chip ' + qualityClass(row.pdf_quality_status) + '" title="质量分: ' + esc(row.pdf_quality_score == null ? "-" : row.pdf_quality_score) + '。原因: ' + esc(qualityReasonText) + '。' + esc(quality.tip) + '">' + esc(quality.label) + '</span>';
        let wsDisp = workspace;
        if (wsDisp.length > 8) { wsDisp = "... " + wsDisp.slice(-8); }
        const doiInline = row.doi
          ? '<span class="mono paper-doi-inline" title="DOI：' + esc(row.doi) + '">DOI: ' + esc(row.doi) + '</span>'
          : '';
        let yearDisp = row.year ? esc(row.year) : '<span class="muted">-</span>';

        return '<tr>' +
          '<td style="text-align: center;"><span class="muted" style="font-size: 13px;">' + (idx + 1) + '</span></td>' +
          '<td class="col-divider" style="text-align: center;"><span style="font-size: 13px;">' + yearDisp + '</span></td>' +
          '<td class="col-divider"><div class="paper-title" title="' + esc(row.title || '未命名文献') + '">' + esc(row.title || '未命名文献') + '</div><div class="muted paper-meta-line"><span>' + esc(row.journal || '未知期刊') + '</span><span>|</span><span class="mono" title="工作目录 ID：' + esc(workspace) + '">' + esc(wsDisp) + '</span>' + (doiInline ? '<span>|</span>' + doiInline : '') + '</div></td>' +
          '<td class="col-divider"><div style="display: flex; flex-direction: row; flex-wrap: nowrap; align-items: center; justify-content: center; gap: 6px;">' + wfChip + qlChip + dftChip + '</div></td>' +
          '<td class="col-divider"><div style="display:grid;gap:6px;">' +
            '<span class="chip ' + dftAuditChipClass + '" title="DFT 完整性状态">' + esc(dftStatus) + '</span>' +
            '<div class="muted">线索: <strong>' + esc(dftAudit.detected_signal_count || 0) + '</strong>；已解析: <strong>' + esc(dftAudit.parsed_dft_count || 0) + '</strong>；疑似漏提: <strong>' + esc(suspectedMissing) + '</strong></div>' +
            '<div class="muted" title="' + esc(candidateSummary) + '">候选状态：' + esc(candidateSummary) + '</div>' +
            '<div class="muted" title="' + esc(figureSummary) + '">图片定位可靠性：可疑 ' + esc(row.unreliable_figure_count || 0) + ' / 图表 ' + esc(figureCount + tableCount) + '</div>' +
            '<div class="muted">证据定位: <strong>' + esc(evidence) + '</strong></div>' +
          '</div></td>' +
          '<td><div class="actions">' +
            '<a class="btn btn-ghost btn-sm" href="' + esc(detailUrl) + '" title="' + esc(inspectTarget.note) + '">审核候选</a>' +
            '<button class="btn btn-ghost btn-sm" type="button" onclick="preparePaper(\'' + esc(row.paper_id) + '\')">重建材料</button>' +
            '<button class="btn btn-tinted btn-sm" type="button" onclick="humanConfirm(\'' + esc(row.paper_id) + '\')">确认完整</button>' +
          '</div></td>' +
        '</tr>';
      }).join("");
    }

    async function loadReviewCenter() {
      try {
        const data = await fetchJSON("/api/workbench/review-center?limit=50");
        state.rows = data.rows || [];
        state.metadata = data.metadata || {};
        renderRows();
      } catch (error) {
        document.getElementById("queueMeta").textContent = "读取失败";
        document.getElementById("rows").innerHTML = '<tr><td colspan="6"><div class="error">加载失败：' + esc(error.message) + '</div></td></tr>';
        showToast("审核中心加载失败：" + error.message);
      }
    }

    async function preparePaper(paperId) {
      try {
        await fetchJSON("/api/workbench/papers/" + encodeURIComponent(paperId) + "/prepare", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ render_pages: false })
        });
        showToast("已重建这篇文献的审核材料：工作目录、证据定位和候选包已刷新。");
        await loadReviewCenter();
      } catch (error) {
        showToast("重建材料失败：" + error.message);
      }
    }

    async function prepareLibrary() {
      try {
        const data = await fetchJSON("/api/workbench/prepare-active-library?render_pages=false&limit=50", { method: "POST" });
        showToast("当前库材料重建完成：" + Number(data.prepared || 0) + " 篇。");
        await loadReviewCenter();
      } catch (error) {
        showToast("批量重建材料失败：" + error.message);
      }
    }

    async function humanConfirm(paperId) {
      if (!window.confirm("确认你已经检查过这篇文献的证据链和风险状态？")) return;
      try {
        await fetchJSON("/api/workbench/papers/" + encodeURIComponent(paperId) + "/human-confirm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ confirm_human_review: true, reviewer: "human", target_status: "Human_Confirmed" })
        });
        showToast("已记录人工确认");
        await loadReviewCenter();
      } catch (error) {
        showToast("确认失败：" + error.message);
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      TopNav.init({ currentPage: "review-center", mountId: "topnav-mount" });
      loadReviewCenter();
    });
  </script>
</body>
</html>
