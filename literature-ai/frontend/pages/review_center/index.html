<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核中心 - Literature AI</title>
  <link rel="stylesheet" href="../../shared/fonts.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/topnav.css">
  <script src="../../shared/topnav.js?v=20260606-ui3"></script>
  <script>ThemeManager.init();</script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-body);
    }
    .shell {
      width: min(1520px, 100%);
      margin: 0 auto;
      padding: 14px 18px 28px;
    }
    .review-topline {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .stat {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .stat-label {
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 800;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }
    .page-actions {
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      gap: 8px;
      flex: 0 0 auto;
    }
    .page-actions .btn {
      min-width: 96px;
      height: 40px;
      padding: 0 14px;
      white-space: nowrap;
    }
    .btn-tinted {
      background: var(--color-primary-bg);
      color: var(--color-primary);
      border-color: transparent;
      font-weight: 800;
    }
    .btn-tinted:hover {
      background: var(--color-primary-light);
    }
    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      box-shadow: var(--shadow-card);
      padding: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--color-border);
    }
    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filterbar select,
    .filterbar input {
      height: 30px;
      min-width: 120px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--color-text-secondary);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
    }
    .filterbar input {
      min-width: 190px;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }
    table {
      width: 100%;
      min-width: 1180px;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      font-weight: 900;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .col-divider {
      border-right: 1px solid var(--color-border);
    }
    th:nth-child(1), td:nth-child(1) { width: 46px; }
    th:nth-child(2), td:nth-child(2) { width: 68px; }
    th:nth-child(3), td:nth-child(3) { width: 30%; }
    th:nth-child(4), td:nth-child(4) { width: 28%; }
    th:nth-child(5), td:nth-child(5) { width: 20%; }
    th:nth-child(6), td:nth-child(6) { width: 22%; }
    .paper-title {
      font-weight: 900;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .paper-meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .paper-doi-inline {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .muted {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .mono {
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      max-width: 100%;
    }
    .chip.ok {
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .chip.warn {
      background: var(--color-warning-bg);
      color: var(--color-warning);
    }
    .chip.bad {
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .chip.compact {
      min-width: 0;
    }
    .chip[data-action] {
      cursor: pointer;
    }
    .status-cell,
    .audit-cell,
    .action-cell {
      min-width: 0;
    }
    .status-cluster {
      display: grid;
      gap: 8px;
    }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-start;
    }
    .audit-summary {
      display: grid;
      gap: 8px;
    }
    .audit-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .audit-metrics span {
      white-space: nowrap;
    }
    .detail-trigger-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn.btn-chip {
      min-height: 26px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }
    .empty,
    .error {
      margin: 14px;
      padding: 18px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
    }
    .error {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }
    .toast {
      position: fixed;
      top: calc(var(--nav-height) + 16px);
      right: 22px;
      z-index: 140;
      display: none;
      max-width: min(420px, calc(100vw - 44px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--color-primary);
      color: #fff;
      box-shadow: var(--shadow-elevated);
      font-size: 13px;
      line-height: 1.45;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.34);
      backdrop-filter: blur(3px);
    }
    .overlay.open {
      display: flex;
    }
    .modal-card {
      width: min(980px, calc(100vw - 40px));
      max-height: min(82vh, 920px);
      overflow: hidden;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      background: var(--color-surface);
      box-shadow: var(--shadow-elevated);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--color-border);
    }
    .modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }
    .modal-subtitle {
      margin-top: 6px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .modal-close {
      flex: 0 0 auto;
      min-width: 40px;
    }
    .modal-body {
      overflow: auto;
      padding: 16px 18px 18px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--color-border);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .detail-block {
      display: grid;
      gap: 4px;
    }
    .detail-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }
    .detail-value {
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-text);
      word-break: break-word;
    }
    .detail-list {
      margin: 0;
      padding-left: 16px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.45;
    }
    .conflict-stack {
      display: grid;
      gap: 12px;
    }
    .conflict-card {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface-alt);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .conflict-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .conflict-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--color-text);
    }
    .conflict-meta {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .opinion-list {
      display: grid;
      gap: 8px;
    }
    .opinion-item {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
      padding: 10px;
      display: grid;
      gap: 6px;
    }
    .opinion-topline {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .opinion-source {
      font-size: 12px;
      font-weight: 800;
      color: var(--color-text);
    }
    @media (max-width: 820px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }
      .review-topline,
      .panel-head {
        display: block;
      }
      .page-actions {
        justify-content: flex-start;
        margin-top: 8px;
      }
      .page-actions .btn {
        height: 34px;
      }
      .filterbar {
        margin-top: 12px;
      }
      .filterbar select,
      .filterbar input {
        width: 100%;
      }
      table {
        min-width: 980px;
      }
      .overlay {
        padding: 12px;
      }
      .modal-card {
        width: min(100vw - 16px, 980px);
        max-height: calc(100vh - 24px);
      }
    }
  </style>
</head>
<body>
  <div id="topnav-mount"></div>
  <main class="shell">
    <div class="review-topline">
      <section class="stats" id="stats"></section>
      <div class="page-actions">
        <button class="btn btn-ghost" type="button" onclick="loadReviewCenter()">刷新</button>
        <button class="btn btn-tinted" type="button" onclick="prepareLibrary()">重建当前库材料</button>
      </div>
    </div>

    <section class="panel">
      <div class="panel-head">
        <div class="muted mono" id="queueMeta" style="font-size: 12px; font-weight: 700; letter-spacing: 0.4px;">正在读取当前库...</div>
        <div class="filterbar">
          <select id="statusFilter" onchange="renderRows()">
            <option value="">全部流程状态</option>
            <option value="group:needs_action">需要我处理</option>
            <option value="group:needs_attention">需要关注</option>
            <option value="group:ai_processing">AI 处理中</option>
            <option value="group:approved">已审核通过</option>
            <option value="group:deprecated">历史旧状态</option>
          </select>
          <select id="qualityFilter" onchange="renderRows()">
            <option value="">全部 PDF 质量</option>
            <option value="A_text_readable">A 文本可读</option>
            <option value="B_text_partial">B 部分可读</option>
            <option value="C_scan_clear">C 扫描清晰</option>
            <option value="D_scan_unclear">D 扫描不清</option>
            <option value="Broken">Broken</option>
          </select>
          <input id="searchBox" type="search" placeholder="搜索标题 / 期刊 / 年份" oninput="renderRows()">
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="text-align:center;">#</th>
              <th class="col-divider" style="text-align:center;">年份</th>
              <th class="col-divider" style="text-align:center;">文献标题</th>
              <th class="col-divider" style="text-align:center;">首屏信号</th>
              <th class="col-divider" style="text-align:center;">DFT 审计</th>
              <th style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6"><div class="empty">正在加载...</div></td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <div class="overlay" id="infoOverlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="infoModalTitle">
      <div class="modal-head">
        <div>
          <h3 class="modal-title" id="infoModalTitle">详情</h3>
          <div class="modal-subtitle" id="infoModalSubtitle"></div>
        </div>
        <button class="btn btn-ghost btn-sm modal-close" type="button" onclick="closeInfoOverlay()">关闭</button>
      </div>
      <div class="modal-body" id="infoModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" type="button" onclick="closeInfoOverlay()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const state = { rows: [], metadata: {} };

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
      });
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function toCount(value) {
      const count = Number(value || 0);
      return Number.isFinite(count) ? count : 0;
    }

    function hasOwnValue(value) {
      return value !== null && value !== undefined;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        toast.style.display = "none";
      }, 2800);
    }

    async function fetchJSON(url, options) {
      const response = await fetch(url, options || {});
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = null;
      }
      if (!response.ok) {
        throw new Error((data && data.detail) || ("HTTP " + response.status));
      }
      return data;
    }

    function workflowClass(status, needsHuman) {
      if (["Human_Confirmed", "ML_Ready", "Citation_Ready", "Human_Complete", "DB_Ready"].includes(status)) return "ok";
      if (["Needs_Human_Confirmation", "Gemini_Flagged", "Evidence_Insufficient", "Rejected", "Suspected_Missing", "Unparsed"].includes(status)) return "bad";
      if (needsHuman || ["Codex_Candidate", "Initial_Parsed", "AI_Rescanned", "Gemini_Verified", "Gemini_Revised"].includes(status)) return "warn";
      return "warn";
    }

    function qualityClass(status) {
      if (status === "A_text_readable") return "ok";
      if (status === "B_text_partial" || status === "C_scan_clear") return "warn";
      if (!status) return "";
      return "bad";
    }

    function workflowMeta(status) {
      const mapping = {
        Imported: { label: "已导入", tip: "文献已经进入当前库，但还没有完成后续准备。" },
        Quality_Checked: { label: "已检质量", tip: "已经完成 PDF 质量判断。" },
        Parsed_Material_Ready: { label: "材料已就绪", tip: "工作目录、证据和图表材料已经准备好。" },
        Unparsed: { label: "未解析", tip: "尚未完成 DFT 或材料数据解析。" },
        Initial_Parsed: { label: "初步解析", tip: "已经有候选，但还需要完整性审计和证据核对。" },
        Suspected_Missing: { label: "疑似漏提", tip: "检测到 DFT 线索多于已解析候选，建议优先复核全文。" },
        AI_Rescanned: { label: "AI 已重扫", tip: "AI 已按协议重新扫描全文，仍需要继续合并和审核。" },
        Human_Complete: { label: "人工确认完整", tip: "人工已经确认当前候选覆盖完整。" },
        DB_Ready: { label: "可入库", tip: "已达到正式数据库入库条件。" },
        Codex_Candidate: { label: "系统候选", tip: "旧状态，仅作为审核线索，不代表最终结论。" },
        Gemini_Verified: { label: "AI 已核验", tip: "AI 已核验证据，但仍不等于最终正式确认。" },
        Gemini_Revised: { label: "AI 已修订", tip: "AI 认为候选内容需要调整后再确认。" },
        Gemini_Flagged: { label: "AI 标红", tip: "AI 发现明显疑点，建议优先人工复核。" },
        Evidence_Insufficient: { label: "证据不足", tip: "当前材料不足以支持可靠判断。" },
        Needs_Human_Confirmation: { label: "待人工确认", tip: "系统已把这篇文献留给你做最后拍板。" },
        Human_Confirmed: { label: "已人工确认", tip: "这篇文献的当前候选已经过人工确认。" },
        ML_Ready: { label: "可进机器学习", tip: "确认后的结构化数据已达到机器学习使用条件。" },
        Citation_Ready: { label: "可用于引用", tip: "元数据和审核状态已经足够支持写作引用。" },
        Rejected: { label: "已拒绝", tip: "当前候选内容被判定不应进入正式库。" }
      };
      return mapping[status] || { label: status || "未知状态", tip: "这是系统内部状态码，仍建议查看详情。" };
    }

    function qualityMeta(status) {
      const mapping = {
        A_text_readable: { label: "A 可直接读", tip: "PDF 自带文字层，搜索和定位都比较可靠。" },
        B_text_partial: { label: "B 部分可读", tip: "只有部分页面或部分区域文字可直接读取，后续要谨慎核对。" },
        C_scan_clear: { label: "C 扫描清晰", tip: "扫描版较清晰，适合 OCR 辅助处理。" },
        D_scan_unclear: { label: "D 扫描不清", tip: "扫描质量较差，自动解析容易出错。" },
        Broken: { label: "文件异常", tip: "PDF 可能损坏或无法稳定读取。" }
      };
      return mapping[status] || { label: status || "未知", tip: "尚未获得明确的 PDF 质量判断。" };
    }

    function qualityReasonLabel(reason) {
      if (reason && String(reason).startsWith("pdf_open_failed:")) {
        return "PDF 打开失败：" + String(reason).split(":").slice(1).join(":");
      }
      const mapping = {
        native_text_is_readable: "自带文字层，可直接检索",
        native_text_is_partial: "只有部分文字层可读",
        scan_or_image_pdf_requires_ocr: "扫描版或图片型 PDF，需要 OCR 辅读",
        too_little_text_or_image_signal: "文字层和图像信号都不足，可靠性低",
        pdf_has_no_pages: "PDF 没有可读取页面",
        pdf_file_missing: "PDF 文件缺失",
        missing_pdf_reference: "文献没有 PDF 路径记录",
        file_broken_or_unreadable: "文件异常或无法读取"
      };
      return mapping[reason] || reason || "未提供具体原因。";
    }

    function getInspectTarget(row) {
      const figureCount = toCount(row.figure_count);
      const tableCount = toCount(row.table_count);
      const evidenceCount = toCount(row.evidence_count);
      if (row.has_dft_candidates) {
        return { tab: "dft", note: "跳到 DFT 数据页，优先核对候选字段和证据。" };
      }
      if (figureCount > 0 || tableCount > 0) {
        return { tab: "figures", note: "当前没有 DFT 候选，先核对图表和图注。" };
      }
      if (evidenceCount > 0) {
        return { tab: "sections", note: "当前只有正文证据定位，跳到正文继续检查。" };
      }
      return { tab: "summary", note: "当前没有更多候选材料，先看摘要和基础信息。" };
    }

    function renderStats() {
      const qualityCounts = state.metadata.quality_counts || {};
      const rows = state.rows || [];
      const items = [
        ["队列文献", rows.length],
        ["待人工确认", rows.filter(function (row) { return row.needs_human_confirmation; }).length],
        ["A/B 可读", Number(qualityCounts.A_text_readable || 0) + Number(qualityCounts.B_text_partial || 0)],
        ["有 DFT 候选", rows.filter(function (row) { return row.has_dft_candidates; }).length],
        ["疑似漏提", rows.reduce(function (sum, row) { return sum + Number(row.suspected_missing_dft_count || 0); }, 0)],
        ["图像风险", rows.reduce(function (sum, row) { return sum + Number(row.figure_issue_count || 0); }, 0)],
        ["AI 冲突", rows.reduce(function (sum, row) { return sum + Number(row.review_conflict_count || 0); }, 0)]
      ];
      document.getElementById("stats").innerHTML = items.map(function (item) {
        return '<div class="stat"><div class="stat-label">' + esc(item[0]) + '</div><div class="stat-value">' + esc(item[1]) + '</div></div>';
      }).join("");
    }

    const STATUS_GROUPS = {
      "group:needs_action": ["Needs_Human_Confirmation", "Evidence_Insufficient", "Gemini_Flagged"],
      "group:needs_attention": ["Suspected_Missing", "Rejected"],
      "group:ai_processing": ["Imported", "Quality_Checked", "Unparsed", "Initial_Parsed", "AI_Rescanned"],
      "group:approved": ["Human_Complete", "DB_Ready", "Human_Confirmed", "ML_Ready", "Citation_Ready", "Gemini_Verified", "Gemini_Revised"],
      "group:deprecated": ["Codex_Candidate"]
    };

    function filteredRows() {
      const status = getValue("statusFilter");
      const quality = getValue("qualityFilter");
      const q = getValue("searchBox").toLowerCase();
      return state.rows.filter(function (row) {
        if (status) {
          if (status === "Needs_Human_Confirmation" && !row.needs_human_confirmation) return false;
          if (STATUS_GROUPS[status]) {
            if (!STATUS_GROUPS[status].includes(row.workflow_status)) return false;
          } else if (status !== "Needs_Human_Confirmation" && row.workflow_status !== status) {
            return false;
          }
        }
        if (quality && row.pdf_quality_status !== quality) return false;
        if (!q) return true;
        const haystack = [row.title, row.journal, row.year, row.workflow_status, row.pdf_quality_status].join(" ").toLowerCase();
        return haystack.includes(q);
      });
    }

    function objectAuditSummary(row) {
      const audits = Array.isArray(row.object_review_audits) ? row.object_review_audits : [];
      if (!audits.length) return "no object_review_audit";
      return audits.slice(0, 5).map(function (audit) {
        return [
          audit.candidate_type || "object_review_audit",
          audit.source_label || audit.source || audit.agent_role || audit.model_name || "object_review_audit",
          audit.target_type,
          audit.field_name,
          audit.decision || audit.recommended_action || "review",
          audit.verification_status || "unverified",
          audit.reason
        ].filter(Boolean).join(" / ");
      }).join("\n");
    }

    function locatorIssueLabel(code) {
      const mapping = {
        text_only_locator: "text-only",
        missing_bbox: "missing bbox",
        missing_page: "missing page",
        missing_locator: "missing locator",
        approximate_locator: "approximate locator",
        unresolved_locator: "unresolved locator"
      };
      return mapping[code] || code;
    }

    function figureIssueLabel(code) {
      const mapping = {
        missing_full_page_snapshot: "missing full-page snapshot",
        small_crop: "small crop",
        missing_bbox: "missing bbox",
        extreme_aspect_ratio: "extreme aspect ratio",
        caption_only: "caption only",
        missing_image: "missing image",
        missing_page: "missing page"
      };
      return mapping[code] || code;
    }

    function compactPdfStatus(row) {
      const status = row.pdf_artifact_status && typeof row.pdf_artifact_status === "object" ? row.pdf_artifact_status : {};
      return {
        hasPdf: row.pdf_exists === true || status.pdf_exists === true,
        pathKind: hasOwnValue(row.pdf_path_kind) ? row.pdf_path_kind : (status.pdf_path_kind || "unknown"),
        size: hasOwnValue(row.pdf_file_size) ? row.pdf_file_size : status.pdf_file_size,
        blockers: Array.isArray(status.blocking_errors) ? status.blocking_errors : []
      };
    }

    function compactPdfChip(row) {
      const pdf = compactPdfStatus(row);
      const title = [
        pdf.hasPdf ? "PDF exists" : "PDF missing or unresolved",
        "path kind: " + pdf.pathKind,
        hasOwnValue(pdf.size) ? "size: " + pdf.size + " bytes" : null,
        pdf.blockers.length ? "blockers: " + pdf.blockers.join(", ") : null
      ].filter(Boolean).join("\n");
      return '<span class="chip compact ' + (pdf.hasPdf ? "ok" : "bad") + '" title="' + esc(title) + '">' + (pdf.hasPdf ? "PDF 可用" : "PDF 缺失") + '</span>';
    }

    function compactSummarizeCounts(counts, formatter) {
      return Object.keys(counts || {}).map(function (key) {
        return { key: key, count: toCount(counts[key]) };
      }).filter(function (item) {
        return item.count > 0;
      }).sort(function (left, right) {
        if (right.count !== left.count) return right.count - left.count;
        return left.key.localeCompare(right.key);
      }).map(function (item) {
        return (formatter ? formatter(item.key) : item.key) + ": " + item.count;
      });
    }

    function compactIssueTitle(topIssues, issueCounts, formatter, emptyText) {
      const lines = Array.isArray(topIssues) && topIssues.length
        ? topIssues.map(function (item) { return (formatter ? formatter(item.code) : item.code) + ": " + toCount(item.count); })
        : compactSummarizeCounts(issueCounts || {}, formatter);
      return lines.length ? lines.join("\n") : emptyText;
    }

    function compactIssueList(topIssues, issueCounts, formatter, emptyText) {
      const lines = Array.isArray(topIssues) && topIssues.length
        ? topIssues.map(function (item) { return (formatter ? formatter(item.code) : item.code) + ": " + toCount(item.count); })
        : compactSummarizeCounts(issueCounts || {}, formatter);
      if (!lines.length) {
        return '<div class="detail-value muted">' + esc(emptyText) + '</div>';
      }
      return '<ul class="detail-list">' + lines.map(function (line) {
        return '<li>' + esc(line) + '</li>';
      }).join("") + '</ul>';
    }

    function compactExtractionMeta(row) {
      const dftAudit = row.dft_audit && typeof row.dft_audit === "object" ? row.dft_audit : {};
      const suspectedMissing = hasOwnValue(row.suspected_missing_dft_count)
        ? toCount(row.suspected_missing_dft_count)
        : toCount(dftAudit.suspected_missing_count);
      if (suspectedMissing > 0) {
        return { label: "疑似漏提", className: "bad", tip: "检测到 DFT 线索多于已解析候选，建议优先复核全文。", suspectedMissing: suspectedMissing };
      }
      if (row.has_dft_candidates === true) {
        return { label: "待审 DFT", className: "warn", tip: "已有待审 DFT 候选，下一步去证据页核对字段和定位。", suspectedMissing: suspectedMissing };
      }
      if (row.has_dft_candidates === false) {
        return { label: "未见 DFT", className: "", tip: "当前没有可审核的 DFT 候选。", suspectedMissing: suspectedMissing };
      }
      if (row.dft_completeness_status === "Initial_Parsed" || dftAudit.coverage_status === "Initial_Parsed") {
        return { label: "初步解析", className: "warn", tip: "已完成初步解析，但候选状态仍需继续确认。", suspectedMissing: suspectedMissing };
      }
      return { label: "未解析", className: "", tip: "尚未形成稳定的 DFT 提取结果。", suspectedMissing: suspectedMissing };
    }

    function compactRiskChip(label, count, title, options) {
      const config = options || {};
      const chipClass = count > 0 ? (config.activeClass || "warn") : (config.zeroClass || "ok");
      const attrs = config.dataAction ? ' data-action="' + esc(config.dataAction) + '"' : "";
      return '<span class="chip compact ' + chipClass + '"' + attrs + ' title="' + esc(title) + '">' + esc(label) + " " + esc(count) + '</span>';
    }

    function compactDetailSection(label, content) {
      return '<div class="detail-block"><div class="detail-label">' + esc(label) + '</div>' + content + '</div>';
    }

    function compactInfoList(items, emptyText) {
      const lines = (items || []).filter(Boolean);
      if (!lines.length) {
        return '<div class="detail-value muted">' + esc(emptyText) + '</div>';
      }
      return '<ul class="detail-list">' + lines.map(function (line) {
        return '<li>' + esc(line) + '</li>';
      }).join("") + '</ul>';
    }

    function modalContent(title, subtitle, html) {
      document.getElementById("infoModalTitle").textContent = title || "详情";
      document.getElementById("infoModalSubtitle").textContent = subtitle || "";
      document.getElementById("infoModalBody").innerHTML = html || "";
      const overlay = document.getElementById("infoOverlay");
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeInfoOverlay() {
      const overlay = document.getElementById("infoOverlay");
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      document.getElementById("infoModalBody").innerHTML = "";
    }

    function buildRowDetailModal(row) {
      const workflow = workflowMeta(row.workflow_status);
      const quality = qualityMeta(row.pdf_quality_status);
      const qualityReasonText = qualityReasonLabel(row.quality_reason);
      const dftAudit = row.dft_audit && typeof row.dft_audit === "object" ? row.dft_audit : {};
      const detectedSignals = hasOwnValue(dftAudit.detected_signal_count) ? toCount(dftAudit.detected_signal_count) : 0;
      const parsedCount = hasOwnValue(dftAudit.parsed_dft_count) ? toCount(dftAudit.parsed_dft_count) : 0;
      const suspectedMissing = hasOwnValue(row.suspected_missing_dft_count)
        ? toCount(row.suspected_missing_dft_count)
        : toCount(dftAudit.suspected_missing_count);
      const latestAudit = (row.external_audit_opinions || [])[0] || null;
      const latestAuditText = latestAudit
        ? [
            latestAudit.source_label || latestAudit.source || "external audit",
            latestAudit.verdict || latestAudit.recommended_action || "review",
            latestAudit.verification_status || "unverified"
          ].filter(Boolean).join(" / ")
        : "no external audit";
      const objectAuditLines = (row.object_review_audits || []).slice(0, 5).map(function (audit) {
        return [
          audit.source_label || audit.source || audit.agent_role || audit.model_name || "object_review_audit",
          audit.target_type,
          audit.field_name,
          audit.decision || audit.recommended_action || "review",
          audit.verification_status || "unverified"
        ].filter(Boolean).join(" / ");
      });
      const candidateSummaryLines = compactSummarizeCounts(row.dft_candidate_status_counts || {}, null);
      const cropSummaryLines = compactSummarizeCounts(row.figure_crop_status_counts || {}, null);
      const html = '<div class="detail-grid">' +
        compactDetailSection("PDF 状态", '<div class="detail-value">' + esc(quality.label) + ' | ' + esc(qualityReasonText) + '</div><div class="detail-value muted">' + esc(workflow.label) + ' | ' + esc(workflow.tip) + '</div>') +
        compactDetailSection("Figure 风险", compactIssueList(row.top_figure_issues, (row.figure_reliability || {}).issue_counts || row.figure_issue_counts || {}, figureIssueLabel, "No figure reliability warnings.")) +
        compactDetailSection("Locator 风险", compactIssueList(row.top_locator_issues, (row.locator_reliability || {}).issue_counts || row.locator_issue_counts || {}, locatorIssueLabel, "No locator reliability warnings.")) +
        compactDetailSection("External audit", '<div class="detail-value">External audit: ' + esc(toCount(row.external_audit_count)) + '</div><div class="detail-value muted">' + esc(latestAuditText) + '</div>') +
        compactDetailSection("Object audit", '<div class="detail-value">Object audits: ' + esc(toCount(row.object_review_audit_count)) + '</div>' + compactInfoList(objectAuditLines, "No object-level AI audits.")) +
        compactDetailSection("候选状态", '<div class="detail-value">' + esc(candidateSummaryLines.length ? candidateSummaryLines.join(", ") : "无候选") + '</div>') +
        compactDetailSection("提取概览", '<div class="detail-value">线索 ' + esc(detectedSignals) + ' | 已解析 ' + esc(parsedCount) + ' | 疑似漏提 ' + esc(suspectedMissing) + '</div><div class="detail-value muted">图表 ' + esc(toCount(row.figure_count) + toCount(row.table_count)) + ' | 证据定位 ' + esc(toCount(row.evidence_count)) + ' | figure crop ' + esc(cropSummaryLines.length ? cropSummaryLines.join(", ") : "none") + '</div>') +
      '</div>';
      return {
        title: row.title || "文献详情",
        subtitle: [row.journal || "", row.year || "", row.doi || ""].filter(Boolean).join(" | "),
        html: html
      };
    }

    async function openRowConflictModal(row) {
      modalContent("冲突详情", [row.title || "", "正在读取只读冲突聚合…"].filter(Boolean).join(" | "), '<div class="detail-value muted">加载中...</div>');
      try {
        const params = new URLSearchParams({
          paper_id: row.paper_id,
          include_non_conflicts: "false",
          limit: "200"
        });
        const payload = await fetchJSON("/api/workbench/review-conflicts?" + params.toString());
        const conflictRows = Array.isArray(payload.rows) ? payload.rows : [];
        const html = conflictRows.length
          ? '<div class="conflict-stack">' + conflictRows.map(function (item) {
              const opinions = Array.isArray(item.opinions) ? item.opinions : [];
              return '<div class="conflict-card">' +
                '<div class="conflict-head">' +
                  '<div class="conflict-title">' + esc((item.target_type || "target") + " / " + (item.field_name || "field")) + '</div>' +
                  '<span class="chip bad">' + esc((item.conflict_types || []).join(", ") || "conflict") + '</span>' +
                  '<span class="chip">reviewers ' + esc(toCount(item.reviewer_count)) + '</span>' +
                '</div>' +
                '<div class="conflict-meta">target_id: ' + esc(item.target_id || "-") + '</div>' +
                '<div class="opinion-list">' + opinions.map(function (opinion) {
                  const evidence = opinion.evidence && typeof opinion.evidence === "object" ? opinion.evidence : {};
                  const locator = evidence.locator && typeof evidence.locator === "object" ? evidence.locator : evidence;
                  const pageText = hasOwnValue(locator.page) ? ("page " + locator.page) : "";
                  return '<div class="opinion-item">' +
                    '<div class="opinion-topline">' +
                      '<div class="opinion-source">' + esc(opinion.source_label || opinion.source || opinion.agent_role || opinion.model_name || opinion.source_type || "review") + '</div>' +
                      '<span class="chip">' + esc(opinion.decision || opinion.status || "review") + '</span>' +
                      (hasOwnValue(opinion.confidence) ? '<span class="chip">confidence ' + esc(opinion.confidence) + '</span>' : '') +
                    '</div>' +
                    '<div class="detail-value muted">' + esc([opinion.value, opinion.unit].filter(Boolean).join(" ")) + '</div>' +
                    '<div class="detail-value muted">' + esc([pageText, locator.locator_status || "", opinion.reason || ""].filter(Boolean).join(" | ")) + '</div>' +
                  '</div>';
                }).join("") + '</div>' +
              '</div>';
            }).join("") + '</div>'
          : '<div class="detail-value muted">当前没有可展示的字段冲突明细。</div>';
        modalContent("冲突详情", [row.title || "", "只读聚合，不自动合并"].filter(Boolean).join(" | "), html);
      } catch (error) {
        modalContent("冲突详情", row.title || "", '<div class="error" style="margin:0;">加载冲突失败：' + esc(error.message) + '</div>');
      }
    }

    function handleRowAction(event) {
      const actionNode = event.target.closest("[data-action]");
      if (!actionNode) return;
      const action = actionNode.getAttribute("data-action");
      const rowNode = event.target.closest("tr[data-paper-id]");
      if (!rowNode) return;
      const row = state.rows.find(function (item) {
        return String(item.paper_id) === String(rowNode.getAttribute("data-paper-id"));
      });
      if (!row) return;
      event.preventDefault();
      if (action === "open-details") {
        const payload = buildRowDetailModal(row);
        modalContent(payload.title, payload.subtitle, payload.html);
      } else if (action === "open-conflicts") {
        openRowConflictModal(row);
      }
    }

    function renderRows() {
      renderStats();
      const rows = filteredRows();
      document.getElementById("queueMeta").textContent = "显示 " + rows.length + " / " + state.rows.length + " 篇";
      const tbody = document.getElementById("rows");
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty">暂无匹配文献</div></td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(function (row, idx) {
        const inspectTarget = getInspectTarget(row);
        const detailUrl = "../literature_library/index.html?paper_id=" + encodeURIComponent(row.paper_id) + "&tab=" + encodeURIComponent(inspectTarget.tab);
        const workflow = workflowMeta(row.workflow_status);
        const extraction = compactExtractionMeta(row);
        const dftAudit = row.dft_audit && typeof row.dft_audit === "object" ? row.dft_audit : {};
        const detectedSignals = hasOwnValue(dftAudit.detected_signal_count) ? toCount(dftAudit.detected_signal_count) : 0;
        const parsedCount = hasOwnValue(dftAudit.parsed_dft_count) ? toCount(dftAudit.parsed_dft_count) : 0;
        const suspectedMissing = extraction.suspectedMissing;
        const figureIssueCount = toCount(row.figure_issue_count);
        const locatorIssueCount = toCount(row.locator_issue_count);
        const conflictCount = toCount(row.review_conflict_count);
        const figureIssueTitle = compactIssueTitle(
          row.top_figure_issues,
          (row.figure_reliability || {}).issue_counts || row.figure_issue_counts || {},
          figureIssueLabel,
          "No figure reliability warnings."
        );
        const locatorIssueTitle = compactIssueTitle(
          row.top_locator_issues,
          (row.locator_reliability || {}).issue_counts || row.locator_issue_counts || {},
          locatorIssueLabel,
          "No locator reliability warnings."
        );
        const dftBadgeLabel = extraction.label;
        const dftBadgeClass = extraction.className || (row.dft_completeness_status === "DB_Ready" ? "ok" : "warn");
        const dftBadgeTitle = extraction.tip || "当前 DFT 提取状态摘要。";
        const workspace = row.workspace_path || "-";
        const shortWorkspace = workspace.length > 12 ? ("... " + workspace.slice(-12)) : workspace;
        const doiInline = row.doi
          ? '<span class="mono paper-doi-inline" title="DOI: ' + esc(row.doi) + '">DOI: ' + esc(row.doi) + '</span>'
          : '';
        const titleText = row.title || "未命名文献";
        const journalText = row.journal || "未知期刊";
        const yearText = row.year ? esc(row.year) : '<span class="muted">-</span>';

        return '<tr data-paper-id="' + esc(row.paper_id) + '">' +
          '<td style="text-align:center;"><span class="muted" style="font-size:13px;">' + (idx + 1) + '</span></td>' +
          '<td class="col-divider" style="text-align:center;"><span style="font-size:13px;">' + yearText + '</span></td>' +
          '<td class="col-divider">' +
            '<div class="paper-title" title="' + esc(titleText) + '">' + esc(titleText) + '</div>' +
            '<div class="paper-meta-line"><span>' + esc(journalText) + '</span><span>|</span><span class="mono" title="Workspace: ' + esc(workspace) + '">' + esc(shortWorkspace) + '</span>' + (doiInline ? '<span>|</span>' + doiInline : '') + '</div>' +
          '</td>' +
          '<td class="col-divider status-cell">' +
            '<div class="status-cluster">' +
              '<div class="status-row">' +
                '<span class="chip compact ' + workflowClass(row.workflow_status, row.needs_human_confirmation) + '" title="' + esc(workflow.tip) + '">' + esc(workflow.label) + '</span>' +
                compactPdfChip(row) +
                '<span class="chip compact ' + esc(extraction.className) + '" title="' + esc(extraction.tip) + '">' + esc(extraction.label) + '</span>' +
              '</div>' +
              '<div class="status-row">' +
                compactRiskChip("定位风险", locatorIssueCount, locatorIssueTitle, { activeClass: "warn", zeroClass: "ok" }) +
                compactRiskChip("图像风险", figureIssueCount, figureIssueTitle, { activeClass: "warn", zeroClass: "ok" }) +
                compactRiskChip("冲突", conflictCount, conflictCount > 0 ? "点击查看只读冲突聚合详情。" : "未检测到多审核来源字段冲突。", { activeClass: "bad", zeroClass: "ok", dataAction: conflictCount > 0 ? "open-conflicts" : "" }) +
              '</div>' +
            '</div>' +
          '</td>' +
          '<td class="col-divider audit-cell">' +
            '<div class="audit-summary">' +
              '<span class="chip compact ' + dftBadgeClass + '" title="' + esc(dftBadgeTitle) + '">' + esc(dftBadgeLabel) + '</span>' +
              '<div class="muted audit-metrics"><span>线索 ' + esc(detectedSignals) + '</span><span>已解析 ' + esc(parsedCount) + '</span><span>漏提 ' + esc(suspectedMissing) + '</span></div>' +
              '<div class="detail-trigger-row"><button class="btn btn-ghost btn-sm btn-chip" type="button" data-action="open-details">查看详情</button></div>' +
            '</div>' +
          '</td>' +
          '<td class="action-cell">' +
            '<div class="actions">' +
              '<a class="btn btn-ghost btn-sm" href="' + esc(detailUrl) + '" title="' + esc(inspectTarget.note) + '">审核候选</a>' +
              '<button class="btn btn-ghost btn-sm" type="button" onclick="preparePaper(\'' + esc(row.paper_id) + '\')">重建材料</button>' +
              '<button class="btn btn-tinted btn-sm" type="button" onclick="humanConfirm(\'' + esc(row.paper_id) + '\')">确认完整</button>' +
            '</div>' +
          '</td>' +
        '</tr>';
      }).join("");
    }

    async function loadReviewCenter() {
      try {
        const data = await fetchJSON("/api/workbench/review-center?limit=50");
        state.rows = data.rows || [];
        state.metadata = data.metadata || {};
        renderRows();
      } catch (error) {
        document.getElementById("queueMeta").textContent = "读取失败";
        document.getElementById("rows").innerHTML = '<tr><td colspan="6"><div class="error">加载失败：' + esc(error.message) + '</div></td></tr>';
        showToast("审核中心加载失败：" + error.message);
      }
    }

    async function preparePaper(paperId) {
      try {
        await fetchJSON("/api/workbench/papers/" + encodeURIComponent(paperId) + "/prepare", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ render_pages: false })
        });
        showToast("已重建这篇文献的审核材料。");
        await loadReviewCenter();
      } catch (error) {
        showToast("重建材料失败：" + error.message);
      }
    }

    async function prepareLibrary() {
      try {
        const data = await fetchJSON("/api/workbench/prepare-active-library?render_pages=false&limit=50", { method: "POST" });
        showToast("当前库材料重建完成：" + Number(data.prepared || 0) + " 篇。");
        await loadReviewCenter();
      } catch (error) {
        showToast("批量重建材料失败：" + error.message);
      }
    }

    async function humanConfirm(paperId) {
      if (!window.confirm("确认你已经检查过这篇文献的证据链和风险状态？")) return;
      try {
        await fetchJSON("/api/workbench/papers/" + encodeURIComponent(paperId) + "/human-confirm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ confirm_human_review: true, reviewer: "human", target_status: "Human_Confirmed" })
        });
        showToast("已记录人工确认");
        await loadReviewCenter();
      } catch (error) {
        showToast("确认失败：" + error.message);
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      TopNav.init({ currentPage: "review-center", mountId: "topnav-mount" });
      document.getElementById("rows").addEventListener("click", handleRowAction);
      document.getElementById("infoOverlay").addEventListener("click", function (event) {
        if (event.target && event.target.id === "infoOverlay") closeInfoOverlay();
      });
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") closeInfoOverlay();
      });
      loadReviewCenter();
    });
  </script>
</body>
</html>
