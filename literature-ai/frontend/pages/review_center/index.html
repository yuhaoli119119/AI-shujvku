<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核中心 - Literature AI</title>
  <link rel="stylesheet" href="../../shared/fonts.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/topnav.css">
  <script src="../../shared/topnav.js?v=20260606-ui3"></script>
  <script>ThemeManager.init();</script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-body);
      --review-panel-head-height: 0px;
    }
    .shell {
      width: min(1520px, 100%);
      margin: 0 auto;
      padding: 0 16px 8px;
    }
    .review-topline {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 16px;
      margin-bottom: 12px;
      padding: 0;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .stat {
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .stat-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      background: var(--color-primary-bg);
      color: var(--color-primary);
    }
    .stat-icon::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 2px rgba(12, 87, 164, 0.12);
    }
    .stat-icon-docs {
      color: #0f766e;
    }
    .stat-icon-human {
      color: #0f766e;
    }
    .stat-icon-quality {
      color: #0f766e;
    }
    .stat-icon-dft {
      color: #0f766e;
    }
    .stat-icon-conflict {
      color: #0f766e;
    }
    .stat-label {
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat-value {
      font-size: 17px;
      font-weight: 900;
      line-height: 1;
    }
    .page-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      flex: 0 0 472px;
    }
    .page-actions .btn {
      min-width: 0;
      height: 36px;
      padding: 0 8px;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 850;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .page-actions select.btn {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      color: var(--color-text);
      text-align: center;
      text-align-last: center;
      cursor: pointer;
    }
    .btn-tinted {
      background: var(--color-primary-bg);
      color: var(--color-primary);
      border-color: transparent;
      font-weight: 800;
    }
    .btn-tinted:hover {
      background: var(--color-primary-light);
    }
    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      box-shadow: var(--shadow-card);
      padding: 0;
      margin-bottom: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: var(--nav-height);
      z-index: 32;
      background: var(--color-surface);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }
    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filterbar select,
    .filterbar input {
      height: 30px;
      min-width: 120px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--color-text-secondary);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
    }
    .filterbar input {
      min-width: 190px;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      position: relative;
    }
    .review-table-head-shell {
      position: sticky;
      top: calc(var(--nav-height) + var(--review-panel-head-height));
      z-index: 24;
      overflow: hidden;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-alt);
    }
    .review-table-head {
      min-width: 1080px;
      display: grid;
      grid-template-columns: 108px 70px minmax(320px, 36fr) minmax(180px, 18fr) minmax(220px, 24fr) minmax(150px, 16fr);
      transform: translateX(0);
      will-change: transform;
    }
    .review-table-head-cell {
      min-height: 35px;
      padding: 2px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      border-right: 1px solid var(--color-border);
      background: var(--color-surface-alt);
    }
    .review-table-head-cell:last-child {
      border-right: 0;
    }
    .review-table-head-cell.id-head {
      justify-content: flex-start;
      padding-left: 16px;
    }
    .review-table-head-cell.id-head .select-head {
      justify-items: start;
      min-width: 72px;
    }
    .panel-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 40px;
      padding: 4px 12px;
      border-top: 1px solid var(--color-border);
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.96));
    }
    .pagination-meta {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1;
    }
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .pagination-pages {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .page-size-box {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }
    .page-size-box select {
      height: 28px;
      min-width: 72px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      color: var(--color-text);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }
    .page-indicator {
      min-width: 34px;
      height: 28px;
      padding: 0 8px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .page-indicator.is-active {
      border-color: transparent;
      background: var(--color-primary);
      color: #fff;
      box-shadow: 0 8px 18px rgba(12, 87, 164, 0.22);
    }
    .page-indicator[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    table {
      width: 100%;
      min-width: 1080px;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }
    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--color-border);
      text-align: left;
      vertical-align: middle;
    }
    table thead {
      display: none;
    }
    th {
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      font-weight: 900;
      white-space: nowrap;
      position: static;
    }
    .col-divider {
      border-right: 1px solid var(--color-border);
    }
    th:nth-child(1), td:nth-child(1) { width: 108px; }
    th:nth-child(2), td:nth-child(2) { width: 70px; }
    th:nth-child(3), td:nth-child(3) { width: 36%; }
    th:nth-child(4), td:nth-child(4) { width: 18%; }
    th:nth-child(5), td:nth-child(5) { width: 24%; }
    th:nth-child(6), td:nth-child(6) { width: 16%; }
    .paper-title {
      font-weight: 900;
      line-height: 1.28;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .select-head,
    .row-select-cell {
      display: inline-grid;
      grid-template-columns: 16px 1fr;
      align-items: center;
      justify-content: center;
      justify-items: center;
      gap: 4px;
      min-width: 44px;
    }
    .row-select-cell {
      justify-items: start;
      min-width: 86px;
    }
    .row-paper-code {
      display: inline-block;
      max-width: 64px;
      font-size: 12px;
      font-weight: 800;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .select-head input,
    .row-select-cell input {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      margin: 0;
    }
    .paper-meta-line {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
      font-size: 11px;
      color: var(--color-text-secondary);
      min-width: 0;
    }
    .paper-doi-inline {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .muted {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .mono {
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      max-width: 100%;
    }
    .chip.ok {
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .chip.warn {
      background: var(--color-warning-bg);
      color: var(--color-warning);
    }
    .chip.bad {
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .chip.mid {
      background: #fff1df;
      color: #b45309;
    }
    .chip.low {
      background: #fff8cc;
      color: #a16207;
    }
    .chip.subtle {
      background: var(--color-surface-alt);
      color: var(--color-text-tertiary, var(--color-text-secondary));
      border: 1px dashed var(--color-border);
    }
    .chip.compact {
      min-width: 0;
    }
    .chip[data-action] {
      cursor: pointer;
    }
    .status-cell,
    .audit-cell,
    .action-cell {
      min-width: 0;
    }
    .status-cluster {
      display: grid;
      gap: 5px;
    }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: flex-start;
    }
    .audit-summary {
      display: grid;
      gap: 5px;
    }
    .audit-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: nowrap;
    }
    .audit-topline-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: nowrap;
    }
    .audit-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      line-height: 1.35;
    }
    .audit-metrics span {
      white-space: nowrap;
    }
    .audit-metrics .active {
      color: var(--color-danger);
      font-weight: 800;
    }
    .btn.btn-chip {
      min-height: 26px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
    }
    .actions .btn-sm {
      min-height: 26px;
      padding: 4px 8px;
      font-size: 11px;
    }
    .empty,
    .error {
      margin: 14px;
      padding: 18px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
    }
    .error {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }
    .toast {
      position: fixed;
      top: calc(var(--nav-height) + 16px);
      right: 22px;
      z-index: 140;
      display: none;
      max-width: min(420px, calc(100vw - 44px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--color-primary);
      color: #fff;
      box-shadow: var(--shadow-elevated);
      font-size: 13px;
      line-height: 1.45;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.34);
      backdrop-filter: blur(3px);
    }
    .overlay.open {
      display: flex;
    }
    .modal-card {
      width: min(1360px, calc(100vw - 28px));
      max-height: min(88vh, 980px);
      overflow: hidden;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      background: var(--color-surface);
      box-shadow: var(--shadow-elevated);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--color-border);
    }
    .modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }
    .modal-subtitle {
      margin-top: 6px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .modal-close {
      flex: 0 0 auto;
      min-width: 40px;
    }
    .modal-body {
      overflow: auto;
      padding: 16px 18px 18px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--color-border);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .detail-stack {
      display: grid;
      gap: 16px;
    }
    .detail-hero {
      border: 1px solid var(--color-border);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(15, 118, 110, 0.02)),
        var(--color-surface-alt);
      padding: 16px;
      display: grid;
      gap: 10px;
    }
    .detail-hero-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .detail-hero-title {
      font-size: 16px;
      font-weight: 900;
      color: var(--color-text);
      line-height: 1.4;
    }
    .detail-hero-copy {
      font-size: 13px;
      line-height: 1.65;
      color: var(--color-text-secondary);
    }
    .detail-section-card {
      border: 1px solid var(--color-border);
      border-radius: 16px;
      background: var(--color-surface-alt);
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .detail-section-head {
      display: grid;
      gap: 4px;
    }
    .detail-section-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--color-text);
    }
    .detail-section-tip {
      font-size: 12px;
      line-height: 1.55;
      color: var(--color-text-secondary);
    }
    .detail-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .detail-kpi {
      border: 1px solid var(--color-border);
      border-radius: 14px;
      background: var(--color-surface);
      padding: 12px;
      display: grid;
      gap: 4px;
    }
    .detail-kpi-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .detail-kpi-value {
      font-size: 18px;
      font-weight: 900;
      color: var(--color-text);
      line-height: 1.2;
    }
    .detail-kpi-note {
      font-size: 12px;
      line-height: 1.45;
      color: var(--color-text-secondary);
    }
    .detail-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .detail-block {
      display: grid;
      gap: 4px;
    }
    .detail-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }
    .detail-value {
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-text);
      word-break: break-word;
    }
    .detail-list {
      margin: 4px 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 3px 12px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.45;
    }
    .detail-list li + li::before {
      content: "·";
      margin-right: 12px;
      opacity: 0.5;
    }
    .conflict-stack {
      display: grid;
      gap: 12px;
    }
    .conflict-workbench {
      display: grid;
      gap: 14px;
    }
    .conflict-status-panel {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: linear-gradient(135deg, #f8fafc 0%, #eef7f6 100%);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .conflict-status-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .conflict-status-copy {
      min-width: 0;
    }
    .conflict-status-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .conflict-status-title {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
      color: var(--color-text);
    }
    .conflict-status-note {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .conflict-summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .conflict-workbench-grid {
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .conflict-workbench-grid.is-list-collapsed {
      grid-template-columns: minmax(0, 1fr);
    }
    .conflict-workbench-grid.is-list-collapsed .conflict-list-panel {
      display: none;
    }
    .conflict-list-panel,
    .conflict-detail-panel {
      min-width: 0;
    }
    .conflict-list-panel {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
      overflow: hidden;
      position: sticky;
      top: 0;
    }
    .conflict-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-alt);
    }
    .conflict-panel-copy {
      min-width: 0;
    }
    .conflict-panel-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--color-text);
    }
    .conflict-panel-note {
      margin-top: 3px;
      color: var(--color-text-secondary);
      font-size: 11px;
      line-height: 1.45;
    }
    .conflict-list {
      max-height: min(58vh, 620px);
      overflow: auto;
      display: grid;
      gap: 0;
    }
    .conflict-list-item {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--color-border);
      background: transparent;
      padding: 12px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 8px;
      color: var(--color-text);
    }
    .conflict-list-item:hover {
      background: rgba(13, 116, 111, 0.06);
    }
    .conflict-list-item.is-active {
      background: #eef7f6;
      box-shadow: inset 3px 0 0 var(--color-primary);
    }
    .conflict-list-title {
      font-size: 12px;
      font-weight: 900;
      line-height: 1.45;
      word-break: break-word;
    }
    .conflict-list-meta {
      color: var(--color-text-secondary);
      font-size: 11px;
      line-height: 1.45;
      word-break: break-word;
    }
    .conflict-list-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .conflict-detail-panel {
      display: grid;
      gap: 12px;
    }
    .conflict-detail-empty {
      border: 1px dashed var(--color-border);
      border-radius: 8px;
      padding: 18px;
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      font-size: 13px;
      line-height: 1.5;
    }
    .conflict-card {
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface-alt);
      overflow: hidden;
    }
    .conflict-card.is-high {
      border-color: rgba(220, 38, 38, 0.25);
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.08);
    }
    .conflict-card.is-medium {
      border-color: rgba(217, 119, 6, 0.22);
    }
    .conflict-card.is-low {
      border-color: rgba(202, 138, 4, 0.22);
    }
    .conflict-card summary {
      list-style: none;
      cursor: pointer;
    }
    .conflict-card summary::-webkit-details-marker {
      display: none;
    }
    .conflict-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 10px;
    }
    .conflict-card-left {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .conflict-card-right {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: flex-start;
      flex: 0 0 auto;
    }
    .conflict-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--color-text);
    }
    .conflict-meta {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .conflict-body {
      display: grid;
      gap: 14px;
      padding: 14px;
    }
    .conflict-object-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
    }
    .conflict-object-item {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    .conflict-object-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }
    .conflict-object-value {
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-text);
      word-break: break-word;
    }
    .conflict-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .compare-table-wrap {
      overflow-x: clip;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-surface);
    }
    .compare-table {
      width: 100%;
      min-width: 0;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: 11px;
    }
    .compare-table th,
    .compare-table td {
      padding: 8px 9px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
      text-align: left;
      line-height: 1.4;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .compare-table th {
      position: static;
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      font-weight: 900;
    }
    .compare-table tr:last-child td {
      border-bottom: 0;
    }
    .compare-col-source { width: 24%; }
    .compare-col-decision { width: 10%; }
    .compare-col-value { width: 14%; }
    .compare-col-reason { width: 36%; }
    .compare-col-action { width: 16%; }
    .opinion-source {
      font-size: 11px;
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.45;
      word-break: break-word;
    }
    .opinion-submeta {
      margin-top: 4px;
      color: var(--color-text-secondary);
      font-size: 10px;
      line-height: 1.4;
      word-break: break-word;
    }
    .reason-block {
      display: grid;
      gap: 6px;
    }
    .reason-text {
      color: var(--color-text);
      line-height: 1.5;
      word-break: break-word;
    }
    .reason-text.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .expand-link {
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--color-primary);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      text-align: left;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }
    .compare-extra[hidden] {
      display: none !important;
    }
    .conflict-card-actions {
      display: flex;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }
    .opinion-action {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .opinion-action-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .opinion-action-stack .btn {
      width: 100%;
      white-space: normal;
      line-height: 1.35;
    }
    .conflict-footer-note {
      margin-top: 14px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .conflict-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .conflict-main,
    .evidence-preview-shell {
      min-width: 0;
    }
    .evidence-preview-shell {
      min-width: 0;
    }
    .evidence-preview-card {
      border: 1px solid #d7e2ef;
      border-radius: 8px;
      background: #fbfdff;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: static;
    }
    .evidence-preview-card.is-placeholder {
      min-height: 120px;
      justify-content: center;
    }
    .evidence-preview-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--color-text);
    }
    .evidence-preview-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .evidence-preview-meta .detail-block {
      flex: 1 1 150px;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid #d7e2ef;
      border-radius: 8px;
      background: #fff;
    }
    .evidence-preview-meta .detail-block.is-wide {
      flex-basis: 100%;
    }
    .evidence-preview-section {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
      border: 1px solid #d7e2ef;
      border-radius: 8px;
      background: #fff;
    }
    .evidence-excerpt {
      white-space: pre-wrap;
      line-height: 1.65;
    }
    .compare-table tr.is-active td {
      background: rgba(12, 87, 164, 0.08);
    }
    .btn.btn-weak {
      min-height: 26px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .btn.btn-weak[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    @media (max-width: 820px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }
      .review-topline,
      .panel-head {
        display: block;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .page-actions {
        grid-template-columns: repeat(3, 1fr);
        margin-top: 12px;
      }
      .page-actions .btn {
        height: 34px;
      }
      .filterbar {
        margin-top: 12px;
      }
      .filterbar select,
      .filterbar input {
        width: 100%;
      }
      .panel-foot {
        align-items: stretch;
      }
      .review-table-head-shell {
        top: calc(var(--nav-height) + var(--review-panel-head-height));
      }
      .pagination-bar {
        width: 100%;
        justify-content: flex-start;
        margin-left: 0;
      }
      table {
        min-width: 980px;
      }
      .overlay {
        padding: 12px;
      }
      .modal-card {
        width: min(100vw - 16px, 1360px);
        max-height: calc(100vh - 24px);
      }
      .conflict-card-head {
        display: grid;
      }
      .conflict-card-right {
        justify-content: flex-start;
      }
      .conflict-status-head,
      .conflict-panel-head {
        display: grid;
      }
      .conflict-object-grid {
        grid-template-columns: 1fr 1fr;
      }
      .evidence-preview-card {
        position: static;
      }
      .evidence-preview-meta {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div id="topnav-mount"></div>
  <main class="shell">
    <div class="review-topline">
      <section class="stats" id="stats"></section>
      <div class="page-actions">
        <button class="btn btn-ghost" type="button" onclick="loadReviewCenter()" title="刷新审核中心">↻ 刷新</button>
        <select class="btn btn-tinted" id="materialActionSelect" title="材料操作" onchange="handleMaterialActionSelect()">
          <option value="">材料操作</option>
          <option value="prepare_filtered">AI 重建</option>
          <option value="prepare_suspected_missing">漏提材料</option>
          <option value="prepare_library">重建材料</option>
        </select>
        <select class="btn btn-ghost" id="promptCopySelect" title="复制 IDE AI 指令" onchange="handlePromptCopySelect()">
          <option value="">复制指令</option>
          <option value="overall">总体指令</option>
          <option value="dft">DFT 指令</option>
          <option value="figure">图表指令</option>
          <option value="text_review">文字审核指令</option>
        </select>
      </div>
    </div>

    <section class="panel">
      <div class="panel-head">
        <div class="muted mono" id="queueMeta" style="font-size: 12px; font-weight: 700; letter-spacing: 0.4px;">正在读取当前库...</div>
        <div class="filterbar">
          <select id="libraryFilter" onchange="setReviewLibraryFilter()">
            <option value="">全部文献库</option>
          </select>
          <select id="statusFilter" onchange="handleFilterChange()">
            <option value="">全部流程状态</option>
          </select>
          <select id="workflowStatusFilter" onchange="handleFilterChange()">
            <option value="">具体流程状态</option>
          </select>
          <select id="qualityFilter" onchange="handleFilterChange()">
            <option value="">全部 PDF 质量</option>
            <option value="A_text_readable">A 文本可读</option>
            <option value="B_text_partial">B 部分可读</option>
            <option value="C_scan_clear">C 扫描清晰</option>
            <option value="D_scan_unclear">D 扫描不清</option>
            <option value="Broken">Broken</option>
          </select>
          <select id="sortFilter" onchange="handleSortChange()">
            <option value="recent">最近入库优先</option>
            <option value="year_desc">年份新到旧</option>
            <option value="paper_code_asc">短号顺序</option>
            <option value="conflicts_desc">冲突优先（DFT/图表/内容）</option>
            <option value="suspected_missing_desc">疑似漏提优先</option>
          </select>
          <input id="searchBox" type="search" placeholder="搜索标题 / DOI / 期刊 / 年份 / 短 ID" oninput="handleSearchInput()">
        </div>
      </div>
      <div class="review-table-head-shell">
        <div class="review-table-head" id="reviewTableHead">
          <div class="review-table-head-cell col-divider id-head"><span class="select-head"><input id="selectAllVisible" type="checkbox" aria-label="全选或全不选当前页" onchange="toggleVisibleRowsSelection(this.checked)"><span>ID</span></span></div>
          <div class="review-table-head-cell col-divider">年份</div>
          <div class="review-table-head-cell col-divider">文献标题</div>
          <div class="review-table-head-cell col-divider">文献状态</div>
          <div class="review-table-head-cell col-divider">DFT 审计</div>
          <div class="review-table-head-cell">操作</div>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th class="col-divider" style="text-align:center;">ID</th>
              <th class="col-divider" style="text-align:center;">年份</th>
              <th class="col-divider" style="text-align:center;">文献标题</th>
              <th class="col-divider" style="text-align:center;">文献状态</th>
              <th class="col-divider" style="text-align:center;">DFT 审计</th>
              <th style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6"><div class="empty">正在加载...</div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="panel-foot">
        <div class="pagination-meta muted" id="paginationMeta">正在准备分页...</div>
        <div class="pagination-bar" id="paginationBar"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <div class="overlay" id="infoOverlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="infoModalTitle">
      <div class="modal-head">
        <div>
          <h3 class="modal-title" id="infoModalTitle">详情</h3>
          <div class="modal-subtitle" id="infoModalSubtitle"></div>
        </div>
        <button class="btn btn-ghost btn-sm modal-close" type="button" onclick="closeInfoOverlay()">关闭</button>
      </div>
      <div class="modal-body" id="infoModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" type="button" onclick="closeInfoOverlay()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      metadata: {},
      libraries: [],
      pagination: {
        page: 1,
        pageSize: 25
      }
    };
    const CURRENT_LIBRARY_STORAGE_KEY = "litai_current_library";
    const REVIEW_CENTER_FILTER_SESSION_KEY = "litai:review-center:filters:v1";
    const REVIEW_CENTER_FETCH_LIMITS = [5000, 500];
    const selectedPaperIds = new Set();
    const conflictState = {
      activeRow: null,
      groups: [],
      activeGroupIndex: 0,
      listCollapsed: false,
      activeOpinionKey: null,
      evidenceCache: {},
      requestToken: 0
    };
    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
      });
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function collectReviewCenterFilterState() {
      return {
        libraryFilter: getValue("libraryFilter"),
        statusFilter: getValue("statusFilter"),
        workflowStatusFilter: getValue("workflowStatusFilter"),
        qualityFilter: getValue("qualityFilter"),
        sortFilter: getValue("sortFilter"),
        searchBox: getValue("searchBox"),
        pagination: {
          page: Number(state.pagination && state.pagination.page || 1),
          pageSize: Number(state.pagination && state.pagination.pageSize || 25),
        },
      };
    }

    function saveReviewCenterFilterState() {
      try {
        window.sessionStorage.setItem(REVIEW_CENTER_FILTER_SESSION_KEY, JSON.stringify(collectReviewCenterFilterState()));
      } catch (_) {
        // sessionStorage can be unavailable in strict browser modes.
      }
    }

    function restoreReviewCenterFilterState() {
      try {
        const raw = window.sessionStorage.getItem(REVIEW_CENTER_FILTER_SESSION_KEY);
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (!saved || typeof saved !== "object") return;
        state.restoredReviewCenterFilters = saved;
        ["libraryFilter", "statusFilter", "workflowStatusFilter", "qualityFilter", "sortFilter", "searchBox"].forEach(function(id) {
          const el = document.getElementById(id);
          if (el && Object.prototype.hasOwnProperty.call(saved, id)) {
            el.value = saved[id] == null ? "" : String(saved[id]);
          }
        });
        const savedPage = Number(saved.pagination && saved.pagination.page);
        const savedPageSize = Number(saved.pagination && saved.pagination.pageSize);
        if (Number.isFinite(savedPage) && savedPage >= 1) {
          state.pagination.page = savedPage;
        }
        if (Number.isFinite(savedPageSize) && savedPageSize > 0) {
          state.pagination.pageSize = savedPageSize;
        }
      } catch (_) {
        // Ignore corrupted session state and continue with defaults.
      }
    }

    function clearReviewCenterFilterState() {
      try {
        window.sessionStorage.removeItem(REVIEW_CENTER_FILTER_SESSION_KEY);
      } catch (_) {
        // sessionStorage can be unavailable in strict browser modes.
      }
    }

    function getStoredLibraryName() {
      try {
        return window.localStorage.getItem(CURRENT_LIBRARY_STORAGE_KEY) || "";
      } catch (_) {
        return "";
      }
    }

    function rememberLibraryName(name) {
      try {
        if (name) {
          window.localStorage.setItem(CURRENT_LIBRARY_STORAGE_KEY, name);
        } else {
          window.localStorage.removeItem(CURRENT_LIBRARY_STORAGE_KEY);
        }
      } catch (_) {
        // localStorage can be unavailable in strict browser modes.
      }
    }

    function getQueryLibraryName() {
      try {
        return new URLSearchParams(window.location.search).get("library_name") || "";
      } catch (_) {
        return "";
      }
    }

    function getQueryPaperId() {
      try {
        return new URLSearchParams(window.location.search).get("paper_id") || "";
      } catch (_) {
        return "";
      }
    }

    function setReviewLibraryFilter() {
      rememberLibraryName(getValue("libraryFilter"));
      state.pagination.page = 1;
      saveReviewCenterFilterState();
      loadReviewCenter();
    }

    function updateStickyLayout() {
      window.requestAnimationFrame(function () {
        const panelHead = document.querySelector(".panel-head");
        document.body.style.setProperty("--review-panel-head-height", ((panelHead && panelHead.offsetHeight) || 0) + "px");
        syncExternalTableHead();
      });
    }

    function syncExternalTableHead() {
      const tableWrap = document.getElementById("tableWrap");
      const tableHead = document.getElementById("reviewTableHead");
      if (!tableWrap || !tableHead) return;
      tableHead.style.transform = "translateX(" + (-tableWrap.scrollLeft) + "px)";
    }

    function toCount(value) {
      const count = Number(value || 0);
      return Number.isFinite(count) ? count : 0;
    }

    function hasOwnValue(value) {
      return value !== null && value !== undefined;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        toast.style.display = "none";
      }, 2800);
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const box = document.createElement("textarea");
      box.value = text;
      box.style.position = "fixed";
      box.style.left = "-9999px";
      document.body.appendChild(box);
      box.focus();
      box.select();
      document.execCommand("copy");
      document.body.removeChild(box);
    }

    function currentPromptTargets() {
      const selected = selectedPromptRows();
      const rows = selected.length ? selected : currentVisibleRows().slice(0, 25);
      if (!rows.length) {
        return "- human_ref: <A0010> | paper_id: <UUID> | title: <文献标题>";
      }
      return rows.map(function (row) {
        return "- human_ref: " + (row.paper_code || "-") +
          " | paper_id: " + row.paper_id +
          " | type: " + (row.paper_type || "-") +
          " | title: " + (row.title || "未命名文献");
      }).join("\n");
    }

    function selectedPromptRows() {
      if (!selectedPaperIds.size) return [];
      const byId = new Map((state.rows || []).map(function (row) {
        return [String(row.paper_id), row];
      }));
      return Array.from(selectedPaperIds).map(function (paperId) {
        return byId.get(String(paperId));
      }).filter(Boolean);
    }

    function promptTargetRows() {
      const selected = selectedPromptRows();
      return selected.length ? selected : currentVisibleRows().slice(0, 25);
    }

    function resolveVisualPromptKind() {
      const rows = promptTargetRows();
      const hasFigures = rows.some(function (row) { return toCount(row.figure_count) > 0; });
      const hasTables = rows.some(function (row) { return toCount(row.table_count) > 0; });
      if (hasFigures && !hasTables) return "figure";
      if (hasTables && !hasFigures) return "table";
      return "figure_table";
    }

    function togglePaperSelection(paperId, checked) {
      if (!paperId) return;
      if (checked) {
        selectedPaperIds.add(String(paperId));
      } else {
        selectedPaperIds.delete(String(paperId));
      }
      renderRows();
    }

    function selectVisibleRows() {
      currentVisibleRows().forEach(function (row) {
        if (row && row.paper_id) selectedPaperIds.add(String(row.paper_id));
      });
      renderRows();
      showToast("已选择当前页文献：" + selectedPaperIds.size + " 篇");
    }

    function toggleVisibleRowsSelection(checked) {
      currentVisibleRows().forEach(function (row) {
        if (!row || !row.paper_id) return;
        if (checked) selectedPaperIds.add(String(row.paper_id));
        else selectedPaperIds.delete(String(row.paper_id));
      });
      renderRows();
    }

    function syncSelectAllVisible(rows) {
      const checkbox = document.getElementById("selectAllVisible");
      if (!checkbox) return;
      const visibleIds = (rows || []).map(function (row) { return String(row.paper_id || ""); }).filter(Boolean);
      const selectedVisible = visibleIds.filter(function (paperId) { return selectedPaperIds.has(paperId); }).length;
      checkbox.checked = visibleIds.length > 0 && selectedVisible === visibleIds.length;
      checkbox.indeterminate = selectedVisible > 0 && selectedVisible < visibleIds.length;
    }

    function clearSelectedRows() {
      selectedPaperIds.clear();
      renderRows();
      showToast("已清空文献选择");
    }

    function handleFilterChange() {
      state.pagination.page = 1;
      saveReviewCenterFilterState();
      renderRows();
    }

    function handleSortChange() {
      state.pagination.page = 1;
      saveReviewCenterFilterState();
      renderRows();
    }

    function handleSearchInput() {
      state.pagination.page = 1;
      saveReviewCenterFilterState();
      renderRows();
    }

    function totalPagesForCount(count) {
      const pageSize = Math.max(1, Number(state.pagination.pageSize || 25));
      return Math.max(1, Math.ceil(Math.max(0, Number(count || 0)) / pageSize));
    }

    function ensureValidPage(totalCount) {
      const totalPages = totalPagesForCount(totalCount);
      if (state.pagination.page > totalPages) state.pagination.page = totalPages;
      if (state.pagination.page < 1) state.pagination.page = 1;
      return totalPages;
    }

    function currentVisibleRows() {
      const rows = sortedRows(filteredRows());
      const pageSize = Math.max(1, Number(state.pagination.pageSize || 25));
      ensureValidPage(rows.length);
      const start = (state.pagination.page - 1) * pageSize;
      return rows.slice(start, start + pageSize);
    }

    function goToPage(page) {
      state.pagination.page = Number(page || 1);
      saveReviewCenterFilterState();
      renderRows();
    }

    function changePage(delta) {
      goToPage(Number(state.pagination.page || 1) + Number(delta || 0));
    }

    function setPageSize() {
      const select = document.getElementById("pageSizeSelect");
      const nextSize = Number(select && select.value ? select.value : state.pagination.pageSize);
      state.pagination.pageSize = Number.isFinite(nextSize) && nextSize > 0 ? nextSize : 25;
      state.pagination.page = 1;
      saveReviewCenterFilterState();
      renderRows();
    }

    function renderPagination(totalRows, visibleRows) {
      const totalPages = ensureValidPage(totalRows);
      const currentPage = state.pagination.page;
      const pageSize = Math.max(1, Number(state.pagination.pageSize || 25));
      const start = totalRows ? ((currentPage - 1) * pageSize + 1) : 0;
      const end = totalRows ? Math.min(totalRows, start + visibleRows.length - 1) : 0;
      const loadedCount = Number(state.rows.length || 0);
      const knownTotal = Number(state.metadata.total || loadedCount || 0);
      const hasTruncation = knownTotal > loadedCount;
      const metaParts = [];
      metaParts.push(totalRows ? ("当前页 " + start + "-" + end + " / " + totalRows + " 篇") : "当前页 0 / 0 篇");
      metaParts.push("第 " + currentPage + " / " + totalPages + " 页");
      if (hasTruncation) {
        metaParts.push("已加载 " + loadedCount + " / 总 " + knownTotal + " 篇");
      } else {
        metaParts.push("总计 " + knownTotal + " 篇");
      }
      document.getElementById("paginationMeta").textContent = metaParts.join(" | ");

      const pages = [];
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);
      for (let page = startPage; page <= endPage; page += 1) {
        pages.push(
          '<button class="page-indicator' + (page === currentPage ? ' is-active' : '') + '" type="button" onclick="goToPage(' + page + ')"' +
          (page === currentPage ? ' aria-current="page"' : '') +
          '>' + esc(page) + '</button>'
        );
      }
      document.getElementById("paginationBar").innerHTML =
        '<span class="page-size-box">每页' +
          '<select id="pageSizeSelect" onchange="setPageSize()">' +
            '<option value="25"' + (pageSize === 25 ? ' selected' : '') + '>25 篇</option>' +
            '<option value="50"' + (pageSize === 50 ? ' selected' : '') + '>50 篇</option>' +
            '<option value="100"' + (pageSize === 100 ? ' selected' : '') + '>100 篇</option>' +
          '</select>' +
        '</span>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="goToPage(1)"' + (currentPage <= 1 ? ' disabled' : '') + '>首页</button>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="changePage(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>上一页</button>' +
        '<span class="pagination-pages">' + pages.join("") + '</span>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="changePage(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>下一页</button>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="goToPage(' + totalPages + ')"' + (currentPage >= totalPages ? ' disabled' : '') + '>末页</button>';
    }

, \"source_row_or_condition\":\"row label / temperature / method column\"}, \"confidence\":0.8, \"reason\":\"DFT table row was missing from parser output\", \"normalized_material\":\"具体材料/结构\", \"normalized_energy_type\":\"band_gap\", \"evidence_location\":{\"page\":5,\"table\":\"Table 1\",\"quoted_text\":\"Table row text\",\"source_document_type\":\"main\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}}\n  ]\n}\n\nimport_analysis 调用规则：\n- 普通 object_review_audits candidate-only 导入可用 auto_apply_review_rules=false。\n- 但只要 payload 里包含你希望进入系统候选队列的 DFT new_candidate，import_analysis 必须改用 auto_apply_review_rules=true。";

        return commonWithHardening + "\n\n本次任务模块：图表专项核验\n目标：逐图逐表核验并直接修正。能改就改，缺失就新增，不要只写报告。\n\n开始前必须读取 codex-context.context.source_assets.pdf_path，记录原 PDF 文件名。先按 PDF 原文核对本篇论文实际 figure 数量、编号连续性、是否存在子图，再和系统现有 figure objects/crop 列表逐一对照；不允许只审核当前已有 crop。\n\n每幅图必须检查：\n- 数量与覆盖是否准确：整篇论文是否有漏掉的整张图、漏掉的子图、编号断裂、错绑到别的 figure。\n- 裁剪是否过大：是否混入大块空白、正文、页眉页脚、相邻图片。\n- 裁剪是否过小：是否裁掉 panel、坐标轴、图例、标签、标题、结构示意、反应箭头、颜色条。\n- 裁剪是否准确：是否真的是该 figure/subfigure，而不是错页、错图、混入多张无关图。\n- caption、page、figure_label 是否和 PDF 原页一致。\n- content_summary 必须写这张图实际展示了什么，不能复述图注，不能只写“shows Figure 2”这类空话。\n- key_elements 必须写具体元素，如材料、结构、曲线、峰、坐标轴、图例、反应步骤、子图编号。\n- 图表审核完成后，必须顺带判断该文献当前系统 paper_type 是否与原 PDF 内容相符；若不相符，不要只写 note，直接通过受控写回把 paper_type 改成正确值，并附上页码与 quoted_text 证据。\n\n禁止：\n- 不要照抄或轻微改写 caption 当成 content_summary。\n- 不要批量给泛化结论，每幅图都要给出具体分析。\n- 不要只审现有 figure uuid 列表后就宣布完成，必须明确确认是否存在漏图/漏子图。\n- 不要根据图像臆读精确数值；数值结论只接受正文、表格或图内明确可读文字。\n\n可直接修正字段：\n- figures:<figure_uuid>:caption/image_path/page/figure_label/figure_role/role_confidence/content_summary/key_elements/prov/crop_status/crop_confidence/crop_source\n- figures:new:create 可新增缺失图片对象；create_figure_from_bbox 可直接从 PDF 裁图并创建图片对象\n- tables:<table_uuid>:caption/page/markdown_content/extraction_source/prov\n- tables:new:create 可新增缺失表格对象\n- paper_type：图表审核结束后若发现文献类型与 PDF 不一致，直接按元数据字段修正\n\n回写规则：\n- 裁剪过大、过小、不准、caption/page/label/role/summary/key_elements 错误：写 replace correction_proposals；涉及图片重裁时直接调用 recrop_figure。\n- 缺失整张图/子图/表，或 PDF 数量多于系统现有对象：写 create correction_proposals；若可裁图，直接调用 create_figure_from_bbox 创建对象和 image_path。\n- 图片文件缺失但对象存在：优先 recrop_figure；bbox 不确定时先用 full_page，再明确标记 needs_recrop。\n- 重复、污染、解析碎片类图片对象：不要只写 note；直接走图片删除入口，立即删除该 figure object，并在 reason 里明确 duplicate / parser fragment / noise 依据。\n- 如果图表审核后确认文献类型与系统解析不对应，直接写 paper_type 修正，不要停留在 review note。\n- 只有整体重排序、merge 这类当前仍不能自动执行的问题，才写 [AI_REVIEWED][NEEDS_PIPELINE_FIX] note。\n\nraw_payload 示例：\n{\n  \"correction_proposals\": [\n    {\"field_name\":\"figures\", \"target_path\":\"figures:<figure_uuid>:content_summary\", \"operation\":\"replace\", \"proposed_value\":\"Three-panel band structure and DOS comparison under tensile strain; panel (a) shows pristine ribbon, panels (b-c) show strained cases with narrowed gap.\", \"reason\":\"old summary repeated the caption and missed the actual visual comparison\", \"evidence_payload\":{\"page\":4,\"quoted_text\":\"Fig. 2 ...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"figures\", \"target_path\":\"figures:<figure_uuid>:key_elements\", \"operation\":\"replace\", \"proposed_value\":[\"three subpanels\",\"band structure curves\",\"DOS peaks near Fermi level\",\"strain labels\",\"energy axis\"], \"reason\":\"existing key_elements were generic placeholders\", \"evidence_payload\":{\"page\":4,\"quoted_text\":\"Fig. 2 ...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"figures\", \"target_path\":\"figures:<figure_uuid>:delete\", \"operation\":\"delete\", \"proposed_value\":null, \"reason\":\"Duplicate parser fragment or polluted figure object that should be removed\", \"evidence_payload\":{\"page\":4,\"figure\":\"Fig. 2\", \"quoted_text\":\"duplicate right-column fragment\", \"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"paper_type\", \"target_path\":\"paper_type\", \"operation\":\"replace\", \"proposed_value\":\"B\", \"reason\":\"After figure/table review, the PDF content matches paper type B rather than the current system classification\", \"evidence_payload\":{\"page\":1,\"quoted_text\":\"Review-style summary and figure/table coverage indicate type B\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}}\n  ]\n}";

      if (kind === "text_review" || kind === "sections_writing") {
        return commonWithHardening + "\n\n本次任务模块：文字审核\n目标：只把经过 IDE AI 核对、带 PDF 页码和原文证据的 abstract / sections / writing_cards / mechanism_claims 写回系统。parser 章节、规则抽取写作卡和机理声明都只是候选，不等于可信知识；未审核前不要把它们当作正式正文、正式写作卡或可靠机理证据。\n\n开始前必须读取 codex-context.context.source_assets.pdf_path，记录原 PDF 文件名；然后用 read_paper_page 按页核对摘要、章节边界、标题、正文片段、写作逻辑和机理原文。不要只根据页面候选列表或 parser 输出判断。\n\n可直接修正字段：\n- abstract：若详情页摘要缺失或错误，可直接 replace 到 target_path=abstract\n- sections:<section_uuid>:section_title/section_type/text/page_start/page_end/section_level/section_number/parent_heading/heading_path；sections:new:create 可新增缺失章节\n- writing_cards:<writing_card_uuid>:paper_type/research_gap/proposed_solution/core_hypothesis/evidence_chain/section_strategy/figure_logic/abstract_logic/introduction_logic/discussion_logic；writing_cards:new:create 可新增审核后的写作卡\n- mechanism_claims:<claim_uuid>:claim_type/claim_text/key_species/mechanism_direction/evidence_types/evidence_text；mechanism_claims:new:create 可新增审核后的机理声明\n\n回写规则：\n- 详情页摘要缺失或错误：写 replace correction_proposals，field_name='abstract'，target_path='abstract'，proposed_value 为核对后的摘要原文。\n- 章节字段错误：写 replace correction_proposals，target_path=sections:<uuid>:<field>。\n- 章节缺失：写 create correction_proposals，proposed_value 必须包含 section_title、section_type、text、page_start、page_end，层级字段能确认时也一并补齐；evidence_payload 必须含 page、quoted_text、source_pdf。\n- 写作卡只能基于已核对的 PDF 证据创建或替换；evidence_chain 每条证据必须包含 text、page/source、reviewer_status='verified'、target_resolution_status='active'，并尽量包含 locator_status='exact_page'。\n- 机理声明必须核对 claim_text 是否忠实对应原文，claim_type / mechanism_direction / key_species 是否准确；缺失时可 create，错误时可 replace。必须提供 page、quoted_text、source_pdf，不能只写概括性总结。\n- 如果只是确认已有摘要/章节/写作卡/机理声明无误，也必须写 [AI_REVIEWED] review_notes 或通过 correction_proposals/auto_apply_review_rules=true 让系统留下 ai_reviewed/ai_applied 证据；否则仍视为未审核。\n- 不要触碰 DFT 终审；发现文字内容里涉及 DFT 数值，只能标注给 DFT 专项复核，不能在本任务里让 DFT 入库或解锁导出。\n\nraw_payload 示例：\n{\n  \"review_notes\": [\n    {\"content\":\"[AI_REVIEWED] abstract, sections, writing_cards and mechanism_claims checked against source PDF; parser-only content remains blocked until reviewed\", \"field_name\":\"sections\", \"page\":2, \"quoted_text\":\"Results and discussion...\", \"section_title\":\"source_pdf=<source_assets.pdf_path 文件名>\"}\n  ],\n  \"correction_proposals\": [\n    {\"field_name\":\"abstract\", \"target_path\":\"abstract\", \"operation\":\"replace\", \"proposed_value\":\"Reviewed abstract text...\", \"reason\":\"detail page abstract was missing or inaccurate\", \"evidence_payload\":{\"page\":1,\"quoted_text\":\"Abstract ...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"sections\", \"target_path\":\"sections:new:create\", \"operation\":\"create\", \"proposed_value\":{\"section_title\":\"Results and discussion\", \"section_type\":\"results\", \"text\":\"Reviewed section text...\", \"page_start\":4, \"page_end\":7}, \"reason\":\"PDF contains a logical results section missing from parser output\", \"evidence_payload\":{\"page\":4,\"quoted_text\":\"Results and discussion...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"writing_cards\", \"target_path\":\"writing_cards:new:create\", \"operation\":\"create\", \"proposed_value\":{\"paper_type\":\"A_dft\", \"research_gap\":\"Reviewed research gap...\", \"proposed_solution\":\"Reviewed proposed solution...\", \"core_hypothesis\":\"Reviewed core hypothesis...\", \"evidence_chain\":[{\"text\":\"Quoted evidence from source PDF\", \"page\":5, \"source\":\"Results\", \"reviewer_status\":\"verified\", \"target_resolution_status\":\"active\", \"locator_status\":\"exact_page\"}], \"section_strategy\":{\"introduction\":\"Use reviewed gap and solution\", \"discussion\":\"Use reviewed mechanism and performance evidence\"}, \"figure_logic\":[{\"fig_id\":\"Figure 2\", \"purpose\":\"supports reviewed mechanism claim\", \"supports_claim\":\"Reviewed claim\"}], \"abstract_logic\":\"Reviewed abstract logic\", \"introduction_logic\":\"Reviewed introduction logic\", \"discussion_logic\":\"Reviewed discussion logic\"}, \"reason\":\"writing card was created only after PDF evidence review\", \"evidence_payload\":{\"page\":5,\"quoted_text\":\"Quoted evidence from source PDF\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"mechanism_claims\", \"target_path\":\"mechanism_claims:new:create\", \"operation\":\"create\", \"proposed_value\":{\"claim_type\":\"lips_conversion\", \"claim_text\":\"Reviewed mechanism claim text...\", \"key_species\":[\"Li2S4\",\"Li2S\"], \"mechanism_direction\":\"promotes_conversion\", \"evidence_types\":[\"main_text\"], \"evidence_text\":\"Quoted mechanism evidence from source PDF\"}, \"reason\":\"parser missed a mechanism claim supported by the source PDF\", \"evidence_payload\":{\"page\":6,\"quoted_text\":\"Quoted mechanism evidence from source PDF\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}}\n  ]\n}";

      return commonWithHardening + "\n\n本次任务模块：表格/章节专项核验\n目标：核验 tables/sections，发现非 DFT 问题必须直接修正或新增，减少用户人工排错。\n\n开始前必须读取 codex-context.context.source_assets.pdf_path，记录原 PDF 文件名。凡是表格缺失、章节缺失、列错位、页码不一致、单位异常、疑似 DFT 误映射，都必须用原 PDF 文件名 + read_paper_page 页码证据核对。\n\n可直接修正字段：\n- tables:<table_uuid>:caption/page/markdown_content/extraction_source/prov；tables:new:create 可新增缺失表格\n- sections:<section_uuid>:section_title/section_type/text/page_start/page_end；sections:new:create 可新增缺失章节\n\n回写规则：\n- 表格 caption/page/markdown_content 或章节字段错误：写 replace correction_proposals。\n- 表格/章节缺失：写 create correction_proposals，proposed_value 写完整对象，evidence_payload 必须含 page、quoted_text、source_pdf。\n- 若某张表已逐项核对且无需字段修改，也要写 raw_payload.object_review_audits，target_type='tables'、target_id=<table_uuid>、decision='PASS'，给系统留下表格审核状态；不要只在聊天里口头说明“已核对”。\n- 只有重复对象删除、整体重排这类暂不自动执行的问题，才写 [AI_REVIEWED][NEEDS_PIPELINE_FIX] note。\n- 遇到 Diameter/Distance/Length/Voltage 等列，不要误判为 band_gap 或 adsorption_energy；若发现 DFT 候选来自错误表格列，只写 review_notes 指向 DFT 专项，不要在表格任务里确认 DFT 入库。\n\nraw_payload 示例：\n{\n  \"object_review_audits\": [\n    {\"paper_id\":\"<paper_id>\", \"target_type\":\"tables\", \"target_id\":\"<table_uuid>\", \"field_name\":\"table_review\", \"decision\":\"PASS\", \"confidence\":0.9, \"reason\":\"Table text and page match the source PDF; no structural correction needed\", \"evidence_location\":{\"page\":8,\"quoted_text\":\"Table 2 ...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}}\n  ],\n  \"correction_proposals\": [\n    {\"field_name\":\"tables\", \"target_path\":\"tables:<table_uuid>:caption\", \"operation\":\"replace\", \"proposed_value\":\"Table 1. Correct caption...\", \"reason\":\"caption from source PDF page\", \"evidence_payload\":{\"page\":3,\"quoted_text\":\"Table 1. Correct caption...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}},\n    {\"field_name\":\"sections\", \"target_path\":\"sections:new:create\", \"operation\":\"create\", \"proposed_value\":{\"section_title\":\"Results and discussion\", \"section_type\":\"results\", \"text\":\"section text...\", \"page_start\":4, \"page_end\":7}, \"reason\":\"parser missed logical results section\", \"evidence_payload\":{\"page\":4,\"quoted_text\":\"Results and discussion...\",\"source_pdf\":\"<source_assets.pdf_path 文件名>\"}}\n  ]\n}";
    }

    async function copyIdePrompt(kind) {
      try {
        const resolvedKind = kind === "figure" ? resolveVisualPromptKind() : kind;
        await copyTextToClipboard(await buildIdePromptForCopy(resolvedKind));
        const labels = { overall: "总体解析", dft: "DFT 核验", figure: "Figure 核验", table: "Table 核验", figure_table: "Figure + Table 核验", text_review: "文字审核", sections_writing: "文字审核" };
        showToast("已复制 " + (labels[resolvedKind] || "IDE AI") + " 指令模板");
      } catch (error) {
        showToast("复制失败：" + error.message);
      }

    async function buildIdePromptForCopy(kind) {
      try {
        const guide = await fetchJSON("/api/system/agent-guide");
        const contract = guide && guide.prompt_contract ? guide.prompt_contract : {};
        const templates = contract.templates && typeof contract.templates === "object" ? contract.templates : {};
        const compositeTemplates = contract.composite_templates && typeof contract.composite_templates === "object" ? contract.composite_templates : {};
        const template = templates[kind] || compositeTemplates[kind] || templates.overall;
        if (!template) throw new Error("prompt contract does not include kind=" + kind);

        const now = new Date();
        const pad = function (value) { return String(value).padStart(2, "0"); };
        const runTag = [
          now.getFullYear(),
          pad(now.getMonth() + 1),
          pad(now.getDate()),
          "_",
          pad(now.getHours()),
          pad(now.getMinutes()),
          pad(now.getSeconds())
        ].join("");
        const sourceLabel = "<agent_name>_" + kind + "_" + runTag;
        const targetToken = contract.target_list_token || "{{TARGET_LIST}}";
        const sourceToken = contract.source_label_token || "{{SOURCE_LABEL}}";
        return String(template)
          .split(targetToken).join(currentPromptTargets())
          .split(sourceToken).join(sourceLabel);
      } catch (error) {
        console.warn("canonical IDE prompt unavailable", error);
        return [
          "统一 IDE 审核提示词当前不可用。",
          "请先使用当前会话已暴露的 literature-ai MCP 工具；若工具未注入，只能通过 app.mcp.context.mcp_auth_context 建立身份后，受控调用 app.mcp.server 已公开工具。",
          "禁止直接调用 service/session/model 或数据库。无法取得统一提示词与受控证据入口时，请报告 blocked_by_prompt_contract_unavailable。"
        ].join("\n");
      }
    }

    function handlePromptCopySelect() {
      const select = document.getElementById("promptCopySelect");

      const kind = select.value;

    async function fetchJSON(url, options) {
      const response = await fetch(url, options || {});
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = null;
      }
      if (!response.ok) {
        const detail = data && data.detail;
        const message = typeof detail === "string"
          ? detail
          : Array.isArray(detail)
            ? detail.map(function (item) {
                if (item && typeof item === "object") {
                  if (item.msg) return item.msg;
                  try {
                    return JSON.stringify(item);
                  } catch (_) {
                    return String(item);
                  }
                }
                return String(item);
              }).join("; ")
            : ("HTTP " + response.status);
        const error = new Error(message);
        error.status = response.status;
        error.payload = data;
        throw error;
      }
      return data;
    }

    function workflowClass(status, needsHuman) {
      if (["Human_Confirmed", "ML_Ready", "Citation_Ready", "Human_Complete", "DB_Ready"].includes(status)) return "ok";
      if (["Needs_Human_Confirmation", "Gemini_Flagged", "Evidence_Insufficient", "Rejected", "Suspected_Missing", "Unparsed"].includes(status)) return "bad";
      if (["Initial_Parsed", "AI_Rescanned"].includes(status)) return "ok";
      if (needsHuman || ["Codex_Candidate", "Gemini_Verified", "Gemini_Revised"].includes(status)) return "warn";
      return "warn";
    }

    function qualityClass(status) {
      if (status === "A_text_readable") return "ok";
      if (status === "B_text_partial" || status === "C_scan_clear") return "warn";
      if (!status) return "";
      return "bad";
    }

    function sortedRows(rows) {
      const items = Array.isArray(rows) ? rows.slice() : [];
      const sortBy = getValue("sortFilter") || "recent";
      const serialValue = function (row) {
        const match = String(row && row.paper_code || "").trim().toUpperCase().match(/^[A-Z](\d+)$/);
        if (match) return Number(match[1]);
        const serial = Number(row && row.serial_number);
        if (Number.isFinite(serial) && serial > 0) return serial;
        return Number.MAX_SAFE_INTEGER;
      };
      if (sortBy === "paper_code_asc") {
        return items.sort(function (left, right) {
          const serialDiff = serialValue(left) - serialValue(right);
          if (serialDiff) return serialDiff;
          const codeDiff = String(left.paper_code || "").localeCompare(String(right.paper_code || ""));
          if (codeDiff) return codeDiff;
          return String(left.paper_id || "").localeCompare(String(right.paper_id || ""));
        });
      }
      if (sortBy === "year_desc") {
        return items.sort(function (left, right) {
          const leftYear = Number(left.year || 0);
          const rightYear = Number(right.year || 0);
          if (rightYear !== leftYear) return rightYear - leftYear;
          return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
        });
      }
      if (sortBy === "conflicts_desc") {
        return items.sort(function (left, right) {
          const keys = [
            "dft_review_conflict_count",
            "visual_review_conflict_count",
            "content_review_conflict_count",
            "locator_issue_count",
            "figure_issue_count"
          ];
          for (const key of keys) {
            const diff = toCount(right[key]) - toCount(left[key]);
            if (diff) return diff;
          }
          return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
        });
      }
      if (sortBy === "suspected_missing_desc") {
        return items.sort(function (left, right) {
          const missingDiff = toCount(right.suspected_missing_dft_count) - toCount(left.suspected_missing_dft_count);
          if (missingDiff) return missingDiff;
          const rank = function (row) {
            if (row.workflow_status === "Suspected_Missing") return 0;
            if (row.workflow_status === "Unparsed") return 1;
            return 2;
          };
          const rankDiff = rank(left) - rank(right);
          if (rankDiff) return rankDiff;
          return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
        });
      }
      return items.sort(function (left, right) {
        const createdDiff = String(right.created_at || "").localeCompare(String(left.created_at || ""));
        if (createdDiff) return createdDiff;
        return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
      });
    }

    function conflictSeverity(type) {
      if (type === "value_conflict" || type === "decision_conflict") return "high";
      if (type === "unit_conflict" || type === "mapping_conflict" || type === "identity_conflict") return "medium";
      if (type === "locator_conflict") return "low";
      return "medium";
    }

    function conflictSeverityClass(type) {
      const severity = conflictSeverity(type);
      if (severity === "high") return "bad";
      if (severity === "medium") return "mid";
      return "low";
    }

    function groupSeverity(item) {
      const types = Array.isArray(item.conflict_types) ? item.conflict_types : [];
      if (types.some(function (type) { return conflictSeverity(type) === "high"; })) return "high";
      if (types.some(function (type) { return conflictSeverity(type) === "medium"; })) return "medium";
      return "low";
    }
