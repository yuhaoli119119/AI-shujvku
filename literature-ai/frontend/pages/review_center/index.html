<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核中心 - Literature AI</title>
  <link rel="stylesheet" href="../../shared/fonts.css">
  <link rel="stylesheet" href="../../shared/tokens.css">
  <link rel="stylesheet" href="../../shared/components.css">
  <link rel="stylesheet" href="../../shared/topnav.css">
  <script src="../../shared/topnav.js?v=20260606-ui3"></script>
  <script>ThemeManager.init();</script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-body);
      --review-panel-head-height: 0px;
    }
    .shell {
      width: min(1520px, 100%);
      margin: 0 auto;
      padding: 0 16px 8px;
    }
    .review-topline {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 16px;
      margin-bottom: 12px;
      padding: 0;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .stat {
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .stat-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      background: var(--color-primary-bg);
      color: var(--color-primary);
    }
    .stat-icon::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 2px rgba(12, 87, 164, 0.12);
    }
    .stat-icon-docs {
      color: #0f766e;
    }
    .stat-icon-human {
      color: #0f766e;
    }
    .stat-icon-quality {
      color: #0f766e;
    }
    .stat-icon-dft {
      color: #0f766e;
    }
    .stat-icon-conflict {
      color: #0f766e;
    }
    .stat-label {
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat-value {
      font-size: 17px;
      font-weight: 900;
      line-height: 1;
    }
    .page-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      flex: 0 0 472px;
    }
    .page-actions .btn {
      min-width: 0;
      height: 36px;
      padding: 0 8px;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 850;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .page-actions select.btn {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      color: var(--color-text);
      text-align: center;
      text-align-last: center;
      cursor: pointer;
    }
    .btn-tinted {
      background: var(--color-primary-bg);
      color: var(--color-primary);
      border-color: transparent;
      font-weight: 800;
    }
    .btn-tinted:hover {
      background: var(--color-primary-light);
    }
    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      box-shadow: var(--shadow-card);
      padding: 0;
      margin-bottom: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: var(--nav-height);
      z-index: 32;
      background: var(--color-surface);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }
    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filterbar select,
    .filterbar input {
      height: 30px;
      min-width: 120px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--color-text-secondary);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
    }
    .filterbar input {
      min-width: 190px;
    }
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      position: relative;
    }
    .review-table-head-shell {
      position: sticky;
      top: calc(var(--nav-height) + var(--review-panel-head-height));
      z-index: 24;
      overflow: hidden;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface-alt);
    }
    .review-table-head {
      min-width: 1080px;
      display: grid;
      grid-template-columns: 108px 70px minmax(320px, 36fr) minmax(180px, 18fr) minmax(220px, 24fr) minmax(150px, 16fr);
      transform: translateX(0);
      will-change: transform;
    }
    .review-table-head-cell {
      min-height: 35px;
      padding: 2px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      border-right: 1px solid var(--color-border);
      background: var(--color-surface-alt);
    }
    .review-table-head-cell:last-child {
      border-right: 0;
    }
    .review-table-head-cell.id-head {
      justify-content: flex-start;
      padding-left: 16px;
    }
    .review-table-head-cell.id-head .select-head {
      justify-items: start;
      min-width: 72px;
    }
    .panel-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 40px;
      padding: 4px 12px;
      border-top: 1px solid var(--color-border);
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.92), rgba(255, 255, 255, 0.96));
    }
    .pagination-meta {
      display: flex;
      align-items: center;
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1;
    }
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .pagination-pages {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .page-size-box {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }
    .page-size-box select {
      height: 28px;
      min-width: 72px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      color: var(--color-text);
      padding: 0 8px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }
    .page-indicator {
      min-width: 34px;
      height: 28px;
      padding: 0 8px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .page-indicator.is-active {
      border-color: transparent;
      background: var(--color-primary);
      color: #fff;
      box-shadow: 0 8px 18px rgba(12, 87, 164, 0.22);
    }
    .page-indicator[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    table {
      width: 100%;
      min-width: 1080px;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }
    th,
    td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--color-border);
      text-align: left;
      vertical-align: middle;
    }
    table thead {
      display: none;
    }
    th {
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
      font-weight: 900;
      white-space: nowrap;
      position: static;
    }
    .col-divider {
      border-right: 1px solid var(--color-border);
    }
    th:nth-child(1), td:nth-child(1) { width: 108px; }
    th:nth-child(2), td:nth-child(2) { width: 70px; }
    th:nth-child(3), td:nth-child(3) { width: 36%; }
    th:nth-child(4), td:nth-child(4) { width: 18%; }
    th:nth-child(5), td:nth-child(5) { width: 24%; }
    th:nth-child(6), td:nth-child(6) { width: 16%; }
    .paper-title {
      font-weight: 900;
      line-height: 1.28;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .select-head,
    .row-select-cell {
      display: inline-grid;
      grid-template-columns: 16px 1fr;
      align-items: center;
      justify-content: center;
      justify-items: center;
      gap: 4px;
      min-width: 44px;
    }
    .row-select-cell {
      justify-items: start;
      min-width: 86px;
    }
    .row-paper-code {
      display: inline-block;
      max-width: 64px;
      font-size: 12px;
      font-weight: 800;
      color: var(--color-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .select-head input,
    .row-select-cell input {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      margin: 0;
    }
    .paper-meta-line {
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
      font-size: 11px;
      color: var(--color-text-secondary);
      min-width: 0;
    }
    .paper-doi-inline {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .muted {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .mono {
      font-family: var(--font-mono);
      word-break: break-all;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      max-width: 100%;
    }
    .chip.ok {
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .chip.warn {
      background: var(--color-warning-bg);
      color: var(--color-warning);
    }
    .chip.bad {
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .chip.mid {
      background: #fff1df;
      color: #b45309;
    }
    .chip.low {
      background: #fff8cc;
      color: #a16207;
    }
    .chip.subtle {
      background: var(--color-surface-alt);
      color: var(--color-text-tertiary, var(--color-text-secondary));
      border: 1px dashed var(--color-border);
    }
    .chip.compact {
      min-width: 0;
    }
    .chip[data-action] {
      cursor: pointer;
    }
    .status-cell,
    .audit-cell,
    .action-cell {
      min-width: 0;
    }
    .status-cluster {
      display: grid;
      gap: 5px;
    }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: flex-start;
    }
    .audit-summary {
      display: grid;
      gap: 5px;
    }
    .audit-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: nowrap;
    }
    .audit-topline-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: nowrap;
    }
    .audit-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      line-height: 1.35;
    }
    .audit-metrics span {
      white-space: nowrap;
    }
    .audit-metrics .active {
      color: var(--color-danger);
      font-weight: 800;
    }
    .btn.btn-chip {
      min-height: 26px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 5px;
    }
    .actions .btn-sm {
      min-height: 26px;
      padding: 4px 8px;
      font-size: 11px;
    }
    .empty,
    .error {
      margin: 14px;
      padding: 18px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      color: var(--color-text-secondary);
      background: var(--color-surface-alt);
    }
    .error {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }
    .toast {
      position: fixed;
      top: calc(var(--nav-height) + 16px);
      right: 22px;
      z-index: 140;
      display: none;
      max-width: min(420px, calc(100vw - 44px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--color-primary);
      color: #fff;
      box-shadow: var(--shadow-elevated);
      font-size: 13px;
      line-height: 1.45;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.34);
      backdrop-filter: blur(3px);
    }
    .overlay.open {
      display: flex;
    }
    .modal-card {
      width: min(1360px, calc(100vw - 28px));
      max-height: min(88vh, 980px);
      overflow: hidden;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      background: var(--color-surface);
      box-shadow: var(--shadow-elevated);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--color-border);
    }
    .modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }
    .modal-subtitle {
      margin-top: 6px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .modal-close {
      flex: 0 0 auto;
      min-width: 40px;
    }
    .modal-body {
      overflow: auto;
      padding: 16px 18px 18px;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--color-border);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .detail-block {
      display: grid;
      gap: 4px;
    }
    .detail-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }
    .detail-value {
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-text);
      word-break: break-word;
    }
    .detail-list {
      margin: 4px 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 3px 12px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.45;
    }
    .detail-list li + li::before {
      content: "·";
      margin-right: 12px;
      opacity: 0.5;
    }
    .conflict-stack {
      display: grid;
      gap: 12px;
    }
    .conflict-summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .conflict-card {
      border: 1px solid var(--color-border);
      border-radius: 14px;
      background: var(--color-surface-alt);
      overflow: hidden;
    }
    .conflict-card.is-high {
      border-color: rgba(220, 38, 38, 0.25);
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.08);
    }
    .conflict-card.is-medium {
      border-color: rgba(217, 119, 6, 0.22);
    }
    .conflict-card.is-low {
      border-color: rgba(202, 138, 4, 0.22);
    }
    .conflict-card summary {
      list-style: none;
      cursor: pointer;
    }
    .conflict-card summary::-webkit-details-marker {
      display: none;
    }
    .conflict-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 10px;
    }
    .conflict-card-left {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .conflict-card-right {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: flex-start;
      flex: 0 0 auto;
    }
    .conflict-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--color-text);
    }
    .conflict-meta {
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .conflict-body {
      display: grid;
      gap: 14px;
      padding: 0 14px 14px;
    }
    .conflict-object-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: var(--color-surface);
    }
    .conflict-object-item {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    .conflict-object-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }
    .conflict-object-value {
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-text);
      word-break: break-word;
    }
    .conflict-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .compare-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: var(--color-surface);
    }
    .compare-table {
      width: 100%;
      min-width: 1300px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      font-size: 12px;
    }
    .compare-table th,
    .compare-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: top;
      text-align: left;
    }
    .compare-table th {
      position: static;
      background: var(--color-surface-alt);
      color: var(--color-text-secondary);
      font-weight: 900;
    }
    .compare-table tr:last-child td {
      border-bottom: 0;
    }
    .compare-col-source { width: 14%; }
    .compare-col-role { width: 17%; }
    .compare-col-decision { width: 10%; }
    .compare-col-value { width: 13%; }
    .compare-col-confidence { width: 8%; }
    .compare-col-locator { width: 12%; }
    .compare-col-reason { width: 14%; }
    .compare-col-action { width: 12%; }
    .opinion-source {
      font-size: 12px;
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.45;
      word-break: break-word;
    }
    .opinion-submeta {
      margin-top: 4px;
      color: var(--color-text-secondary);
      font-size: 11px;
      line-height: 1.4;
      word-break: break-word;
    }
    .reason-block {
      display: grid;
      gap: 6px;
    }
    .reason-text {
      color: var(--color-text);
      line-height: 1.5;
      word-break: break-word;
    }
    .reason-text.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .expand-link {
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--color-primary);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      text-align: left;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }
    .compare-extra[hidden] {
      display: none !important;
    }
    .conflict-card-actions {
      display: flex;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }
    .opinion-action {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .opinion-action-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .opinion-action-stack .btn {
      white-space: nowrap;
    }
    .conflict-footer-note {
      margin-top: 14px;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 1.5;
    }
    .conflict-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }
    .conflict-main,
    .evidence-preview-shell {
      min-width: 0;
    }
    .evidence-preview-shell {
      order: -1;
    }
    .evidence-preview-card {
      border: 1px solid #d7e2ef;
      border-radius: 16px;
      background: #fbfdff;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: static;
    }
    .evidence-preview-card.is-placeholder {
      min-height: 220px;
      justify-content: center;
    }
    .evidence-preview-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--color-text);
    }
    .evidence-preview-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .evidence-excerpt {
      white-space: pre-wrap;
      line-height: 1.65;
    }
    .compare-table tr.is-active td {
      background: rgba(12, 87, 164, 0.08);
    }
    .btn.btn-weak {
      min-height: 26px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .btn.btn-weak[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    @media (max-width: 820px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }
      .review-topline,
      .panel-head {
        display: block;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .page-actions {
        grid-template-columns: repeat(3, 1fr);
        margin-top: 12px;
      }
      .page-actions .btn {
        height: 34px;
      }
      .filterbar {
        margin-top: 12px;
      }
      .filterbar select,
      .filterbar input {
        width: 100%;
      }
      .panel-foot {
        align-items: stretch;
      }
      .review-table-head-shell {
        top: calc(var(--nav-height) + var(--review-panel-head-height));
      }
      .pagination-bar {
        width: 100%;
        justify-content: flex-start;
        margin-left: 0;
      }
      table {
        min-width: 980px;
      }
      .overlay {
        padding: 12px;
      }
      .modal-card {
        width: min(100vw - 16px, 1360px);
        max-height: calc(100vh - 24px);
      }
      .conflict-card-head {
        display: grid;
      }
      .conflict-card-right {
        justify-content: flex-start;
      }
      .conflict-object-grid {
        grid-template-columns: 1fr 1fr;
      }
      .evidence-preview-card {
        position: static;
      }
      .evidence-preview-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="topnav-mount"></div>
  <main class="shell">
    <div class="review-topline">
      <section class="stats" id="stats"></section>
      <div class="page-actions">
        <button class="btn btn-ghost" type="button" onclick="loadReviewCenter()" title="刷新审核中心">↻ 刷新</button>
        <button class="btn btn-tinted" type="button" onclick="batchAutoAdvanceFiltered()">批量 AI 自动推进当前筛选</button>
        <select class="btn btn-tinted" id="materialActionSelect" title="材料操作" onchange="handleMaterialActionSelect()">
          <option value="">材料操作</option>
          <option value="prepare_filtered">AI 重建</option>
          <option value="prepare_suspected_missing">漏提材料</option>
          <option value="prepare_library">重建材料</option>
        </select>
        <select class="btn btn-ghost" id="promptCopySelect" title="复制 IDE AI 指令" onchange="handlePromptCopySelect()">
          <option value="">复制指令</option>
          <option value="overall">总体指令</option>
          <option value="dft">DFT 指令</option>
          <option value="figure">图表指令</option>
          <option value="sections_writing">章节+写作卡指令</option>
        </select>
      </div>
    </div>

    <section class="panel">
      <div class="panel-head">
        <div class="muted mono" id="queueMeta" style="font-size: 12px; font-weight: 700; letter-spacing: 0.4px;">正在读取当前库...</div>
        <div class="filterbar">
          <select id="libraryFilter" onchange="setReviewLibraryFilter()">
            <option value="">全部文献库</option>
          </select>
          <select id="statusFilter" onchange="handleFilterChange()">
            <option value="">全部流程状态</option>
            <option value="group:needs_action">需要我处理</option>
            <option value="group:needs_attention">需要关注</option>
            <option value="group:ai_processing">AI 处理中</option>
            <option value="group:approved">已审核通过</option>
            <option value="group:deprecated">历史旧状态</option>
          </select>
          <select id="qualityFilter" onchange="handleFilterChange()">
            <option value="">全部 PDF 质量</option>
            <option value="A_text_readable">A 文本可读</option>
            <option value="B_text_partial">B 部分可读</option>
            <option value="C_scan_clear">C 扫描清晰</option>
            <option value="D_scan_unclear">D 扫描不清</option>
            <option value="Broken">Broken</option>
          </select>
          <select id="sortFilter" onchange="handleSortChange()">
            <option value="recent">最近入库优先</option>
            <option value="year_desc">年份新到旧</option>
            <option value="conflicts_desc">冲突优先</option>
            <option value="suspected_missing_desc">疑似漏提优先</option>
          </select>
          <input id="searchBox" type="search" placeholder="搜索标题 / DOI / 期刊 / 年份 / 短 ID" oninput="handleSearchInput()">
        </div>
      </div>
      <div class="review-table-head-shell">
        <div class="review-table-head" id="reviewTableHead">
          <div class="review-table-head-cell col-divider id-head"><span class="select-head"><input id="selectAllVisible" type="checkbox" aria-label="全选或全不选当前页" onchange="toggleVisibleRowsSelection(this.checked)"><span>ID</span></span></div>
          <div class="review-table-head-cell col-divider">年份</div>
          <div class="review-table-head-cell col-divider">文献标题</div>
          <div class="review-table-head-cell col-divider">文献状态</div>
          <div class="review-table-head-cell col-divider">DFT 审计</div>
          <div class="review-table-head-cell">操作</div>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th class="col-divider" style="text-align:center;">ID</th>
              <th class="col-divider" style="text-align:center;">年份</th>
              <th class="col-divider" style="text-align:center;">文献标题</th>
              <th class="col-divider" style="text-align:center;">文献状态</th>
              <th class="col-divider" style="text-align:center;">DFT 审计</th>
              <th style="text-align:center;">操作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6"><div class="empty">正在加载...</div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="panel-foot">
        <div class="pagination-meta muted" id="paginationMeta">正在准备分页...</div>
        <div class="pagination-bar" id="paginationBar"></div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <div class="overlay" id="infoOverlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="infoModalTitle">
      <div class="modal-head">
        <div>
          <h3 class="modal-title" id="infoModalTitle">详情</h3>
          <div class="modal-subtitle" id="infoModalSubtitle"></div>
        </div>
        <button class="btn btn-ghost btn-sm modal-close" type="button" onclick="closeInfoOverlay()">关闭</button>
      </div>
      <div class="modal-body" id="infoModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" type="button" onclick="closeInfoOverlay()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      metadata: {},
      libraries: [],
      pagination: {
        page: 1,
        pageSize: 25
      }
    };
    const CURRENT_LIBRARY_STORAGE_KEY = "litai_current_library";
    const REVIEW_CENTER_FETCH_LIMITS = [5000, 500];
    const selectedPaperIds = new Set();
    const conflictState = {
      activeRow: null,
      groups: [],
      activeOpinionKey: null,
      evidenceCache: {},
      requestToken: 0
    };
    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;

    function esc(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char];
      });
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function getStoredLibraryName() {
      try {
        return window.localStorage.getItem(CURRENT_LIBRARY_STORAGE_KEY) || "";
      } catch (_) {
        return "";
      }
    }

    function rememberLibraryName(name) {
      try {
        if (name) {
          window.localStorage.setItem(CURRENT_LIBRARY_STORAGE_KEY, name);
        } else {
          window.localStorage.removeItem(CURRENT_LIBRARY_STORAGE_KEY);
        }
      } catch (_) {
        // localStorage can be unavailable in strict browser modes.
      }
    }

    function getQueryLibraryName() {
      try {
        return new URLSearchParams(window.location.search).get("library_name") || "";
      } catch (_) {
        return "";
      }
    }

    function getQueryPaperId() {
      try {
        return new URLSearchParams(window.location.search).get("paper_id") || "";
      } catch (_) {
        return "";
      }
    }

    function setReviewLibraryFilter() {
      rememberLibraryName(getValue("libraryFilter"));
      state.pagination.page = 1;
      loadReviewCenter();
    }

    function updateStickyLayout() {
      window.requestAnimationFrame(function () {
        const panelHead = document.querySelector(".panel-head");
        document.body.style.setProperty("--review-panel-head-height", ((panelHead && panelHead.offsetHeight) || 0) + "px");
        syncExternalTableHead();
      });
    }

    function syncExternalTableHead() {
      const tableWrap = document.getElementById("tableWrap");
      const tableHead = document.getElementById("reviewTableHead");
      if (!tableWrap || !tableHead) return;
      tableHead.style.transform = "translateX(" + (-tableWrap.scrollLeft) + "px)";
    }

    function toCount(value) {
      const count = Number(value || 0);
      return Number.isFinite(count) ? count : 0;
    }

    function hasOwnValue(value) {
      return value !== null && value !== undefined;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        toast.style.display = "none";
      }, 2800);
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const box = document.createElement("textarea");
      box.value = text;
      box.style.position = "fixed";
      box.style.left = "-9999px";
      document.body.appendChild(box);
      box.focus();
      box.select();
      document.execCommand("copy");
      document.body.removeChild(box);
    }

    function currentPromptTargets() {
      const selected = selectedPromptRows();
      const rows = selected.length ? selected : currentVisibleRows().slice(0, 25);
      if (!rows.length) {
        return "- human_ref: <A0010> | paper_id: <UUID> | title: <文献标题>";
      }
      return rows.map(function (row) {
        return "- human_ref: " + (row.paper_code || "-") +
          " | paper_id: " + row.paper_id +
          " | type: " + (row.paper_type || "-") +
          " | title: " + (row.title || "未命名文献");
      }).join("\n");
    }

    function selectedPromptRows() {
      if (!selectedPaperIds.size) return [];
      const byId = new Map((state.rows || []).map(function (row) {
        return [String(row.paper_id), row];
      }));
      return Array.from(selectedPaperIds).map(function (paperId) {
        return byId.get(String(paperId));
      }).filter(Boolean);
    }

    function promptTargetRows() {
      const selected = selectedPromptRows();
      return selected.length ? selected : currentVisibleRows().slice(0, 25);
    }

    function resolveVisualPromptKind() {
      const rows = promptTargetRows();
      const hasFigures = rows.some(function (row) { return toCount(row.figure_count) > 0; });
      const hasTables = rows.some(function (row) { return toCount(row.table_count) > 0; });
      if (hasFigures && !hasTables) return "figure";
      if (hasTables && !hasFigures) return "table";
      return "figure_table";
    }

    function togglePaperSelection(paperId, checked) {
      if (!paperId) return;
      if (checked) {
        selectedPaperIds.add(String(paperId));
      } else {
        selectedPaperIds.delete(String(paperId));
      }
      renderRows();
    }

    function selectVisibleRows() {
      currentVisibleRows().forEach(function (row) {
        if (row && row.paper_id) selectedPaperIds.add(String(row.paper_id));
      });
      renderRows();
      showToast("已选择当前页文献：" + selectedPaperIds.size + " 篇");
    }

    function toggleVisibleRowsSelection(checked) {
      currentVisibleRows().forEach(function (row) {
        if (!row || !row.paper_id) return;
        if (checked) selectedPaperIds.add(String(row.paper_id));
        else selectedPaperIds.delete(String(row.paper_id));
      });
      renderRows();
    }

    function syncSelectAllVisible(rows) {
      const checkbox = document.getElementById("selectAllVisible");
      if (!checkbox) return;
      const visibleIds = (rows || []).map(function (row) { return String(row.paper_id || ""); }).filter(Boolean);
      const selectedVisible = visibleIds.filter(function (paperId) { return selectedPaperIds.has(paperId); }).length;
      checkbox.checked = visibleIds.length > 0 && selectedVisible === visibleIds.length;
      checkbox.indeterminate = selectedVisible > 0 && selectedVisible < visibleIds.length;
    }

    function clearSelectedRows() {
      selectedPaperIds.clear();
      renderRows();
      showToast("已清空文献选择");
    }

    function handleFilterChange() {
      state.pagination.page = 1;
      renderRows();
    }

    function handleSortChange() {
      state.pagination.page = 1;
      renderRows();
    }

    function handleSearchInput() {
      state.pagination.page = 1;
      renderRows();
    }

    function totalPagesForCount(count) {
      const pageSize = Math.max(1, Number(state.pagination.pageSize || 25));
      return Math.max(1, Math.ceil(Math.max(0, Number(count || 0)) / pageSize));
    }

    function ensureValidPage(totalCount) {
      const totalPages = totalPagesForCount(totalCount);
      if (state.pagination.page > totalPages) state.pagination.page = totalPages;
      if (state.pagination.page < 1) state.pagination.page = 1;
      return totalPages;
    }

    function currentVisibleRows() {
      const rows = sortedRows(filteredRows());
      const pageSize = Math.max(1, Number(state.pagination.pageSize || 25));
      ensureValidPage(rows.length);
      const start = (state.pagination.page - 1) * pageSize;
      return rows.slice(start, start + pageSize);
    }

    function goToPage(page) {
      state.pagination.page = Number(page || 1);
      renderRows();
    }

    function changePage(delta) {
      goToPage(Number(state.pagination.page || 1) + Number(delta || 0));
    }

    function setPageSize() {
      const select = document.getElementById("pageSizeSelect");
      const nextSize = Number(select && select.value ? select.value : state.pagination.pageSize);
      state.pagination.pageSize = Number.isFinite(nextSize) && nextSize > 0 ? nextSize : 25;
      state.pagination.page = 1;
      renderRows();
    }

    function renderPagination(totalRows, visibleRows) {
      const totalPages = ensureValidPage(totalRows);
      const currentPage = state.pagination.page;
      const pageSize = Math.max(1, Number(state.pagination.pageSize || 25));
      const start = totalRows ? ((currentPage - 1) * pageSize + 1) : 0;
      const end = totalRows ? Math.min(totalRows, start + visibleRows.length - 1) : 0;
      const loadedCount = Number(state.rows.length || 0);
      const knownTotal = Number(state.metadata.total || loadedCount || 0);
      const hasTruncation = knownTotal > loadedCount;
      const metaParts = [];
      metaParts.push(totalRows ? ("当前页 " + start + "-" + end + " / " + totalRows + " 篇") : "当前页 0 / 0 篇");
      metaParts.push("第 " + currentPage + " / " + totalPages + " 页");
      if (hasTruncation) {
        metaParts.push("已加载 " + loadedCount + " / 总 " + knownTotal + " 篇");
      } else {
        metaParts.push("总计 " + knownTotal + " 篇");
      }
      document.getElementById("paginationMeta").textContent = metaParts.join(" | ");

      const pages = [];
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);
      for (let page = startPage; page <= endPage; page += 1) {
        pages.push(
          '<button class="page-indicator' + (page === currentPage ? ' is-active' : '') + '" type="button" onclick="goToPage(' + page + ')"' +
          (page === currentPage ? ' aria-current="page"' : '') +
          '>' + esc(page) + '</button>'
        );
      }
      document.getElementById("paginationBar").innerHTML =
        '<span class="page-size-box">每页' +
          '<select id="pageSizeSelect" onchange="setPageSize()">' +
            '<option value="25"' + (pageSize === 25 ? ' selected' : '') + '>25 篇</option>' +
            '<option value="50"' + (pageSize === 50 ? ' selected' : '') + '>50 篇</option>' +
            '<option value="100"' + (pageSize === 100 ? ' selected' : '') + '>100 篇</option>' +
          '</select>' +
        '</span>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="goToPage(1)"' + (currentPage <= 1 ? ' disabled' : '') + '>首页</button>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="changePage(-1)"' + (currentPage <= 1 ? ' disabled' : '') + '>上一页</button>' +
        '<span class="pagination-pages">' + pages.join("") + '</span>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="changePage(1)"' + (currentPage >= totalPages ? ' disabled' : '') + '>下一页</button>' +
        '<button class="btn btn-ghost btn-sm" type="button" onclick="goToPage(' + totalPages + ')"' + (currentPage >= totalPages ? ' disabled' : '') + '>末页</button>';
    }

    function legacyIdePromptTemplateV2(kind) {
      const now = new Date();
      const pad = function (value) { return String(value).padStart(2, "0"); };
      const runTag = [
        now.getFullYear(),
        pad(now.getMonth() + 1),
        pad(now.getDate()),
        "_",
        pad(now.getHours()),
        pad(now.getMinutes()),
        pad(now.getSeconds())
      ].join("");
      const sourceLabel = "<agent_name>_" + kind + "_" + runTag;
      const targetList = currentPromptTargets();
      const common = [
        "你现在是本系统的 IDE 审核 AI。请先使用当前 IDE/项目会话已经暴露的 Literature AI MCP 工具，不要先编辑 mcp_config.json，也不要让用户手工配置。不要只输出文字总结，必须通过 MCP 工具 import_analysis 回写系统。",
        "",
        "目标文献清单：",
        targetList,
        "",
        "目标说明：human_ref 是给人沟通用的稳定短号；调用 MCP/API 时必须使用同一行的 paper_id(UUID)，不要使用页面序号或旧 #001 编号。",
        "source_label 必须写成：" + sourceLabel + "。请把 <agent_name> 替换成你的实际模型或窗口名，例如 gemini、kimi、codex、claude。",
        "",
        "必须执行：",
        "0. 先检查当前可用工具列表：应能看到 literature-ai/query_papers、get_paper、get_codex_context、get_codex_item、read_paper_page、import_analysis 等 MCP 工具；如果 IDE 会话里没有这些工具，不要立刻停，而是通过 literature-ai/backend 的 app.mcp.context.mcp_auth_context 建立明确身份，再受控调用 app.mcp.server 已公开的 MCP 工具。禁止借此直接调用 service/session/model 或数据库。只有两条 MCP 路径和相关正式 HTTP API 都不可用时，才报告 blocked_by_missing_mcp_tool。不要自行写 mcp_config.json。",
        "1. 每篇文献先准备材料：优先使用 MCP 的 prepare/get context 能力；如果工具提示材料已存在，可以继续；如果无法读取 codex-context 或 source_assets/artifact_status 不存在，先切到项目内后端 MCP 兜底再判断，只有两条路径都失败才报告阻塞。",
        "1a. 先判断本文文献类型与系统解析是否一致；若不一致，直接按 PDF 证据修正系统解析类型，再继续后续审核。",
        "2. 读取证据优先用当前 Literature AI MCP 工具：get_codex_context(paper_id)、get_codex_item(paper_id,item_type,item_id)、read_paper_page(paper_id,page_start,page_end)、import_analysis。若 IDE 会话没有暴露这些工具，就用项目内后端 MCP 兜底路径完成同样的调用，不要默认绕过 MCP 或改成只写文字总结。",
        "3. 禁止直接 import 后端 service/session/model，禁止直接写数据库，禁止用脚本绕过 MCP/API 权限。禁止下载 PDF 到本地后用 pdftotext/pdf2txt/自写脚本替代 read_paper_page；如果 read_paper_page 或证据入口不可用，必须停止并报告 blocked_by_evidence_api_unavailable。",
        "4. 每篇目标文献最终必须至少有一次 import_analysis 回写，用于元数据、章节、表格、figure 元信息等非图像字段；优先走当前 IDE 暴露的 MCP 工具，缺失时走项目内后端 MCP 兜底路径。参数固定包含 source='ide_ai'、source_label='" + sourceLabel + "'、reviewer='<agent_name>'。",
        "4-apply. 如果本次要直接应用非 DFT 修正、创建对象或写 [AI_REVIEWED] 状态，必须先获取对应模块写锁，然后使用 auto_apply_review_rules=true 和 write_lock_token。遇到 module_write_lock_required 时必须去获取锁，不要改成 auto_apply_review_rules=false 来宣称完成。",
        "4-candidate. 如果只是提交 object_review_audits / paper-level audit candidate，通常可以使用 auto_apply_review_rules=false；这只表示候选意见已导入，状态仍是 unverified/candidate，不等于审核完成、通过或已应用。",

    async function fetchJSON(url, options) {
      const response = await fetch(url, options || {});
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = null;
      }
      if (!response.ok) {
        const detail = data && data.detail;
        const message = typeof detail === "string"
          ? detail
          : Array.isArray(detail)
            ? detail.map(function (item) {
                if (item && typeof item === "object") {
                  if (item.msg) return item.msg;
                  try {
                    return JSON.stringify(item);
                  } catch (_) {
                    return String(item);
                  }
                }
                return String(item);
              }).join("; ")
            : ("HTTP " + response.status);
        const error = new Error(message);
        error.status = response.status;
        error.payload = data;
        throw error;
      }
      return data;
    }

    function sortedRows(rows) {
      const items = Array.isArray(rows) ? rows.slice() : [];
      const sortBy = getValue("sortFilter") || "recent";
      if (sortBy === "year_desc") {
        return items.sort(function (left, right) {
          const leftYear = Number(left.year || 0);
          const rightYear = Number(right.year || 0);
          if (rightYear !== leftYear) return rightYear - leftYear;
          return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
        });
      }
      if (sortBy === "conflicts_desc") {
        return items.sort(function (left, right) {
          const keys = ["review_conflict_count", "locator_issue_count", "figure_issue_count"];
          for (const key of keys) {
            const diff = toCount(right[key]) - toCount(left[key]);
            if (diff) return diff;
          }
          return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
        });
      }
      if (sortBy === "suspected_missing_desc") {
        return items.sort(function (left, right) {
          const missingDiff = toCount(right.suspected_missing_dft_count) - toCount(left.suspected_missing_dft_count);
          if (missingDiff) return missingDiff;
          const rank = function (row) {
            if (row.workflow_status === "Suspected_Missing") return 0;
            if (row.workflow_status === "Unparsed") return 1;
            return 2;
          };
          const rankDiff = rank(left) - rank(right);
          if (rankDiff) return rankDiff;
          return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
        });
      }
      return items.sort(function (left, right) {
        const createdDiff = String(right.created_at || "").localeCompare(String(left.created_at || ""));
        if (createdDiff) return createdDiff;
        return String(right.paper_id || "").localeCompare(String(left.paper_id || ""));
      });
    }

      const status = row.pdf_artifact_status && typeof row.pdf_artifact_status === "object" ? row.pdf_artifact_status : {};
      return {
        hasPdf: row.pdf_exists === true || status.pdf_exists === true,
        pathKind: hasOwnValue(row.pdf_path_kind) ? row.pdf_path_kind : (status.pdf_path_kind || "unknown"),
        size: hasOwnValue(row.pdf_file_size) ? row.pdf_file_size : status.pdf_file_size,
        blockers: Array.isArray(status.blocking_errors) ? status.blocking_errors : []
      };
    }

    function compactPdfDisplayState(row) {
      const pdf = compactPdfStatus(row);
      const workflowStatus = String(row && row.workflow_status || "").trim();
      const quality = String(row.pdf_quality_status || "").trim().toLowerCase();
      const broken = quality === "broken";
      const blocked = Array.isArray(pdf.blockers) && pdf.blockers.length > 0;
      const hasInitialParse = !!(
        row.has_parsed_content ||
        [
          "Initial_Parsed",
          "AI_Rescanned",
          "Suspected_Missing",
          "Human_Complete",
          "DB_Ready",
          "Human_Confirmed",
          "ML_Ready",
          "Citation_Ready",
          "Needs_Human_Confirmation",
          "Gemini_Flagged",
          "Gemini_Verified",
          "Gemini_Revised",
          "Evidence_Insufficient",
          "Rejected"
        ].includes(workflowStatus)
      );
      const unusable = pdf.hasPdf && (broken || blocked || !hasInitialParse);
      return {
        pdf: pdf,
        workflowStatus: workflowStatus,
        hasInitialParse: hasInitialParse,
        unusable: unusable,
        label: !pdf.hasPdf ? "无 PDF" : (unusable ? "PDF 不可用" : "PDF 可用"),
        chipClass: !pdf.hasPdf ? "subtle" : (unusable ? "bad" : "ok"),
        summaryText: !pdf.hasPdf
          ? "当前文献没有可用 PDF 文件。"
          : (unusable
            ? "PDF 存在，但文件状态异常、被阻塞，或系统尚未完成初步解析。"
            : "PDF 文件存在，且系统已经完成初步解析。")
      };
    }

    function compactPdfChip(row) {
      const display = compactPdfDisplayState(row);
      const pdf = display.pdf;
      const title = [
        display.summaryText,
        "path kind: " + pdf.pathKind,
        hasOwnValue(pdf.size) ? "size: " + pdf.size + " bytes" : null,
        display.workflowStatus ? "workflow: " + display.workflowStatus : null,
        row.pdf_quality_status ? "quality: " + row.pdf_quality_status : null,
        pdf.blockers.length ? "blockers: " + pdf.blockers.join(", ") : null
      ].filter(Boolean).join("\n");
      return '<span class="chip compact ' + display.chipClass + '" title="' + esc(title) + '">' + display.label + '</span>';
    }

    function compactManualReviewProgress(row) {
      const source = row && row.manual_review_progress && typeof row.manual_review_progress === "object"
        ? row.manual_review_progress
        : {};
      const normalize = function (key) {
        const value = source[key];
        if (value && typeof value === "object") return !!value.completed;
        return !!value;
      };
      return {
        figures: normalize("figures"),
        dft: normalize("dft"),
        content: normalize("content")
      };
    }

    function compactModuleProgressChip(label, completed, title) {
      return '<span class="chip compact ' + (completed ? "ok" : "subtle") + '" title="' + esc(title) + '">' + esc(label) + '</span>';
    }

    function compactSummarizeCounts(counts, formatter) {
      return Object.keys(counts || {}).map(function (key) {
        return { key: key, count: toCount(counts[key]) };
      }).filter(function (item) {
        return item.count > 0;
      }).sort(function (left, right) {
        if (right.count !== left.count) return right.count - left.count;
        return left.key.localeCompare(right.key);
      }).map(function (item) {
        return (formatter ? formatter(item.key) : item.key) + ": " + item.count;
      });
    }

    function compactIssueTitle(topIssues, issueCounts, formatter, emptyText) {
      const lines = Array.isArray(topIssues) && topIssues.length
        ? topIssues.map(function (item) { return (formatter ? formatter(item.code) : item.code) + ": " + toCount(item.count); })
        : compactSummarizeCounts(issueCounts || {}, formatter);
      return lines.length ? lines.join("\n") : emptyText;
    }

    function compactIssueList(topIssues, issueCounts, formatter, emptyText) {
      const lines = Array.isArray(topIssues) && topIssues.length
        ? topIssues.map(function (item) { return (formatter ? formatter(item.code) : item.code) + ": " + toCount(item.count); })
        : compactSummarizeCounts(issueCounts || {}, formatter);
      if (!lines.length) {
        return '<div class="detail-value muted">' + esc(emptyText) + '</div>';
      }
      return '<ul class="detail-list">' + lines.map(function (line) {
        return '<li>' + esc(line) + '</li>';
      }).join("") + '</ul>';
    }

    function compactExtractionMeta(row) {
      const dftAudit = row.dft_audit && typeof row.dft_audit === "object" ? row.dft_audit : {};
      const suspectedMissing = hasOwnValue(row.suspected_missing_dft_count)
        ? toCount(row.suspected_missing_dft_count)
        : toCount(dftAudit.suspected_missing_count);
      const hasActiveDftCandidates = row.has_active_dft_candidates !== undefined
        ? !!row.has_active_dft_candidates
        : !!row.has_dft_candidates;
      if (suspectedMissing > 0) {
        return { label: "疑似漏提", className: "bad", tip: "检测到 DFT 线索多于已解析候选，建议优先复核全文。", suspectedMissing: suspectedMissing };
      }
      if (hasActiveDftCandidates) {
        return { label: "待审 DFT", className: "warn", tip: "已有待审 DFT 候选，下一步去证据页核对字段和定位。", suspectedMissing: suspectedMissing };
      }
      if (row.has_dft_candidates === true) {
        return { label: "已审 DFT", className: "ok", tip: "当前 DFT 结果已写入或完成审核，列表中没有未收口候选。", suspectedMissing: suspectedMissing };
      }
      if (row.has_dft_candidates === false) {
        return { label: "未见 DFT", className: "", tip: "当前没有可审核的 DFT 候选。", suspectedMissing: suspectedMissing };
      }
      if (row.dft_completeness_status === "Initial_Parsed" || dftAudit.coverage_status === "Initial_Parsed") {
        return { label: "初步解析", className: "warn", tip: "已完成初步解析，但候选状态仍需继续确认。", suspectedMissing: suspectedMissing };
      }
      return { label: "未解析", className: "", tip: "尚未形成稳定的 DFT 提取结果。", suspectedMissing: suspectedMissing };
    }

    function compactRiskChip(label, count, title, options) {
      const config = options || {};
      const chipClass = count > 0 ? (config.activeClass || "warn") : (config.zeroClass || "subtle");
      const attrs = config.dataAction ? ' data-action="' + esc(config.dataAction) + '"' : "";
      return '<span class="chip compact ' + chipClass + '"' + attrs + ' title="' + esc(title) + '">' + esc(label) + " " + esc(count) + '</span>';
    }

    function compactDetailSection(label, content) {
      return '<div class="detail-block"><div class="detail-label">' + esc(label) + '</div>' + content + '</div>';
    }

    function compactInfoList(items, emptyText) {
      const lines = (items || []).filter(Boolean);
      if (!lines.length) {
        return '<div class="detail-value muted">' + esc(emptyText) + '</div>';
      }
      return '<ul class="detail-list">' + lines.map(function (line) {
        return '<li>' + esc(line) + '</li>';
      }).join("") + '</ul>';
    }

    function modalContent(title, subtitle, html) {
      document.getElementById("infoModalTitle").textContent = title || "详情";
      document.getElementById("infoModalSubtitle").textContent = subtitle || "";
      document.getElementById("infoModalBody").innerHTML = html || "";
      const overlay = document.getElementById("infoOverlay");
      overlay.classList.add("open");
      overlay.setAttribute("aria-hidden", "false");
    }

    function closeInfoOverlay() {
      const overlay = document.getElementById("infoOverlay");
      overlay.classList.remove("open");
      overlay.setAttribute("aria-hidden", "true");
      document.getElementById("infoModalBody").innerHTML = "";
      conflictState.activeRow = null;
      conflictState.groups = [];
      conflictState.activeOpinionKey = null;
      conflictState.evidenceCache = {};
      conflictState.requestToken = 0;
    }

    function buildRowDetailModal(row) {
      const pdfDisplay = compactPdfDisplayState(row);
      const workflow = workflowMeta(row.workflow_status);
      const quality = qualityMeta(row.pdf_quality_status);
      const qualityReasonText = qualityReasonLabel(row.quality_reason);
      const dftAudit = row.dft_audit && typeof row.dft_audit === "object" ? row.dft_audit : {};
      const detectedSignals = hasOwnValue(dftAudit.detected_signal_count) ? toCount(dftAudit.detected_signal_count) : 0;
      const parsedCount = hasOwnValue(dftAudit.parsed_dft_count) ? toCount(dftAudit.parsed_dft_count) : 0;
      const suspectedMissing = hasOwnValue(row.suspected_missing_dft_count)
        ? toCount(row.suspected_missing_dft_count)
        : toCount(dftAudit.suspected_missing_count);
      const latestAudit = (row.external_audit_opinions || [])[0] || null;
      const latestAuditText = latestAudit

            latestAudit.source_label || latestAudit.source || "external audit",

          ].filter(Boolean).join(" / ")
        : "暂无外部审核";
      const objectAuditLines = (row.object_review_audits || []).slice(0, 5).map(function (audit) {
        return [

          audit.target_type,
          audit.field_name,
          audit.decision || audit.recommended_action || "review",
          audit.verification_status || "unverified"
        ].filter(Boolean).join(" / ");
      });
      const noteLines = (row.latest_paper_notes || []).slice(0, 5).map(function (note) {
        const text = String(note.content || "").replace(/\s+/g, " ").trim();
        return [
          note.source || "paper_note",
          note.field_name,
          note.page ? ("p." + note.page) : "",
          text.length > 120 ? (text.slice(0, 120) + "...") : text
        ].filter(Boolean).join(" / ");
      });
      const candidateSummaryLines = compactSummarizeCounts(row.dft_candidate_status_counts || {}, null);
      const cropSummaryLines = compactSummarizeCounts(row.figure_crop_status_counts || {}, null);
      const pdfStatusHtml = !pdfDisplay.pdf.hasPdf
        ? '<div class="detail-value">无 PDF | 当前文献没有可用 PDF 文件。</div>'
        : '<div class="detail-value">' + esc(quality.label) + ' | ' + esc(qualityReasonText) + '</div><div class="detail-value muted">' + esc(workflow.label) + ' | ' + esc(workflow.tip) + '</div>';
      const html = '<div class="detail-grid">' +
        compactDetailSection("PDF 状态", pdfStatusHtml) +
        compactDetailSection("Figure 风险", compactIssueList(row.top_figure_issues, (row.figure_reliability || {}).issue_counts || row.figure_issue_counts || {}, figureIssueLabel, "No figure reliability warnings.")) +
        compactDetailSection("Locator 风险", compactIssueList(row.top_locator_issues, (row.locator_reliability || {}).issue_counts || row.locator_issue_counts || {}, locatorIssueLabel, "No locator reliability warnings.")) +
        compactDetailSection("外部审核", '<div class="detail-value">外部审核：' + esc(toCount(row.external_audit_count)) + '</div><div class="detail-value muted">' + esc(latestAuditText) + '</div>') +
        compactDetailSection("对象审核", '<div class="detail-value">对象审核：' + esc(toCount(row.object_review_audit_count)) + '</div>' + compactInfoList(objectAuditLines, "暂无对象级 AI 审核。")) +
        compactDetailSection("AI 笔记", '<div class="detail-value">AI 笔记：' + esc(toCount(row.paper_note_count)) + '</div>' + compactInfoList(noteLines, "暂无 IDE AI 回写笔记。")) +
        compactDetailSection("候选状态", '<div class="detail-value">' + esc(candidateSummaryLines.length ? candidateSummaryLines.join(", ") : "无候选") + '</div>') +
        compactDetailSection("提取概览", '<div class="detail-value">线索 ' + esc(detectedSignals) + ' | 已解析 ' + esc(parsedCount) + ' | 疑似漏提 ' + esc(suspectedMissing) + '</div><div class="detail-value muted">图表 ' + esc(toCount(row.figure_count) + toCount(row.table_count)) + ' | 证据定位 ' + esc(toCount(row.evidence_count)) + ' | figure crop ' + esc(cropSummaryLines.length ? cropSummaryLines.join(", ") : "none") + '</div>') +
      '</div>';
      return {
        title: row.title || "文献详情",
        subtitle: [row.journal || "", row.year || "", row.doi || ""].filter(Boolean).join(" | "),
        html: html
      };
    }

    function formatTargetType(targetType) {
      const mapping = {
        dft_results: "DFT 字段",
        writing_card: "写作卡",
        mechanism_claim: "机制主张",
        figure: "图片",
        table: "表格"
      };
      return mapping[targetType] || targetType || "冲突对象";
    }

    function formatConflictType(type) {
      const mapping = {
        value_conflict: "数值冲突",
        unit_conflict: "单位冲突",
        decision_conflict: "结论冲突",
        locator_conflict: "定位冲突",
        mapping_conflict: "映射冲突"
      };
      return mapping[type] || type || "冲突";
    }

    function conflictSeverity(type) {
      if (type === "value_conflict" || type === "decision_conflict") return "high";
      if (type === "unit_conflict" || type === "mapping_conflict" || type === "identity_conflict") return "medium";
      if (type === "locator_conflict") return "low";
      return "medium";
    }

    function conflictSeverityClass(type) {
      const severity = conflictSeverity(type);
      if (severity === "high") return "bad";
      if (severity === "medium") return "mid";
      return "low";
    }

    function groupSeverity(item) {
      const types = Array.isArray(item.conflict_types) ? item.conflict_types : [];
      if (types.some(function (type) { return conflictSeverity(type) === "high"; })) return "high";
      if (types.some(function (type) { return conflictSeverity(type) === "medium"; })) return "medium";
      return "low";
    }

    function formatOpinionValue(opinion) {
      const parts = [opinion && opinion.value, opinion && opinion.unit].filter(function (part) {
        return part !== null && part !== undefined && String(part).trim() !== "";
      });
      return parts.length ? parts.join(" ") : "未知";
    }

    function opinionIdentity(opinion) {
      return opinion && opinion.identity && typeof opinion.identity === "object" ? opinion.identity : {};
    }

    function itemTargetSummary(item) {
      return item && item.target_summary && typeof item.target_summary === "object" ? item.target_summary : {};
    }

    function itemAnchorSummary(item) {
      return item && item.anchor_summary && typeof item.anchor_summary === "object" ? item.anchor_summary : {};
    }

    function joinDisplayParts(parts) {
      return parts.filter(function (part) {
        return part !== null && part !== undefined && String(part).trim() !== "";
      }).join(" | ");
    }

    function opinionIdentitySummary(opinion) {
      const identity = opinionIdentity(opinion);
      return joinDisplayParts([
        identity.normalized_energy_type,
        identity.normalized_material,
        identity.structure_name,
        identity.adsorbate,
        identity.reaction_step
      ]) || identity.object_label || "";
    }

    function targetSummaryLabel(item) {
      const summary = itemTargetSummary(item);
      return summary.object_label || joinDisplayParts([
        summary.property_type,
        summary.normalized_material,
        summary.structure_name,
        summary.adsorbate,
        summary.reaction_step,
        summary.source_section,
        summary.figure_label,
        summary.caption
      ]) || (item && item.target_id) || "-";
    }

    function anchorSummaryText(anchor) {
      const summary = anchor && typeof anchor === "object" ? anchor : {};
      return joinDisplayParts([
        hasOwnValue(summary.page) ? ("page " + summary.page) : "",
        summary.section,
        summary.table,
        summary.figure,
        summary.locator_status
      ]) || "missing locator";
    }

    function adjudicationRoleBadge(opinion) {
      const role = String(opinion && opinion.adjudication_role || "").trim().toLowerCase();
      if (!role) return "";
      return '<span class="chip warn">' + esc(role === "third_ai" ? "third AI" : role) + '</span>';
    }

    function formatLocatorSummary(opinion) {
      return anchorSummaryText(opinion && opinion.anchor_summary);
    }

    function isWeakLocator(opinion) {
      const evidence = opinion && opinion.evidence && typeof opinion.evidence === "object" ? opinion.evidence : {};
      const locator = evidence.locator && typeof evidence.locator === "object" ? evidence.locator : evidence;
      return ["text_only", "missing_bbox", "missing_page"].includes(locator.locator_status);
    }

    function locatorPayloadFromEvidence(evidence) {
      const payload = Array.isArray(evidence) ? (evidence[0] || {}) : (evidence || {});
      if (!payload || typeof payload !== "object") return {};
      if (payload.locator && typeof payload.locator === "object") return payload.locator;
      if (payload.evidence_location && typeof payload.evidence_location === "object") return payload.evidence_location;
      return payload;
    }

    function opinionEvidencePayload(opinion) {
      if (!opinion || !opinion.evidence) return {};
      const evidence = Array.isArray(opinion.evidence) ? (opinion.evidence[0] || {}) : opinion.evidence;
      return evidence && typeof evidence === "object" ? evidence : {};
    }

    function locatorStatusLabel(status) {
      const mapping = {
        exact_page: "精确页码",
        exact_bbox: "精确框选",
        text_only: "仅文本定位",
        missing_bbox: "缺少框选",
        missing_page: "缺少页码",
        missing_locator: "缺少定位",
        approximate_locator: "近似定位",
        unresolved_locator: "未解析定位"
      };
      if (status && mapping[status]) return mapping[status] + " " + status;
      return status || "缺少定位";
    }

    function reliableLocatorStatus(status) {
      return ["exact_page", "exact_bbox"].includes(status);
    }

    function normalizeWhitespace(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function clipText(value, maxChars) {
      const text = normalizeWhitespace(value);
      if (!text) return "";
      const max = Number(maxChars || 0);
      if (!max || text.length <= max) return text;
      return text.slice(0, max - 1).trimEnd() + "…";
    }

    function formatEvidenceSourceType(sourceType) {
      const mapping = {
        section: "section",
        table: "table",
        figure: "figure",
        writing_card: "writing card",
        mechanism_claim: "mechanism claim",
        dft_result: "dft_result",
        dft_results: "dft_result",
        extraction_field_review: "review payload",
        object_review_audit: "object review",
        external_audit_opinion: "external audit",
        paper_correction: "correction proposal"
      };
      return mapping[sourceType] || sourceType || "unknown";
    }

    function deriveEvidenceSourceLabel(evidence, item, opinion) {
      const payload = evidence || {};
      return payload.source_label
        || payload.section_title
        || payload.section
        || payload.label
        || payload.table_label
        || payload.figure_label
        || payload.figure_caption
        || payload.caption
        || opinion.source_label
        || formatTargetType(item && item.target_type);
    }

    function extractNearbyContextLines(payload) {
      const lines = [];
      if (payload && typeof payload === "object") {
        if (Array.isArray(payload.related_sections)) {
          payload.related_sections.slice(0, 2).forEach(function (section) {
            const title = section && (section.title || section.section_type || "section");
            const text = clipText(section && section.text, 280);
            if (text) lines.push((title ? title + ": " : "") + text);
          });
        }
        [payload.context_before, payload.context_after, payload.nearby_context, payload.section_text].forEach(function (value) {
          const text = clipText(value, 280);
          if (text && lines.indexOf(text) === -1) lines.push(text);
        });
      }
      return lines.slice(0, 2);
    }

    function extractOpinionEvidenceKey(item, opinion, groupIndex, opinionIndex) {
      return [
        "conflict-evidence",
        groupIndex,
        opinionIndex,
        item && item.target_type || "target",
        item && item.field_name || "field"
      ].join(":");
    }

    function canUseCodexItem(row, item) {
      if (!row || !item) return false;
      if (!UUID_RE.test(String(row.paper_id || ""))) return false;
      if (!UUID_RE.test(String(item.target_id || ""))) return false;
      return ["dft_results", "writing_card", "writing_cards", "mechanism_claim", "mechanism_claims", "figure", "figures", "table", "tables"].includes(item.target_type);
    }

    function canPreviewEvidence(row, item, opinion) {
      if (canUseCodexItem(row, item)) return true;
      const evidence = opinionEvidencePayload(opinion);
      const locator = locatorPayloadFromEvidence(evidence);
      return Boolean(
        normalizeWhitespace(evidence.evidence_text || evidence.excerpt || evidence.text || "").length
        || normalizeWhitespace(opinion && opinion.reason).length
        || normalizeWhitespace(deriveEvidenceSourceLabel(evidence, item, opinion)).length
        || hasOwnValue(locator.page)
        || normalizeWhitespace(locator.locator_status).length
      );
    }

    function buildEvidencePreviewPlaceholder(message) {
      return '<div class="evidence-preview-card is-placeholder">' +
        '<div class="evidence-preview-title">证据预览</div>' +
        '<div class="detail-value muted">' + esc(message || "请选择一条意见查看原文片段") + '</div>' +
      '</div>';
    }

    function buildEvidencePreviewPanel(payload) {

      if (payload.loading) return buildEvidencePreviewPlaceholder("正在读取原文片段...");

      return '<div class="evidence-preview-card">' +
        '<div class="evidence-preview-title">璇佹嵁棰勮</div>' +
        '<div class="evidence-preview-meta">' +
          '<div class="detail-block"><div class="detail-label">对象类型</div><div class="detail-value">' + esc(payload.targetType || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">来源对象</div><div class="detail-value">' + esc(payload.objectLabel || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">Field</div><div class="detail-value">' + esc(payload.fieldName || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">Review source</div><div class="detail-value">' + esc(payload.reviewSource || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">Page</div><div class="detail-value">' + esc(hasOwnValue(payload.page) ? payload.page : "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">Locator</div><div class="detail-value">' + esc(payload.locatorStatus || "missing_locator") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">能量类型</div><div class="detail-value">' + esc(payload.energyType || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">材料</div><div class="detail-value">' + esc(payload.material || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">结构</div><div class="detail-value">' + esc(payload.structureName || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">吸附物</div><div class="detail-value">' + esc(payload.adsorbate || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">反应步骤</div><div class="detail-value">' + esc(payload.reactionStep || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">证据锚点</div><div class="detail-value">' + esc(payload.anchorText || "-") + '</div></div>' +

        '<div class="detail-block"><div class="detail-label">Nearby context</div>' +

          '<div class="detail-block"><div class="detail-label">字段</div><div class="detail-value">' + esc(payload.fieldName || "-") + '</div></div>' +

    function buildEvidencePreviewPlaceholder(message) {
      return '<div class="evidence-preview-card is-placeholder">' +

    function buildEvidencePreviewPanel(payload) {
      if (!payload) return buildEvidencePreviewPlaceholder("请选择一条意见查看原文片段");
      if (payload.loading) return buildEvidencePreviewPlaceholder("正在读取原文片段...");
      const nearbyLines = Array.isArray(payload.nearbyContext) ? payload.nearbyContext.filter(Boolean) : [];
      return '<div class="evidence-preview-card">' +
        '<div class="evidence-preview-title">证据预览</div>' +
        '<div class="evidence-preview-meta">' +
          '<div class="detail-block"><div class="detail-label">对象类型</div><div class="detail-value">' + esc(payload.targetType || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">来源对象</div><div class="detail-value">' + esc(payload.objectLabel || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">字段</div><div class="detail-value">' + esc(payload.fieldName || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">审核来源</div><div class="detail-value">' + esc(payload.reviewSource || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">页码</div><div class="detail-value">' + esc(hasOwnValue(payload.page) ? payload.page : "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">定位</div><div class="detail-value">' + esc(payload.locatorStatus || "missing_locator") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">能量类型</div><div class="detail-value">' + esc(payload.energyType || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">材料</div><div class="detail-value">' + esc(payload.material || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">结构</div><div class="detail-value">' + esc(payload.structureName || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">吸附物</div><div class="detail-value">' + esc(payload.adsorbate || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">反应步骤</div><div class="detail-value">' + esc(payload.reactionStep || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">证据锚点</div><div class="detail-value">' + esc(payload.anchorText || "-") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">来源类型</div><div class="detail-value">' + esc(payload.sourceType || "未知") + '</div></div>' +
          '<div class="detail-block"><div class="detail-label">来源标签</div><div class="detail-value">' + esc(payload.sourceLabel || "-") + '</div></div>' +
        '</div>' +
        '<div class="detail-block"><div class="detail-label">原文片段</div><div class="detail-value evidence-excerpt">' + esc(payload.excerpt || "当前没有可展示的原文片段") + '</div></div>' +
        '<div class="detail-block"><div class="detail-label">附近上下文</div>' +

            ? '<ul class="detail-list">' + nearbyLines.map(function (line) { return '<li>' + esc(line) + '</li>'; }).join("") + '</ul>'

        '</div>' +

      '</div>';
