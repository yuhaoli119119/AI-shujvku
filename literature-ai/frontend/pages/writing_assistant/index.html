<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写作辅助 - Literature AI</title>
    <link rel="stylesheet" href="../../shared/fonts.css">
    <link rel="stylesheet" href="../../shared/tokens.css">
    <link rel="stylesheet" href="../../shared/components.css">
    <link rel="stylesheet" href="../../shared/topnav.css">
    <link rel="stylesheet" href="./page.css">
    <script src="../../shared/topnav.js"></script>
    <script>ThemeManager.init();</script>
</head>
<body>
    <div id="topnav-mount"></div>
    <div class="shell">
        <div class="header-container">
            <h2>写作引用辅助</h2>
            <p class="subtitle subtle">粘贴句子或段落，在文献库中检索匹配证据与引用候选建议。</p>
        </div>

        <div class="safety-disclaimer-banner">
            <div class="disclaimer-icon">!</div>
            <div class="disclaimer-content">
                <strong>安全提示：</strong>只有 API 明确标记为 confirmed 的候选，才可作为“已确认候选”查看。需要人工核验或仅含元数据的建议，在复核前都不能视为证据。
                <br><br>
                <strong>说明：</strong>本工具只生成引用建议草稿，不会验证证据、不写入数据库、不生成最终参考文献，也不会解锁写作或导出能力。
            </div>
        </div>

        <div class="main-layout">
            <div class="input-panel card">
                <div class="section-title">写作上下文</div>
                <div class="field">
                    <label for="writingText">输入文本 <span class="required">*</span></label>
                    <textarea id="writingText" class="input" rows="8" placeholder="在此粘贴论文句子或段落，例如：单原子催化剂可加速锂硫电池中的硫氧化还原动力学。"></textarea>
                    <div id="validationAlert" class="validation-alert" style="display: none;"></div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="maxCandidates">最多候选数</label>
                        <input type="number" id="maxCandidates" class="input" value="10" min="1" max="50">
                    </div>
                </div>

                <div class="field checkboxes-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="includeUnverifiedSuggestions" checked>
                        <span>包含未核验建议</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="includePendingReview" checked>
                        <span>包含待复核项</span>
                    </label>
                </div>

                <details class="filters-collapsible" open>
                    <summary class="filters-summary">
                        <span>高级筛选</span>
                    </summary>
                    <div class="filters-content">
                        <div class="field-row">
                            <div class="field">
                                <label for="filterYearMin">年份下限</label>
                                <input type="number" id="filterYearMin" class="input" placeholder="例如 2020">
                            </div>
                            <div class="field">
                                <label for="filterYearMax">年份上限</label>
                                <input type="number" id="filterYearMax" class="input" placeholder="例如 2026">
                            </div>
                        </div>

                        <div class="field-row">
                            <div class="field">
                                <label for="filterIFMin">IF 下限</label>
                                <input type="number" id="filterIFMin" class="input" step="0.1" placeholder="例如 5.0">
                            </div>
                            <div class="field">
                                <label for="filterIFMax">IF 上限</label>
                                <input type="number" id="filterIFMax" class="input" step="0.1" placeholder="例如 30.0">
                            </div>
                        </div>

                        <div class="field">
                            <label for="filterJournalInc">包含期刊 <span class="hint">（逗号分隔）</span></label>
                            <input type="text" id="filterJournalInc" class="input" placeholder="例如 Nature, Science">
                        </div>

                        <div class="field">
                            <label for="filterJournalExc">排除期刊 <span class="hint">（逗号分隔）</span></label>
                            <input type="text" id="filterJournalExc" class="input" placeholder="例如 Advanced Materials">
                        </div>

                        <div class="field-row">
                            <div class="field">
                                <label for="filterCitationPriority">引用优先级</label>
                                <select id="filterCitationPriority" class="select">
                                    <option value="">不限</option>
                                    <option value="high">高</option>
                                    <option value="medium">中</option>
                                    <option value="low">低</option>
                                    <option value="exclude">排除</option>
                                </select>
                            </div>
                            <div class="field">
                                <label for="filterExcludeFromCitation">排除引用</label>
                                <select id="filterExcludeFromCitation" class="select">
                                    <option value="">不限</option>
                                    <option value="true">是</option>
                                    <option value="false">否</option>
                                </select>
                            </div>
                        </div>

                        <div class="checkbox-grid">
                            <label class="checkbox-label">
                                <input type="checkbox" id="filterNeedsMetadata">
                                <span>需补元数据</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="filterHasPdf">
                                <span>已有 PDF</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="filterHasParsedText">
                                <span>已解析正文</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="filterHasExtractionOutput">
                                <span>已有提取结果</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="filterHasVerifiedEvidence">
                                <span>已有 verified 证据</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="filterHasSafeVerifiedEvidence">
                                <span>已有 safe_verified 证据</span>
                            </label>
                        </div>
                    </div>
                </details>

                <div class="panel-actions">
                    <button id="btnClear" class="btn btn-ghost" onclick="clearFilters()">清空筛选</button>
                    <button id="btnSearch" class="btn btn-primary" onclick="retrieveCandidates()">检索候选</button>
                </div>
            </div>

            <div class="results-panel">
                <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                    <div class="spinner"></div>
                    <div class="loading-text">正在分析文本并检索匹配候选...</div>
                </div>

                <div class="results-header-bar">
                    <div class="results-count-title">
                        推荐候选（<span id="resultsCount">0</span>）
                    </div>
                </div>

                <div id="candidatesContainer" class="candidates-container">
                    <div class="empty-state">
                        <div class="empty-icon">文</div>
                        <h3>尚未输入上下文</h3>
                        <p>请先在左侧粘贴句子或段落，再点击“检索候选”查找匹配证据文献。</p>
                    </div>
                </div>

                <details id="excludedCollapsible" class="excluded-collapsible" style="display: none;">
                    <summary class="excluded-summary">
                        <span>已排除 / 不推荐候选（<span id="excludedCount">0</span>）</span>
                    </summary>
                    <div id="excludedList" class="excluded-list"></div>
                </details>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="./page.js"></script>
</body>
</html>
