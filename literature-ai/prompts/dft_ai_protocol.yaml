name: dft_material_ai_extraction_protocol
version: system_candidate_dft_v1_2
stage: ai_extraction_and_review_gate

role_boundary:
  system_preprocessing:
    - Download PDF and collect metadata.
    - Extract native text, sections, tables, captions, figures, page numbers, crop boxes, full-page screenshots, and nearby context.
    - Rule-based DFT hints are only stored as system_candidate records.
    - System candidates must never enter the final DFT/ML database without review.
  ai_extraction:
    - Before extracting or reviewing values, compare the system-parsed sections, tables, figures, and locators against the original PDF pages.
    - If parser structure, table split, figure crop, page mapping, or locator anchoring looks wrong, record parse defects first and do not pretend the parsed package is already trustworthy.
    - Read the full evidence package, not only rows pre-extracted by rules.
    - Extract scientific DFT/material data from evidence.
    - Compare new AI extraction with system_candidate hints and report missing/conflicting evidence.
  review_gate:
    - Deduplicate candidates.
    - Run completeness audit.
    - Require human or second-AI confirmation before promotion to exportable database.

intake_boundary:
  current_rule: Literature discovery is a controlled candidate workflow, not direct ingestion.
  legacy_disabled:
    - The old /api/papers/ai_workflow and /api/papers/ai_workflow/jobs direct-ingest routes are disabled with HTTP 410.
    - External AI workers must not assume that search results have entered the library.
  approved_flow:
    - Search or AI expansion creates LiteratureIntakeCandidate rows only.
    - Candidate status pending_review means not downloaded, not parsed, not citeable, and not usable as evidence.
    - A candidate must be explicitly approved before download or ingestion can start.
    - Rejected and duplicate candidates must not be ingested unless a curator deliberately changes their state.
    - Only papers that already exist in the active library can be used for DFT extraction, review, writing, export, or MCP evidence retrieval.

evidence_first_rules:
  - The AI must actively inspect the original PDF, not only the parsed markdown or context bundle.
  - Parsed sections, tables, figure crops, and locators are candidate aids; high-risk DFT or chart conclusions must be checked against the original PDF first.
  - Every non-empty scientific field must be supported by a text/table/figure locator.
  - Do not infer a numeric value from trends, curves, colors, or pathway images unless the value is explicitly readable in the paper text/table/caption.
  - If a figure gives only a visual trend, mark the value as pending or needs_fix.
  - PDF original page, section title, table number, figure number, caption, and excerpt are preferred over parser-only text.
  - Cropped figures are candidate locators only; verify them against the full PDF page and caption.
  - Data without evidence location must not be promoted.
  - If the evidence packet has text and section metadata but no PDF page, keep the row as text_only evidence. Do not infer a page from a similar section title, nearby figure, or approximate text match.
  - Missing PDF pages may be investigated by an assigned IDE AI when the user asks, but any proposed page remains a candidate until reviewed. The web UI must not pretend to run an AI page lookup unless a real audited backend workflow exists.

workflow_stages:
  parse_vs_pdf_check:
    goal: Compare the system-generated reading package with the original PDF before trusting any parsed section, table, figure, or locator.
    required_output:
      - parser_readability_status
      - pdf_checked_pages
      - parse_defects
      - trustworthy_sections_tables_figures
      - blocked_targets_due_to_parse_error
  scope_gate:
    goal: Decide whether the paper is in scope before extracting rows.
    required_output:
      - graphdiyne_related
      - computation_or_experiment_plus_computation
      - extractable_dft_or_property_data
      - direct_evidence_excerpt
      - stop_reason_when_out_of_scope
  record_plan:
    goal: Plan material states, catalysts, structures, reaction systems, and expected row groups before extracting values.
    required_output:
      - planned_records
      - expected_property_groups
      - expected_tables_or_figures
      - known_missing
      - source_anchors
  record_one_by_one:
    goal: Extract one material or catalytic state at a time, without mixing different structures, dopants, methods, or conditions.
    required_output:
      - one_record_identity
      - normalized_names
      - source_anchors
      - candidate_rows
      - row_check
  row_check:
    goal: Validate syntax and evidence before any AI or human audit.
    required_output:
      - numeric_value
      - unit
      - property_type
      - catalyst_or_material
      - adsorbate
      - reaction_or_condition
      - pdf_page_or_locator
      - evidence_text
      - needs_fix_reason
  duplicate_guard:
    goal: Merge repeated candidates from the same paper instead of creating duplicate final rows.
    required_output:
      - duplicate_key
      - duplicate_group_id
      - primary_candidate_id
      - merged_evidence_sources
  second_ai_or_human_audit:
    goal: A second AI or a human reviews the evidence packet and candidate rows before promotion.
    required_output:
      - reviewer_role
      - reviewer_model
      - accept_reject_needs_fix
      - audit_notes
      - human_confirmation_required
      - internal_data_read_status
      - prior_external_audit_summary
  third_ai_adjudication:
    goal: When the first two AI opinions disagree on a high-risk target, a third AI may adjudicate after reading the original PDF and both prior opinions.
    required_output:
      - adjudication_role
      - adjudication_scope
      - selected_source_ids
      - adopt_reject_partial_decision
      - object_level_evidence_anchors
      - adjudication_notes

MCP_tooling_context:
  purpose: MCP tools expose evidence packets, page reads, figure crops, chart audits, share tokens, and repair actions to AI workers.
  rule: MCP tool output is supporting evidence, not final truth.
  traceability: Every MCP-assisted AI action must be recorded in AuditLog, task center, field review, external analysis run, or PaperNote.
  internal_verification_read_path:
    - The worker must inspect the original PDF page or page-derived artifact before trusting parsed structure for high-risk review.
    - Before auditing, external AI workers should read paper readiness through get_paper or get_codex_context and inspect artifact_status when present.
    - artifact_ready_for_external_audit must be true, or the worker must report blocking_errors and warnings instead of pretending the paper was fully readable.
    - get_review_coverage(paper_id) now exposes latest_external_audits, external_audit_count, and external_audit_source_distribution so other AI workers can see prior internal verification opinions.
    - external_audit_opinion candidates are visible review evidence, not final truth; they remain subject to conflict checks and human/final gates.
    - If MCP cannot read sections, tables, figures, locators, artifacts, or previous audit opinions, the correct output is needs_fix or blocked_by_unreadable_internal_data, not accept.

required_fields_per_dft_record:
  - catalyst_or_material
  - normalized_catalyst_or_material
  - adsorbate
  - normalized_adsorbate
  - property_type
  - normalized_property_type
  - value
  - unit
  - calculation_method_or_condition
  - evidence_text
  - pdf_page
  - section_or_heading
  - table_number
  - figure_number
  - figure_caption_or_table_caption
  - bbox_or_locator_if_available
  - confidence
  - extraction_source
  - source_anchors
  - known_missing
  - extraction_protocol_version
  - protocol_sha256
  - human_confirmation_required
  - notes

DFT_locator_boundary:
  page_capture:
    - Capture pdf_page only when it is present in the original PDF page context, page-derived artifact, table/figure metadata, or explicit locator supplied to the worker.
    - If page context is absent, output pdf_page: null and explain the missing locator in notes or known_missing.
  text_only_rows:
    - Text-only DFT evidence can remain reviewable through paper title, DOI, source section, and evidence_text.
    - Text-only DFT evidence must not be exported as ML/CSV training data until an exact page locator and the required review gates exist.
  forbidden:
    - Do not fabricate page numbers.
    - Do not infer exact pages from similarity alone.
    - Do not use page recovery to mark DFT rows verified, approve corrections, bind materials, or unlock export.
    - Do not add or rely on a web UI "AI find PDF page" action unless it is backed by an audited backend workflow.

property_types:
  examples:
    - adsorption_energy
    - binding_energy
    - gibbs_free_energy
    - free_energy_change
    - overpotential
    - reaction_barrier
    - limiting_potential
    - band_gap
    - HOMO
    - LUMO
    - bader_charge
    - charge_transfer
    - d_band_center
    - work_function

completeness_audit_keywords:
  - DFT
  - density functional theory
  - adsorption energy
  - binding energy
  - Gibbs
  - free energy
  - overpotential
  - reaction barrier
  - band gap
  - HOMO
  - LUMO
  - Bader
  - d-band
  - work function
  - Table
  - Figure
  - Supplementary

deduplication_policy:
  key: paper_id + normalized_catalyst + normalized_adsorbate + property_type + value + unit + method_or_condition + evidence_location
  duplicate_key: paper_id + normalized_catalyst + normalized_adsorbate + normalized_property_type + normalized_value + normalized_unit + normalized_condition + locator
  normalization_examples:
    - GDY, graphdiyne, pristine GDY -> GDY
    - H2O, water -> H2O
    - adsorption energy, Eads, E_ads -> adsorption_energy
    - -3.8700 eV and -3.87 eV are near-duplicates
  rule: Do not delete duplicates silently. Merge into a primary candidate and keep all evidence sources.

ai_worker_protocol:
  multi_ai_collaboration:
    - AI roles are assignable per task. Any IDE AI or external model may act as extractor, reviewer, image auditor, DFT auditor, or judge when assigned by the user.
    - Role names must be recorded explicitly, for example assigned_image_auditor, assigned_dft_auditor, assigned_extractor, or second_ai_judge.
    - A model that extracted a record should not be the only reviewer of that same record.
    - AI outputs are recommendations and candidate records only; they do not write final truth.
    - "Persisted AI payloads must include writes_final_truth: false and human_confirmation_required: true unless a separate human/final gate has explicitly promoted the row."
    - Every AI operation must leave a trace in task center, audit logs, field reviews, shared notes, correction proposals, or external analysis runs.
    - Review suggestions are inspected from the paper workbench/review center, external analysis workbench, DFT candidate review payloads, PaperNote records, and AuditLog entries.
    - External AI workers must first confirm they can read the active library paper, artifact status, parsed content, review coverage, and prior external_audit_opinion records through MCP or API.
    - For DFT rows, chart values, and other high-risk targets, the worker must compare parsed content with the original PDF before returning PASS, REVISE, or adjudication.
    - "A second AI review that did not read the internal verification data must declare internal_data_read_status: unreadable or incomplete and cannot return can_promote_to_exportable_database: true."
  image_audit:
    - The assigned VLM-capable model may audit figure crops, captions, full-page screenshots, and chart interpretations.
    - Figure audit must record figure_id, page, crop status, question, answer, and whether the crop is verified, incomplete, or incorrect.
    - Incorrect crops must trigger recrop_figure or a repair task before values from that figure can be trusted.
  dft_data_audit:
    - The assigned text/science model may audit DFT rows if it receives the evidence packet and this protocol.
    - The reviewer must check exact numeric value, unit, catalyst/material, adsorbate, property type, method/condition, locator, duplicates, and suspected missing rows.
    - PASS/accept from an AI does not unlock export unless the configured human/final gate also passes.
  ai_a_initial_extract:
    - First compare parsed materials with the original PDF and record parse defects or locator defects when found.
    - Read abstract, methods, results/discussion, all tables, all captions, DFT-related text, and supporting evidence package.
    - Output structured candidate records only when evidence is located.
  ai_b_independent_review:
    - Re-check the original PDF instead of trusting the first AI's parse assumptions.
    - Independently rescan the same evidence package.
    - Report missing records, conflicts, weak evidence, and duplicate candidates.
  ai_c_third_adjudicator:
    - Read the original PDF, the parsed evidence package, and both prior AI opinions.
    - Decide whether to adopt all, reject all, or partially adopt the disputed object-level results.
    - Output object_review_audit entries with adjudication_role=third_ai, adjudication_scope=conflict_resolution, and selected_source_ids.
  judge:
    - Compare AI-A, AI-B, and system_candidate hints.
    - Produce one merged candidate set plus conflict report.
    - Do not promote anything to final database.

paper_statuses:
  - Unparsed
  - Initial_Parsed
  - Suspected_Missing
  - AI_Rescanned
  - Human_Complete
  - DB_Ready

promotion_rule:
  chain: PDF original evidence -> AI protocol extraction -> deduplicate/merge -> completeness audit -> human or second-AI review -> exportable database
  final_database_filter: Only reviewed/exportable records are visible by default in the DFT database, exports, ML dataset, and trusted matrix.
  blocked_when:
    - candidate came only from Literature Intake and has not been ingested into papers.
    - artifact_ready_for_external_audit is false.
    - MCP/API output does not expose the parsed evidence packet or prior internal verification/audit opinions.
    - external AI audit conflicts with previous AI or human reviews.

output_schema:
  record:
    candidate_status: ai_candidate
    catalyst_or_material: string
    normalized_catalyst_or_material: string
    adsorbate: string
    normalized_adsorbate: string
    property_type: string
    normalized_property_type: string
    value: number
    unit: string
    calculation_method_or_condition: string
    evidence:
      text_excerpt: string
      pdf_page: integer
      section: string
      table: string
      figure: string
      caption: string
      bbox: object
    source_anchors:
      markdown_line: string
      pdf_page: integer
      section: string
      table_or_figure: string
      locator_id: string
    known_missing:
      reason: string
      checked_locations: list
    extraction_protocol_version: string
    protocol_sha256: string
    writes_final_truth: false
    human_confirmation_required: true
    confidence: number
    notes: string
    internal_data_read_status: readable | incomplete | unreadable
    prior_external_audits_checked: boolean
    parser_readability_status: readable | partially_reliable | unreliable
    parse_defects: list
    pdf_checked_pages: list
    adjudication_role: string
    adjudication_scope: string
    selected_source_ids: list
  report:
    detected_dft_signal_count: integer
    parsed_candidate_count: integer
    suspected_missing_count: integer
    conflicts: list
    duplicate_groups: list
    promotion_recommendation: needs_human_review
    unreadable_internal_data: list
