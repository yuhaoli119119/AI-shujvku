limit_req_zone $binary_remote_addr zone=share_rate:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=share_conn:10m;

server {
    listen 8080;
    server_tokens off;
    access_log off;
    error_log /dev/stderr crit;
    client_max_body_size 1m;

    location = /api/health {
        proxy_pass http://backend:8000;
    }

    location ^~ /api/share/ {
        limit_req zone=share_rate burst=20 nodelay;
        limit_conn share_conn 8;
        limit_except GET { deny all; }
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location ^~ /pages/share/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location ^~ /shared/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
