<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏈虹悊鐭ヨ瘑鑱氬�?- Literature AI</title>
    <link rel="stylesheet" href="../../shared/fonts.css">
    <link rel="stylesheet" href="../../shared/tokens.css">
    <link rel="stylesheet" href="../../shared/components.css">
    <link rel="stylesheet" href="../../shared/topnav.css">
    <script src="../../shared/topnav.js"></script>
    <script>ThemeManager.init();</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            color: var(--color-text);
            background: var(--color-bg);
            min-height: 100vh;
        }
        .shell {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 24px 32px;
        }
        .header-section {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header-section h1 { font-size: 26px; font-weight: 800; }
        .header-section p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1.5px solid var(--color-border);
            margin-bottom: 24px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--color-text-secondary);
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: var(--radius) var(--radius) 0 0;
            transition: var(--transition);
        }
        .tab-btn.active {
            color: var(--color-primary);
            border-bottom: 2px solid var(--color-primary);
        }

        .panel-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .panel-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-card);
        }
        .panel-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Material List cards */
        .aggregate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
        }
        .material-card {
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-lg);
            background: var(--color-surface);
            padding: 20px;
            transition: var(--transition);
        }
        .material-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-elevated);
        }
        .material-header {
            font-size: 16px;
            font-weight: 800;
            color: var(--color-primary);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .material-meta {
            display: grid;
            gap: 8px;
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .material-line {
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            background: var(--color-surface-alt);
            padding: 8px 10px;
        }
        .material-line strong { color: var(--color-text); }
        .missing-evidence {
            border: 1px dashed var(--color-warning);
            border-radius: var(--radius);
            background: var(--color-warning-bg);
            color: var(--color-warning);
            padding: 8px 10px;
            font-weight: 700;
        }

        .relation-item {
            background: var(--color-surface-alt);
            border-radius: var(--radius);
            padding: 10px 12px;
            font-size: 12px;
            margin-top: 8px;
            border: 1px solid var(--color-border);
        }

        .tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            text-transform: uppercase;
        }
        .tag.catalyst { background: var(--color-primary-bg); color: var(--color-primary); }
        .tag.adsorbate { background: var(--color-success-bg); color: var(--color-success); }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--color-text-secondary);
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--color-primary);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 600;
            box-shadow: var(--shadow-elevated);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div id="topnav-mount"></div>
    <div class="shell">
        <div class="header-section">
            <div>
                <h1>鏈虹悊涓庢潗鏂欑煡璇嗚埍</h1>
                <p>姹囪仛璺ㄦ枃鐚彁鍙栫殑鐢靛偓鍖栧墏缁撴瀯鐗瑰緛銆佸惛闄勭墿绉嶇被浠ュ強鍚屼箟璇嶅埆鍚嶃€傚姪鍔涙彮绢�哄井瑙傚弽搴既�溢�鐞嗚寰嬨€?/p>
            </div>
            <div>
                <button class="btn ghost" onclick="loadAggregationData()">鍒锋柊鑱氬悎澶х洏</button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('catalysts', event)">鍌寲鏉愭枡鑱氬�?(Catalysts)</button>
            <button class="tab-btn" onclick="switchTab('adsorbates', event)">鍚搁檮涓棿浣撹仛鍚?(Adsorbates)</button>
            <button class="tab-btn" onclick="switchTab('aliases', event)">鍚屼箟璇嶄笌鍙兘鍒悕 (Aliases)</button>
        </div>

        <!-- Tab 1: Catalysts -->
        <div id="tab-catalysts" class="tab-pane">
            <div class="panel-card">
                <div class="panel-title">鍌寲鍓傛潗鏂欏井瑙傜粨鏋勫綊绾?/div>
                <div class="aggregate-grid" id="catalystsBox">
                    <div class="empty-state">姝ｅ湪鎷夊彇澶х洏鑱氬悎鏁版嵁...</div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Adsorbates -->
        <div id="tab-adsorbates" class="tab-pane" style="display:none;">
            <div class="panel-card">
                <div class="panel-title">鍚搁檮鐗╢�腑闂翠綋鍙嶅簲鑳界骇鑱氬�?/div>
                <div class="aggregate-grid" id="adsorbatesBox">
                    <div class="empty-state">鏃犲惛闄勪腑闂翠綋鑱氬悎鏁版嵁銆?/div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Aliases -->
        <div id="tab-aliases" class="tab-pane" style="display:none;">
            <div class="panel-card">
                <div class="panel-title">绯荤粺妫€娴嬪埌鐨勫鏈悕绉板彉浣?/ 鍙兘鍒悕</div>
                <div class="aggregate-grid" id="aliasesBox">
                    <div class="empty-state">鏃犲埆鍚嶆娴嬨�?/div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = "/api/papers";
        const state = {
            activeTab: 'catalysts',
            aggregateData: null
        };

        function esc(value) {
            return String(value == null ? "" : value).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
        }

        function hasUsefulValue(value) {
            if (value == null) return false;
            if (Array.isArray(value)) return value.length > 0;
            return String(value).trim() !== "" && String(value).trim() !== "-";
        }

        function materialLine(label, value) {
            if (!hasUsefulValue(value)) return "";
            const displayValue = Array.isArray(value) ? value.join("�?) : String(value);
            return `<div class="material-line"><strong>${esc(label)}�?/strong>${esc(displayValue)}</div>`;
        }

        function renderCatalystMeta(item) {
            item = item || {};
            const rows = [
                materialLine("杞戒�?, item.support),
                materialLine("鍚堟垚鏂规硶", item.synthesis_method ? String(item.synthesis_method).slice(0, 180) : ""),
                materialLine("閰嶄綅缁撴��?, item.coordination),
                materialLine("娲绘€ч噾�?, item.metal_centers || [])
            ].filter(Boolean);
            if (!rows.length) {
                rows.push('<div class="missing-evidence">AI 鏈湪鍘熸枃涓壘鍒板彲闈犵殑杞戒綋銆佸悎鎴愭柟娉曟垨閰嶄綅缁撴瀯璇佹嵁銆傝鍥炲埌鏂囩尞搴撻噸鏂拌В鏋愶紝鎴栧湪浜哄伐纭宸ヤ綔鍙拌ˉ鍏呰瘉鎹�?/div>');
            } else if (!hasUsefulValue(item.support) || !hasUsefulValue(item.synthesis_method) || !hasUsefulValue(item.coordination)) {
                rows.push('<div class="missing-evidence">閮ㄥ垎缁撴����楁缂哄皯鍙潬璇佹嵁锛岀郴缁熶笉浼氭妸绌哄瓧娈靛綋浣滃凡纭缁撹�?/div>');
            }
            return rows.join("");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function fetchJSON(url, options) {
            options = options || {};
            options.headers = options.headers || {};
            const token = sessionStorage.getItem("litai-settings-token");
            if (token) {
                options.headers["X-Settings-Token"] = token;
            }
            const resp = await fetch(url, options);
            if (resp.status === 403) {
                showToast("鏃犳潈璁块棶璇ユ帴鍙ｃ€傝鍏堝湪[璁剧疆]涓厤缃鐞嗗�?Token�?);
                throw new Error("403 Forbidden");
            }
            const text = await resp.text();
            let data = null;
            try { data = text ? JSON.parse(text) : null; } catch (_) {}
            if (!resp.ok) {
                const detail = data && data.detail ? data.detail : ("HTTP " + resp.status);
                throw new Error(detail);
            }
            return data;
        }

        function switchTab(tab, evt) {
            state.activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');

            if (evt && evt.target) evt.target.classList.add('active');
            document.getElementById('tab-' + tab).style.display = 'block';
        }

        async function loadAggregationData() {
            try {
                const data = await fetchJSON(`${API_BASE}/aggregate`);
                state.aggregateData = data;
                renderAggregation();
            } catch (e) {
                showToast("鍔犺浇鑱氬悎澶х洏澶辫触锛? + e.message);
            }
        }

        function renderAggregation() {
            const data = state.aggregateData;
            if (!data) return;

            // 1. Render Catalysts
            const catBox = document.getElementById('catalystsBox');
            const catalysts = data.catalyst_groups || {};
            if (Object.keys(catalysts).length === 0) {
                catBox.innerHTML = `<div class="empty-state">搴撲腑灏氭棤鍌寲鏉愭枡鏁版嵁銆傝鍦ㄥ叆搴撲腑蹇冨鍏ユ枃鐚悗鐢?AI 閲嶆柊鎶芥彁�?/div>`;
            } else {
                catBox.innerHTML = Object.entries(catalysts).map(([key, items]) => {
                    const canonicalName = items[0].name || key;
                    const count = items.length;
                    return `
                        <div class="material-card">
                            <div class="material-header">
                                <span>${esc(canonicalName)}</span>
                                <span class="tag catalyst">鑱氬悎鏁?${count}</span>
                            </div>
                            <div class="material-meta">
                                ${renderCatalystMeta(items[0])}
                            </div>
                            <div style="font-size:12px; font-weight:700; color:var(--color-text-secondary); margin-bottom:6px;">鍑哄鍏宠仈鏂囩尞锛?/div>
                            ${items.slice(0, 3).map(item => `
                                <div class="relation-item">
                                    鍏宠仈搴擄細${item.paper_id ? `<a href="../literature_library/index.html?paper_id=${esc(item.paper_id)}" style="color:var(--color-primary); text-decoration:none;">鎵撳紑鏂囩尞</a>` : '鏈�?}
                                </div>
                            `).join('')}
                        </div>
                    `;
                }).join('');
            }

            // 2. Render Adsorbates
            const adsBox = document.getElementById('adsorbatesBox');
            const adsorbates = data.adsorbate_groups || {};
            if (Object.keys(adsorbates).length === 0) {
                adsBox.innerHTML = `<div class="empty-state">搴撲腑灏氭棤鍚搁檮鍒嗗瓙涓棿浣撴暟鎹�?/div>`;
            } else {
                adsBox.innerHTML = Object.entries(adsorbates).map(([key, items]) => {
                    const canonicalName = items[0].adsorbate || key;
                    const count = items.length;
                    return `
                        <div class="material-card">
                            <div class="material-header">
                                <span style="font-family:var(--font-mono); font-weight:700;">${esc(canonicalName)}</span>
                                <span class="tag adsorbate">鐩�6�0叧鑳界骇�?${count}</span>
                            </div>
                            <div class="material-meta">
                                ${materialLine("鐑姏��﹀睘鎬?, items[0].property_type) || '<div class="missing-evidence">缂哄皯鐑姏瀛﹀睘鎬ц瘉鎹€?/div>'}
                                ${materialLine("涓昏鍙嶅簲姝ラ�?, items[0].reaction_step) || ''}
                            </div>
                            <div style="font-size:12px; font-weight:700; color:var(--color-text-secondary); margin-bottom:6px;">鑳介噺璁＄畻鎶芥彁锛?/div>
                            ${items.slice(0, 3).map(item => `
                                <div class="relation-item">
                                    <strong>鑳介噺鍊硷細</strong>${item.value !== null ? Number(item.value).toFixed(4) : '-'} ${esc(item.unit || 'eV')} <br>
                                    <strong>缃俊搴︼細</strong>${item.confidence ? `${(item.confidence*100).toFixed(0)}%` : '-'}锛堟钀斤細${esc(item.source_section || '-')}�?br>
                                    ${item.paper_id ? `<a href="../literature_library/index.html?paper_id=${esc(item.paper_id)}" style="color:var(--color-primary); text-decoration:none;">鏌ョ湅��瑰簲鏂囩尞璇︽�?/a>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    `;
                }).join('');
            }

            // 3. Render Aliases
            const aliBox = document.getElementById('aliasesBox');
            const aliases = data.possible_name_aliases || [];
            if (!aliases.length) {
                aliBox.innerHTML = `<div class="empty-state">鏈娴嬪埌浠讳綍鍛藉悕寮傚悕銆傚悕绉伴珮搴﹁鏁淬�?/div>`;
            } else {
                aliBox.innerHTML = aliases.map(alias => {
                    const cls = alias.type === 'catalyst' ? 'catalyst' : 'adsorbate';
                    const typeTxt = alias.type === 'catalyst' ? '鍌寲鍓? : '鍚搁檮鍒嗗瓙';
                    return `
                        <div class="material-card">
                            <div class="material-header">
                                <span>鍙樹綋锛?{(alias.variants || []).map(esc).join(' / ')}</span>
                                <span class="tag ${cls}">${typeTxt}</span>
                            </div>
                            <div class="material-meta">
                                <strong>绯荤粺鑱氬悎鍚嶇О�?/strong><code style="font-family:var(--font-mono);">${esc(alias.canonical_key)}</code><br>
                                <strong>娑夊強鏂囩尞鏁帮�?/strong>${esc(alias.paper_count)} 绡囨枃鐚?                            </div>
                            <div style="font-size:12px; color:var(--color-text-secondary);">
                                <strong>鎻愮ず锛?/strong>鍙樹綋鍙兘鏉ヨ嚜鎺掔増銆佸甫鐢佃嵎鐘舵€佹垨涓嶅悓绠€鍐欍€傜郴缁熻繖閲屽彧鍋氳仛鍚堟彁绀猴紝鏈€缁堝悕绉颁粛寤鸿浜哄伐纭銆?                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            TopNav.init({ currentPage: 'mechanism', mountId: 'topnav-mount' });
            loadAggregationData();
        });
    </script>
</body>
</html>
